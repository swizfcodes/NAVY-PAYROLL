<div>
  <div class="mb-6">
    <h2 class="text-xl font-black text-navy">FO Dashboard</h2>
    <p class="text-sm text-blue-900/50 mt-1">Flag Officer — <span id="fo-ship-name">—</span></p>
  </div>
  <div class="grid grid-cols-3 gap-3 mb-6">
    <div class="bg-white/60 rounded-xl border border-amber-100 shadow p-4 text-center">
      <div class="text-2xl font-black text-amber-500" id="fo-stat-pending">—</div>
      <div
        style="font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:rgba(30,64,175,0.4);"
        class="mt-1">For Approval</div>
    </div>
    <div class="bg-white/60 rounded-xl border border-amber-100 shadow p-4 text-center">
      <div class="text-2xl font-black text-green-600" id="fo-stat-approved">—</div>
      <div
        style="font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:rgba(30,64,175,0.4);"
        class="mt-1">Approved</div>
    </div>
    <div class="bg-white/60 rounded-xl border border-amber-100 shadow p-4 text-center">
      <div class="text-2xl font-black text-red-400" id="fo-stat-rejected">—</div>
      <div
        style="font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:rgba(30,64,175,0.4);"
        class="mt-1">Rejected</div>
    </div>
  </div>
  <div class="bg-white/60 rounded-xl border border-amber-100 shadow p-5 mb-4">
    <div class="flex items-center gap-4">
      <div class="w-12 h-12 rounded-xl bg-blue-50 flex items-center justify-center flex-shrink-0"><i
          class="fas fa-check-circle text-blue-500 fa-lg"></i></div>
      <div class="flex-1">
        <div class="font-bold text-navy">Forms Awaiting FO Approval</div>
        <div class="text-xs text-blue-900/40 mt-0.5">DO-reviewed forms pending your approval before CPO confirmation
        </div>
      </div>
      <button onclick="if(typeof showShipSection==='function') showShipSection('pending',null)"
        class="px-4 py-2 bg-navy text-white text-sm font-bold rounded-lg cursor-pointer border-none hover:bg-blue-800 transition-colors flex-shrink-0">
        Approve <i class="fas fa-chevron-right ml-1" style="font-size:11px"></i>
      </button>
    </div>
  </div>
  <div class="bg-amber-50/60 border border-amber-200 rounded-xl p-4 text-sm text-amber-800">
    <i class="fas fa-info-circle mr-2"></i>As Flag Officer, you approve DO-reviewed forms. Approved forms proceed to the
    CPO for final confirmation.
  </div>
</div>
<script>
  (function () {
    const ship = sessionStorage.getItem('active_ship') || '—';
    const token = localStorage.getItem('token');
    const el = document.getElementById('fo-ship-name');
    if (el) el.textContent = ship;
    if (!token) return;
    fetch('/ship/fo/stats?ship=' + encodeURIComponent(ship), { headers: { Authorization: 'Bearer ' + token } })
      .then(r => r.ok ? r.json() : null)
      .then(d => { if (!d) return; document.getElementById('fo-stat-pending').textContent = d.pending ?? '—'; document.getElementById('fo-stat-approved').textContent = d.approved ?? '—'; document.getElementById('fo-stat-rejected').textContent = d.rejected ?? '—'; }).catch(() => { });
  })();
</script>
