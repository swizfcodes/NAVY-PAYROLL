<div>
  <div class="mb-6">
    <h2 class="text-xl font-black text-navy">FO Bulk Approve</h2>
    <p class="text-sm text-blue-900/50 mt-1">Approve all eligible DO-reviewed forms at once</p>
  </div>

  <div class="bg-white/60 rounded-xl border border-amber-100 shadow p-5 mb-4">
    <div class="flex items-center justify-between mb-4">
      <h3 class="font-bold text-navy text-sm uppercase tracking-wide">DO-Reviewed Forms</h3>
      <div class="flex items-center gap-2">
        <input type="checkbox" id="foBulkSelectAll" onchange="foToggleAll(this)" class="accent-navy w-4 h-4" />
        <label for="foBulkSelectAll" class="text-xs font-bold text-navy/60">Select All</label>
      </div>
    </div>
    <div id="foBulkList"><div class="flex items-center justify-center py-8 text-navy/30"><i class="fas fa-spinner fa-spin mr-2"></i></div></div>
  </div>

  <button onclick="executeFoBulk()" class="w-full py-3 bg-green-600 text-white font-bold text-sm rounded-xl hover:bg-green-700 transition-colors cursor-pointer border-none">
    <i class="fas fa-check-double mr-2"></i>Approve Selected
  </button>
  <div id="foBulkMsg" class="hidden mt-3 p-3 rounded-lg text-sm font-semibold"></div>
</div>

<script>
let foBulkForms = [];
const token = localStorage.getItem('token');
const ship  = sessionStorage.getItem('active_ship');

(function loadFoBulkList() {
  const el = document.getElementById('foBulkList');
  fetch('/ship/fo/pending?ship=' + encodeURIComponent(ship), { headers: { Authorization: 'Bearer ' + token } })
    .then(r => r.ok ? r.json() : [])
    .then(rows => {
      foBulkForms = rows;
      if (!rows.length) { el.innerHTML='<div class="text-center py-8 text-blue-900/30 text-sm"><i class="fas fa-check-circle fa-2x mb-2 block text-green-300"></i>No forms pending FO approval</div>'; return; }
      el.innerHTML = `<div class="space-y-2">` + rows.map((r,i) => `
        <div class="flex items-center gap-3 p-3 rounded-lg border border-amber-50 bg-white/40">
          <input type="checkbox" class="fo-bulk-chk accent-navy w-4 h-4 flex-shrink-0" data-idx="${i}" checked />
          <div class="flex-1 min-w-0">
            <div class="font-bold text-navy text-sm">${r.full_name}</div>
            <div class="text-xs text-blue-900/40">${r.user_id}</div>
          </div>
          <span class="text-xs font-bold px-2 py-0.5 rounded-full bg-blue-50 text-blue-500 flex-shrink-0">DO Reviewed</span>
        </div>`).join('') + `</div>`;
    }).catch(() => { el.innerHTML='<div class="text-center py-6 text-red-400 text-sm">Failed to load</div>'; });
})();

function foToggleAll(cb) { document.querySelectorAll('.fo-bulk-chk').forEach(c => c.checked = cb.checked); }

function executeFoBulk() {
  const selected = [...document.querySelectorAll('.fo-bulk-chk:checked')].map(c => foBulkForms[+c.dataset.idx]?.form_id).filter(Boolean);
  const msg = document.getElementById('foBulkMsg');
  if (!selected.length) { msg.className='p-3 rounded-lg text-sm font-semibold bg-red-50 text-red-600';msg.textContent='No forms selected.';msg.classList.remove('hidden');return; }
  if (!confirm('Approve ' + selected.length + ' form(s)?')) return;
  fetch('/ship/fo/bulk-approve', {
    method:'POST', headers:{'Content-Type':'application/json',Authorization:'Bearer '+token},
    body: JSON.stringify({ form_ids:selected, ship })
  })
  .then(r => r.json().then(d => ({ ok:r.ok, d })))
  .then(({ ok, d }) => {
    msg.className='p-3 rounded-lg text-sm font-semibold '+(ok?'bg-green-50 text-green-700':'bg-red-50 text-red-600');
    msg.textContent = ok?(d.message||selected.length+' forms approved.'):(d.error||'Failed');
    msg.classList.remove('hidden');
  }).catch(() => { msg.className='p-3 rounded-lg text-sm font-semibold bg-red-50 text-red-600';msg.textContent='Server error';msg.classList.remove('hidden'); });
}
</script>
