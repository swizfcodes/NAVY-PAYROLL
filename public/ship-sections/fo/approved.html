<div>
  <div class="mb-6">
    <h2 class="text-xl font-black text-navy">FO Approved Forms</h2>
    <p class="text-sm text-blue-900/50 mt-1">Forms approved by you — now with CPO for confirmation</p>
  </div>
  <div id="fo-approved-list">
    <div class="flex items-center justify-center py-12 text-navy/30"><i class="fas fa-spinner fa-spin mr-2"></i></div>
  </div>
</div>
<script>
  (function () {
    const token = localStorage.getItem('token'); const ship = sessionStorage.getItem('active_ship');
    const el = document.getElementById('fo-approved-list');
    fetch('/ship/fo/approved?ship=' + encodeURIComponent(ship), { headers: { Authorization: 'Bearer ' + token } })
      .then(r => r.ok ? r.json() : [])
      .then(rows => {
        if (!rows.length) { el.innerHTML = '<div class="text-center py-12 text-blue-900/30"><i class="fas fa-folder-open fa-2x mb-3 block"></i><p class="font-semibold">No approved forms yet</p></div>'; return; }
        el.innerHTML = '<div class="space-y-2">' + rows.map(r => `
        <div class="flex items-center gap-4 p-4 bg-white/60 rounded-xl border border-amber-100 shadow">
          <div class="w-9 h-9 rounded-full bg-green-50 flex items-center justify-center flex-shrink-0"><i class="fas fa-check text-green-500" style="font-size:14px"></i></div>
          <div class="flex-1 min-w-0"><div class="font-bold text-navy text-sm">${r.full_name}</div><div class="text-xs text-blue-900/40 mt-0.5">${r.user_id} · Approved ${r.approved_at ? new Date(r.approved_at).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }) : '—'}</div></div>
          <span class="text-xs font-bold px-2 py-0.5 rounded-full bg-green-50 text-green-600 flex-shrink-0">FO APPROVED</span>
        </div>`).join('') + '</div>';
      }).catch(() => { el.innerHTML = '<div class="text-center py-8 text-red-400 text-sm">Failed to load</div>'; });
  })();
</script>
