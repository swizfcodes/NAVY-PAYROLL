<!-- DO Reviewed -->
<div>
  <div class="mb-6">
    <h2 class="text-xl font-black text-navy">Reviewed Forms</h2>
    <p class="text-sm text-blue-900/50 mt-1">Forms you have already reviewed and authenticated</p>
  </div>
  <div id="do-reviewed-list"><div class="flex items-center justify-center py-12 text-navy/30"><i class="fas fa-spinner fa-spin mr-2"></i></div></div>
</div>
<script>
(function() {
  const token = localStorage.getItem('token');
  const ship  = sessionStorage.getItem('active_ship');
  const el = document.getElementById('do-reviewed-list');
  fetch('/ship/do/reviewed?ship=' + encodeURIComponent(ship), { headers:{ Authorization:'Bearer '+token } })
    .then(r => r.ok ? r.json() : [])
    .then(rows => {
      if (!rows.length) { el.innerHTML='<div class="text-center py-12 text-blue-900/30"><i class="fas fa-folder-open fa-2x mb-3 block"></i><p class="font-semibold">No reviewed forms yet</p></div>'; return; }
      el.innerHTML = `<div class="space-y-2">` + rows.map(r => `
        <div class="flex items-center gap-4 p-4 bg-white/60 rounded-xl border border-amber-100 shadow">
          <div class="w-9 h-9 rounded-full bg-green-50 flex items-center justify-center flex-shrink-0"><i class="fas fa-check text-green-500" style="font-size:14px"></i></div>
          <div class="flex-1 min-w-0">
            <div class="font-bold text-navy text-sm">${r.full_name}</div>
            <div class="text-xs text-blue-900/40 mt-0.5">${r.user_id} · Reviewed ${r.reviewed_at ? new Date(r.reviewed_at).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : '—'}</div>
          </div>
          <span class="text-xs font-bold px-2 py-0.5 rounded-full bg-green-50 text-green-600 flex-shrink-0">DO REVIEWED</span>
        </div>`).join('') + `</div>`;
    }).catch(() => { el.innerHTML='<div class="text-center py-8 text-red-400 text-sm">Failed to load</div>'; });
})();
</script>
