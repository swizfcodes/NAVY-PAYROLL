<style>
  @keyframes grow-up {
    0% {
      height: 0;
      bottom: 0;
    }

    100% {
      height: 100%;
      bottom: 0;
    }
  }

  @keyframes grow-down {
    0% {
      height: 0;
      top: 0;
    }

    100% {
      height: 100%;
      top: 0;
    }
  }

  @keyframes expand {
    0% {
      width: 0;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    100% {
      width: 100%;
      left: 0;
      transform: translateY(-50%);
    }
  }

  .animate-grow-up {
    animation: grow-up 0.6s ease-in-out infinite alternate;
    position: absolute;
    bottom: 0;
  }

  .animate-grow-down {
    animation: grow-down 0.6s ease-in-out infinite alternate;
    position: absolute;
    top: 0;
  }

  .animate-expand {
    animation: expand 0.6s ease-in-out infinite alternate;
  }
</style>

<!-- Payroll Register -->
<section class="items border rounded-lg m-6 max-w-2xl mr-auto p-6 mx-auto">
  <h2 class="text-xl text-center border-b font-bold text-blue-600 mb-4">Generate And Print Payroll Register Report</h2>

  <form id="payrollForm" class="space-y-4">

    <!-- People Selection -->
    <div>
      <label class="block font-medium mb-2 text-sm">Select People</label>
      <div class="flex space-x-4">
        <label class="flex text-sm items-center space-x-2">
          <input type="radio" name="payrollPeople" value="all" checked>
          <span>All</span>
        </label>
        <label class="flex text-sm items-center space-x-2">
          <input type="radio" name="payrollPeople" value="specific">
          <span>Specific</span>
        </label>
        <label class="flex text-sm items-center space-x-2">
          <input type="radio" name="payrollPeople" value="individual">
          <span>Individual</span>
        </label>
      </div>
    </div>

    <!-- Service Numbers -->
    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="block text-sm font-medium mb-1">Start Service No</label>
        <input type="text" id="payrollStartNo"
          class="w-full bg-transparent border border-blue-500 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-transparent disabled:opacity-40 disabled:cursor-not-allowed"
          disabled />
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">End Service No</label>
        <input type="text" id="payrollEndNo"
          class="w-full bg-transparent border border-blue-500 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-transparent disabled:opacity-40 disabled:cursor-not-allowed"
          disabled />
      </div>
    </div>

    <!-- Processing Month + Year + Header Type + Report Type (all one row on md) -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
      <div>
        <label for="payrollMonth" class="block text-sm font-medium mb-2">Processing Month</label>
        <select id="payrollMonth"
          class="w-full bg-transparent border border-blue-500 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-transparent">
          <option value="">Month</option>
          <option value="1">January</option>
          <option value="2">February</option>
          <option value="3">March</option>
          <option value="4">April</option>
          <option value="5">May</option>
          <option value="6">June</option>
          <option value="7">July</option>
          <option value="8">August</option>
          <option value="9">September</option>
          <option value="10">October</option>
          <option value="11">November</option>
          <option value="12">December</option>
        </select>
      </div>
      <div>
        <label for="payrollYear" class="block text-sm font-medium mb-2">Processing Year</label>
        <input type="number" id="payrollYear"
          class="w-full bg-transparent border border-blue-500 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          placeholder="e.g., 2025" min="2020" max="2099">
      </div>
      <div>
        <label for="payrollHeaderType" class="block text-sm font-medium mb-2">Header Type</label>
        <select id="payrollHeaderType"
          class="w-full bg-transparent border border-blue-500 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-transparent">
          <option value="">-- Select --</option>
          <option value="code">Code</option>
          <option value="description">Description</option>
        </select>
      </div>
      <div>
        <label for="payrollReportType" class="block text-sm font-medium mb-2">Report Type</label>
        <select id="payrollReportType"
          class="w-full bg-transparent border border-blue-500 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-transparent">
          <option value="both" selected>Both</option>
          <option value="earnings">Earnings</option>
          <option value="deductions">Deductions</option>
        </select>
      </div>
    </div>

    <!-- Output Format + IPPIS on same line -->
    <div>
      <label class="block font-medium mb-2">Output Format</label>
      <div class="flex flex-wrap items-center gap-x-4 gap-y-2">
        <label class="hidden flex text-sm items-center space-x-2">
          <input type="radio" name="payrollFormat" value="pdf">
          <span>PDF</span>
        </label>
        <label class="flex text-sm items-center space-x-2">
          <input type="radio" name="payrollFormat" value="excel" checked>
          <span>Excel</span>
        </label>
        <div class="hidden flex items-center gap-2">
          <input type="checkbox" id="payrollSummary" class="h-4 w-4">
          <label for="payrollSummary" class="text-sm">Summary Report</label>
        </div>
        <!-- IPPIS — now visible, on same line -->
        <div class="flex items-center gap-2">
          <input type="checkbox" id="payrollIppis" class="h-4 w-4">
          <label for="payrollIppis" class="text-sm">Use IPPIS</label>
        </div>
      </div>
    </div>

    <!-- Buttons -->
    <div class="flex flex-wrap justify-end gap-2 pt-2">
      <button type="reset" id="payrollClearBtn" class="px-4 py-2 bg-gray-500 text-white rounded hover:bg-gray-600">
        Clear
      </button>
      <button type="button" id="payrollPrintBtn" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
        Generate
      </button>
    </div>
  </form>
</section>

<!-- Loading Indicator -->
<div id="payrollLoadingIndicator" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-lg w-80 p-6 text-center">
    <div class="relative w-10 h-10 mx-auto mb-4">
      <div class="absolute left-1 w-[6px] bg-blue-600 rounded animate-grow-up"></div>
      <div class="absolute right-1 w-[6px] bg-blue-600 rounded animate-grow-down [animation-delay:0.3s]"></div>
      <div
        class="absolute top-1/2 left-1 h-[6px] bg-blue-600 rounded animate-expand [animation-delay:0.6s] -translate-y-1/2">
      </div>
    </div>
    <span>Generating report...</span>
  </div>
</div>

<!-- Confirmation Modal -->
<div id="payrollConfirmModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-lg w-96 p-6">
    <h3 class="text-lg font-semibold mb-4">Confirm Generation</h3>
    <p class="mb-6 text-gray-700">Proceed to generate payroll register?</p>
    <div class="flex justify-end gap-2">
      <button id="payrollCancelBtn" class="px-4 py-2 bg-gray-400 text-white rounded hover:bg-gray-500">Cancel</button>
      <button id="payrollContinueBtn"
        class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Continue</button>
    </div>
  </div>
</div>

<!-- Success Modal -->
<div id="payrollSuccessModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-lg w-96 p-6 text-center">
    <h3 class="text-lg font-semibold text-green-600 mb-4">Success</h3>
    <p class="mb-6 text-gray-700" id="payrollSuccessMessage">Payroll register is ready.</p>
    <button id="payrollSuccessOkBtn" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700">OK</button>
  </div>
</div>

<!-- Error Modal -->
<div id="payrollErrorModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-lg w-96 p-6 text-center">
    <h3 class="text-lg font-semibold text-red-600 mb-4">Error</h3>
    <p id="payrollErrorText" class="mb-6 text-gray-700">Please complete required fields.</p>
    <button id="payrollErrorOkBtn" class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700">OK</button>
  </div>
</div>

<!-- Preview Modal -->
<div id="payrollPreviewModal"
  class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4">
  <div class="bg-gray-50 rounded-lg shadow-lg w-full max-w-full max-h-[90vh] overflow-hidden">
    <div class="sticky top-0 bg-navy px-6 py-2 flex justify-between items-center">
      <h3 class="text-lg font-semibold text-white">Payroll Register Preview</h3>
      <button id="payrollClosePreviewBtn" class="text-white hover:text-gray-200 text-2xl">&times;</button>
    </div>
    <div class="overflow-auto" style="max-height: calc(90vh - 100px); background: #d1d5db;">
      <iframe id="payrollPreviewIframe" title="Payroll Register Preview"
        style="width: 100%; min-height: 842px; border: none; background: white; display: block;">
      </iframe>
    </div>
    <div class="sticky bottom-0 bg-gray-50 border-t px-6 py-2 flex justify-end space-x-2">
      <button id="payrollCancelPreviewBtn"
        class="px-4 py-2 bg-gray-400 text-white rounded hover:bg-gray-500">Cancel</button>
      <button id="payrollDownloadPreviewBtn"
        class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Download</button>
    </div>
  </div>
</div>

<script>
  const auth = window.authService;
  const PAYROLL_API_BASE = '/payrollRegister';

  // ── Element refs ─────────────────────────────────────────────────────────
  const payrollStartNo = document.getElementById('payrollStartNo');
  const payrollEndNo = document.getElementById('payrollEndNo');
  const payrollMonth = document.getElementById('payrollMonth');
  const payrollYear = document.getElementById('payrollYear');
  const payrollHeaderType = document.getElementById('payrollHeaderType');
  const payrollReportType = document.getElementById('payrollReportType');
  const payrollLoadingIndicator = document.getElementById('payrollLoadingIndicator');
  const payrollPrintBtn = document.getElementById('payrollPrintBtn');
  const payrollClearBtn = document.getElementById('payrollClearBtn');
  const payrollConfirmModal = document.getElementById('payrollConfirmModal');
  const payrollCancelBtn = document.getElementById('payrollCancelBtn');
  const payrollContinueBtn = document.getElementById('payrollContinueBtn');
  const payrollSuccessModal = document.getElementById('payrollSuccessModal');
  const payrollSuccessOkBtn = document.getElementById('payrollSuccessOkBtn');
  const payrollSuccessMessage = document.getElementById('payrollSuccessMessage');
  const payrollErrorModal = document.getElementById('payrollErrorModal');
  const payrollErrorOkBtn = document.getElementById('payrollErrorOkBtn');
  const payrollErrorText = document.getElementById('payrollErrorText');

  // ── People radio → service number inputs ─────────────────────────────────
  function applyPeopleSelection() {
    const selected = document.querySelector('input[name="payrollPeople"]:checked').value;
    if (selected === 'all') {
      payrollStartNo.disabled = true;
      payrollEndNo.disabled = true;
      payrollStartNo.value = '';
      payrollEndNo.value = '';
    } else if (selected === 'specific') {
      payrollStartNo.disabled = false;
      payrollEndNo.disabled = false;
    } else {
      // individual — only start enabled
      payrollStartNo.disabled = false;
      payrollEndNo.disabled = true;
      payrollEndNo.value = '';
    }
  }

  document.querySelectorAll('input[name="payrollPeople"]').forEach(radio => {
    radio.addEventListener('change', applyPeopleSelection);
  });

  // ── Load current period ───────────────────────────────────────────────────
  async function loadCurrentPeriod() {
    try {
      const token = localStorage.getItem('token');
      const response = await auth.fetchWithAuth(`/salarysummary/filter-options`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (response.ok) {
        const result = await response.json();
        if (result.success && result.data) {
          const period = result.data.currentPeriod;
          payrollYear.value = period.year;
          payrollMonth.value = period.month;
        }
      }
    } catch (error) {
      console.error('Error loading current period:', error);
    }
  }

  // ── Validate → confirm ────────────────────────────────────────────────────
  payrollPrintBtn.addEventListener('click', () => {
    const people = document.querySelector('input[name="payrollPeople"]:checked').value;

    if (!payrollMonth.value) {
      payrollErrorText.textContent = 'Please select a processing month.';
      payrollErrorModal.classList.remove('hidden'); return;
    }
    if (!payrollYear.value) {
      payrollErrorText.textContent = 'Please enter a processing year.';
      payrollErrorModal.classList.remove('hidden'); return;
    }
    if (!payrollHeaderType.value) {
      payrollErrorText.textContent = 'Please select a header type (Code or Description).';
      payrollErrorModal.classList.remove('hidden'); return;
    }
    if ((people === 'specific' || people === 'individual') && !payrollStartNo.value.trim()) {
      payrollErrorText.textContent = 'Please enter a Start Service No.';
      payrollErrorModal.classList.remove('hidden'); return;
    }
    if (people === 'specific' && !payrollEndNo.value.trim()) {
      payrollErrorText.textContent = 'Please enter an End Service No for a specific range.';
      payrollErrorModal.classList.remove('hidden'); return;
    }

    payrollConfirmModal.classList.remove('hidden');
  });

  payrollCancelBtn.addEventListener('click', () => payrollConfirmModal.classList.add('hidden'));

  // ── Generate ──────────────────────────────────────────────────────────────
  payrollContinueBtn.addEventListener('click', async () => {
    payrollConfirmModal.classList.add('hidden');
    payrollLoadingIndicator.classList.remove('hidden');
    payrollPrintBtn.disabled = true;

    const people = document.querySelector('input[name="payrollPeople"]:checked').value;
    const format = document.querySelector('input[name="payrollFormat"]:checked').value;
    const month = payrollMonth.value;
    const year = payrollYear.value;
    const headerType = payrollHeaderType.value;          // 'code' | 'description'
    const reportType = payrollReportType.value;          // 'both' | 'earnings' | 'deductions'
    const summary = document.getElementById('payrollSummary').checked;
    const useIppis = document.getElementById('payrollIppis').checked ? 'Y' : 'N';

    const period = year + String(month).padStart(2, '0'); // YYYYMM

    // Build empnoFrom / empnoTo from people selection
    let empnoFrom = '';
    let empnoTo = '';
    let printRange = false;

    if (people === 'specific') {
      empnoFrom = payrollStartNo.value.trim();
      empnoTo = payrollEndNo.value.trim();
      printRange = true;
    } else if (people === 'individual') {
      empnoFrom = payrollStartNo.value.trim();
      empnoTo = empnoFrom;
      printRange = true;
    }

    try {
      const token = localStorage.getItem('token');

      const endpoint = format === 'pdf'
        ? `${PAYROLL_API_BASE}/export/pdf`
        : `${PAYROLL_API_BASE}/export/excel`;

      const response = await auth.fetchWithAuth(endpoint, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          period, useIppis, printRange: printRange ? '1' : '0',
          useCodeHeader: headerType === 'code' ? 'true' : 'false',
          reportType,
          summary: summary ? '1' : '0',
          ...(empnoFrom && { empnoFrom }),
          ...(empnoTo && { empnoTo })
        })
      });

      if (!response.ok) {
        const errorData = await response.json().catch(() => ({}));
        throw new Error(errorData.error || 'Failed to generate report');
      }

      const blob = await response.blob();

      payrollLoadingIndicator.classList.add('hidden');
      payrollPrintBtn.disabled = false;

      // Store for download
      window.payrollCurrentBlob = blob;
      window.payrollCurrentFormat = format;
      window.payrollCurrentMonth = month;
      window.payrollCurrentYear = year;

      const iframe = document.getElementById('payrollPreviewIframe');
      const dlBtn = document.getElementById('payrollDownloadPreviewBtn');

      if (format === 'pdf') {
        const blobUrl = window.URL.createObjectURL(blob);
        window.payrollCurrentBlobUrl = blobUrl;
        iframe.src = blobUrl + '#toolbar=0';
        iframe.style.minHeight = '842px';
        dlBtn.textContent = 'Download PDF';
      } else {
        iframe.srcdoc = `<div style="font-family:Arial,sans-serif;padding:40px;text-align:center;color:#555;">
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#1e40af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin:0 auto 16px;display:block;">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
            <line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/>
          </svg>
          <p style="font-size:16pt;font-weight:bold;color:#1e40af;margin-bottom:8px;">Excel Report Ready</p>
          <p style="font-size:10pt;">Click <strong>Download Excel</strong> below to save the file.</p>
        </div>`;
        iframe.style.minHeight = '300px';
        dlBtn.textContent = 'Download Excel';
      }

      document.getElementById('payrollPreviewModal').classList.remove('hidden');

    } catch (error) {
      payrollLoadingIndicator.classList.add('hidden');
      payrollPrintBtn.disabled = false;
      payrollErrorText.textContent = error.message || 'Failed to generate report. Please try again.';
      payrollErrorModal.classList.remove('hidden');
      console.error('Error:', error);
    }
  });

  // ── Preview modal controls ────────────────────────────────────────────────
  function closePreview() {
    document.getElementById('payrollPreviewModal').classList.add('hidden');
    const iframe = document.getElementById('payrollPreviewIframe');
    iframe.src = 'about:blank';
    iframe.removeAttribute('srcdoc');
    if (window.payrollCurrentBlobUrl) {
      window.URL.revokeObjectURL(window.payrollCurrentBlobUrl);
      window.payrollCurrentBlobUrl = null;
    }
  }

  document.getElementById('payrollClosePreviewBtn').addEventListener('click', closePreview);
  document.getElementById('payrollCancelPreviewBtn').addEventListener('click', closePreview);

  document.getElementById('payrollDownloadPreviewBtn').addEventListener('click', () => {
    if (!window.payrollCurrentBlob) return;
    const fmt = window.payrollCurrentFormat || 'pdf';
    const url = window.URL.createObjectURL(window.payrollCurrentBlob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `payroll_register_${window.payrollCurrentMonth}_${window.payrollCurrentYear}.${fmt === 'pdf' ? 'pdf' : 'xlsx'}`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    window.URL.revokeObjectURL(url);
    payrollSuccessMessage.textContent = 'Report downloaded successfully!';
    payrollSuccessModal.classList.remove('hidden');
  });

  payrollSuccessOkBtn.addEventListener('click', () => payrollSuccessModal.classList.add('hidden'));
  payrollErrorOkBtn.addEventListener('click', () => payrollErrorModal.classList.add('hidden'));

  payrollClearBtn.addEventListener('click', () => {
    setTimeout(() => {
      document.querySelector('input[name="payrollPeople"][value="all"]').checked = true;
      applyPeopleSelection();
      payrollYear.value = new Date().getFullYear();
      payrollHeaderType.value = '';
      payrollReportType.value = 'both';
      document.getElementById('payrollIppis').checked = false;
    }, 0);
  });

  // ── Init ──────────────────────────────────────────────────────────────────
  applyPeopleSelection();
  loadCurrentPeriod();
</script>
