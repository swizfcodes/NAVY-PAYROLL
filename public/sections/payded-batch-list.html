<!-- BATCH HISTORY SECTION -->
<style>
  @keyframes grow-up {
    0% { height: 0; bottom: 0; }
    100% { height: 100%; bottom: 0; }
  }
  @keyframes grow-down {
    0% { height: 0; top: 0; }
    100% { height: 100%; top: 0; }
  }
  @keyframes expand {
    0% { width: 0; left: 50%; transform: translate(-50%, -50%); }
    100% { width: 100%; left: 0; transform: translateY(-50%); }
  }
  .animate-grow-up {
    animation: grow-up 0.6s ease-in-out infinite alternate;
    position: absolute;
    bottom: 0;
  }
  .animate-grow-down {
    animation: grow-down 0.6s ease-in-out infinite alternate;
    position: absolute;
    top: 0;
  }
  .animate-expand {
    animation: expand 0.6s ease-in-out infinite alternate;
  }
</style>

<div id="section-batch" class="p-6">
  <!-- Header with Search and Actions -->
  <div class="flex items-center justify-between mb-4 gap-2">
    <h2 class="text-2xl font-bold text-gray-800">Batch Upload History</h2>
    
    <div class="flex flex-wrap gap-2 justify-end ml-auto">
      <div class="relative">
        <input type="text" id="tableSearchInput"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 pl-10"
          placeholder="Search by Batch Name or Uploader..." autocomplete="off">
        <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
          <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
        </span>
        <button id="clearSearchBtn"
          class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400 hover:text-gray-600 hidden">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
      <button id="refreshBtn" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
        <i class="fas fa-sync-alt mr-2"></i>Refresh
      </button>
    </div>
  </div>

  <!-- Loading Modal -->
  <div id="loadingModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-xl shadow-lg p-6 max-w-md w-full text-center">
      <div id="loadingIcon" class="mb-3 flex items-center justify-center">
        <div class="relative w-10 h-10">
          <div class="absolute left-1 w-[6px] bg-blue-600 rounded animate-grow-up"></div>
          <div class="absolute right-1 w-[6px] bg-blue-600 rounded animate-grow-down [animation-delay:0.3s]"></div>
          <div class="absolute top-1/2 left-1 h-[6px] bg-blue-600 rounded animate-expand [animation-delay:0.6s] -translate-y-1/2"></div>
        </div>
      </div>
      <h2 class="text-xl font-bold text-blue-600 mb-2">Loading...</h2>
      <p class="text-gray-600">Please wait while we fetch the data.</p>
    </div>
  </div>

  <!-- Error Modal -->
  <div id="errorModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-xl shadow-lg p-6 max-w-md w-full text-center">
      <div class="mb-3 flex items-center justify-center">
        <svg class="h-8 w-8 text-red-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </div>
      <h2 class="text-xl font-bold text-red-600 mb-2">Error</h2>
      <p id="errorMessage" class="text-gray-600 mb-4">An error occurred.</p>
      <button id="closeErrorBtn"
        class="px-5 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg font-medium">Close</button>
    </div>
  </div>

  <!-- Table Section -->
  <div class="overflow-x-auto border rounded-lg shadow-sm">
    <table class="min-w-full border-collapse">
      <thead class="bg-blue-100 text-gray-700 text-sm">
        <tr>
          <th class="border px-4 py-2 text-left">Batch Name</th>
          <th class="border px-4 py-2 text-left">Date Uploaded</th>
          <th class="border px-4 py-2 text-left">Uploaded By</th>
        </tr>
      </thead>
      <tbody id="tableBody" class="text-sm">
        <!-- Dynamic rows will be inserted here -->
      </tbody>
    </table>
  </div>

  <!-- Pagination Controls -->
  <div class="mt-6 flex items-center justify-between">
    <div class="text-sm text-gray-600">
      Showing <span id="startRecord">0</span> to <span id="endRecord">0</span> of <span id="totalRecords">0</span> records
    </div>
    <div class="flex items-center space-x-2">
      <select id="recordsPerPage" class="border border-gray-300 rounded px-2 py-1 text-sm">
        <option value="10">10 per page</option>
        <option value="25">25 per page</option>
        <option value="50">50 per page</option>
        <option value="100">100 per page</option>
      </select>
      <button id="prevPage" class="px-3 py-1 bg-gray-100 text-gray-700 rounded hover:bg-gray-200 disabled:opacity-50">
        Previous
      </button>
      <span class="text-sm">
        Page <span id="currentPage">1</span> of <span id="totalPages">1</span>
      </span>
      <button id="nextPage" class="px-3 py-1 bg-gray-100 text-gray-700 rounded hover:bg-gray-200 disabled:opacity-50">
        Next
      </button>
    </div>
  </div>
</div>

<script>
  const auth = window.authService;
  (function () {
    // Configuration
    const API_ENDPOINT = 'batchpayded; // Change this to your actual endpoint
    
    // DOM Elements
    const tableBody = document.getElementById("tableBody");
    const loadingModal = document.getElementById("loadingModal");
    const errorModal = document.getElementById("errorModal");
    const errorMessage = document.getElementById("errorMessage");
    const closeErrorBtn = document.getElementById("closeErrorBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const tableSearchInput = document.getElementById('tableSearchInput');
    const clearSearchBtn = document.getElementById('clearSearchBtn');

    // Pagination variables
    let currentPage = 1;
    let recordsPerPage = 10;
    let totalRecords = 0;
    let totalPages = 1;
    let currentSearchQuery = '';

    // Pagination elements
    const prevPageBtn = document.getElementById('prevPage');
    const nextPageBtn = document.getElementById('nextPage');
    const currentPageSpan = document.getElementById('currentPage');
    const totalPagesSpan = document.getElementById('totalPages');
    const recordsPerPageSelect = document.getElementById('recordsPerPage');
    const startRecordSpan = document.getElementById('startRecord');
    const endRecordSpan = document.getElementById('endRecord');
    const totalRecordsSpan = document.getElementById('totalRecords');

    // Format date
    function formatDate(dateString) {
      if (!dateString) return 'N/A';
      const date = new Date(dateString);
      return date.toLocaleString('en-NG', {
        year: 'numeric',
        month: 'short',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    // Format uploader(s) - handles both string and array
    function formatUploader(uploader) {
      if (!uploader) return 'N/A';
      
      // If it's an array, join with commas
      if (Array.isArray(uploader)) {
        return uploader.filter(u => u).join(', ') || 'N/A';
      }
      
      // If it's a CSV string, clean it up
      if (typeof uploader === 'string') {
        return uploader.split(',').map(u => u.trim()).filter(u => u).join(', ') || 'N/A';
      }
      
      return String(uploader);
    }

    // Show loading modal
    function showLoading() {
      loadingModal.classList.remove("hidden");
    }

    // Hide loading modal
    function hideLoading() {
      loadingModal.classList.add("hidden");
    }

    // Show error modal
    function showError(message) {
      errorMessage.textContent = message;
      errorModal.classList.remove("hidden");
    }

    // Fetch batch history from API
    async function fetchBatchHistory() {
      try {
        showLoading();
        const token = localStorage.getItem('token');

        let url = `${API_ENDPOINT}/?page=${currentPage}&limit=${recordsPerPage}`;

        if (currentSearchQuery) {
          url += `&search=${encodeURIComponent(currentSearchQuery)}`;
        }

        const response = await auth.fetchWithAuth(url, {
          method: 'GET',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          }
        });

        const result = await response.json();

        hideLoading();

        if (result.success) {
          renderTable(result.data);
          totalRecords = result.pagination?.totalRecords || result.data.length;
          totalPages = result.pagination?.totalPages || 1;
          currentPage = result.pagination?.currentPage || 1;
          updatePaginationUI();
        } else {
          showError(result.message || 'Failed to load batch history');
        }
      } catch (error) {
        hideLoading();
        console.error('Error fetching batch history:', error);
        showError('Error loading batch history. Please try again.');
      }
    }

    // Render table with data
    function renderTable(data) {
      tableBody.innerHTML = '';

      if (!data || data.length === 0) {
        tableBody.innerHTML = `
          <tr>
            <td colspan="3" class="py-4 text-center text-gray-500">No records found</td>
          </tr>
        `;
        return;
      }

      data.forEach(item => {
        const row = document.createElement('tr');
        row.className = 'hover:bg-yellow-50';
        row.innerHTML = `
          <td class="py-3 px-4 border">${item.batch_name || item.batchName || 'N/A'}</td>
          <td class="py-3 px-4 border">${formatDate(item.date_uploaded || item.dateUploaded || item.created_at || item.createdAt)}</td>
          <td class="py-3 px-4 border">${formatUploader(item.uploaded_by || item.uploadedBy || item.uploader)}</td>
        `;
        tableBody.appendChild(row);
      });
    }

    // Update pagination UI
    function updatePaginationUI() {
      currentPageSpan.textContent = currentPage;
      totalPagesSpan.textContent = totalPages;

      const start = (currentPage - 1) * recordsPerPage + 1;
      const end = Math.min(start + recordsPerPage - 1, totalRecords);

      startRecordSpan.textContent = totalRecords === 0 ? 0 : start;
      endRecordSpan.textContent = end;
      totalRecordsSpan.textContent = totalRecords;

      prevPageBtn.disabled = currentPage <= 1;
      nextPageBtn.disabled = currentPage >= totalPages;

      // Show/hide clear button based on search query
      if (currentSearchQuery) {
        clearSearchBtn.classList.remove('hidden');
      } else {
        clearSearchBtn.classList.add('hidden');
      }
    }

    // Perform search
    function performSearch() {
      currentPage = 1; // Reset to first page when searching
      fetchBatchHistory();
    }

    // Clear search
    function clearSearch() {
      currentSearchQuery = '';
      tableSearchInput.value = '';
      clearSearchBtn.classList.add('hidden');
      currentPage = 1;
      fetchBatchHistory();
    }

    // Event Listeners
    closeErrorBtn.addEventListener("click", () => {
      errorModal.classList.add("hidden");
    });

    refreshBtn.addEventListener("click", () => {
      currentPage = 1;
      currentSearchQuery = '';
      tableSearchInput.value = '';
      fetchBatchHistory();
    });

    prevPageBtn.addEventListener('click', () => {
      if (currentPage > 1) {
        currentPage--;
        fetchBatchHistory();
      }
    });

    nextPageBtn.addEventListener('click', () => {
      if (currentPage < totalPages) {
        currentPage++;
        fetchBatchHistory();
      }
    });

    recordsPerPageSelect.addEventListener('change', (e) => {
      recordsPerPage = parseInt(e.target.value);
      currentPage = 1;
      fetchBatchHistory();
    });

    // Search functionality with debounce
    let searchTimeout;
    tableSearchInput.addEventListener('input', (e) => {
      clearTimeout(searchTimeout);
      const query = e.target.value.trim();

      // Debounce search by 500ms
      searchTimeout = setTimeout(() => {
        currentSearchQuery = query;
        performSearch();
      }, 500);
    });

    // Clear search button
    clearSearchBtn.addEventListener('click', clearSearch);

    // Allow Enter key to trigger immediate search
    tableSearchInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        clearTimeout(searchTimeout);
        currentSearchQuery = e.target.value.trim();
        performSearch();
      }
    });

    // Initialize - fetch data on load
    fetchBatchHistory();
  })();
</script>
