<style>
  @keyframes grow-up {
    0% { height: 0; bottom: 0; }
    100% { height: 100%; bottom: 0; }
  }
  @keyframes grow-down {
    0% { height: 0; top: 0; }
    100% { height: 100%; top: 0; }
  }
  @keyframes expand {
    0% { width: 0; left: 50%; transform: translate(-50%, -50%); }
    100% { width: 100%; left: 0; transform: translateY(-50%); }
  }
  .animate-grow-up {
    animation: grow-up 0.6s ease-in-out infinite alternate;
    position: absolute;
    bottom: 0;
  }
  .animate-grow-down {
    animation: grow-down 0.6s ease-in-out infinite alternate;
    position: absolute;
    top: 0;
  }
  .animate-expand {
    animation: expand 0.6s ease-in-out infinite alternate;
  }
</style>


<!-- Payslip Section -->
<section class="items border rounded-lg m-6 max-w-lg mr-auto p-6 mx-auto">
  <h2 class="text-xl text-center border-b font-bold text-blue-600 mb-4">Generate and Print Payslips</h2>

  <form id="payslipForm" class="space-y-4">
    <!-- Radio selection -->
    <div>
      <label class="block font-medium mb-2">Select People</label>
      <div class="flex space-x-4">
        <label class="flex text-sm items-center space-x-2">
          <input type="radio" name="people" value="all" checked>
          <span>All</span>
        </label>
        <label class="flex text-sm items-center space-x-2">
          <input type="radio" name="people" value="specific">
          <span>Specific</span>
        </label>
        <label class="flex text-sm items-center space-x-2">
          <input type="radio" name="people" value="individual">
          <span>Individual</span>
        </label>
      </div>
    </div>

    <!-- Service Number Inputs - Side by Side -->
    <div class="grid grid-cols-2 gap-3">
      <div>
        <label for="startNo" class="block text-sm font-medium mb-1">Start Service No</label>
        <input type="text" id="startNo" name="startNo"
          class="w-full border rounded px-3 py-2 focus:ring focus:ring-blue-300" disabled />
      </div>

      <div>
        <label for="endNo" class="block text-sm font-medium mb-1">End Service No</label>
        <input type="text" id="endNo" name="endNo"
          class="w-full border rounded px-3 py-2 focus:ring focus:ring-blue-300" disabled />
      </div>
    </div>

    <!-- Payroll Class -->
    <div>
      <label for="payrollClass" class="block text-sm font-medium mb-1">Payroll Class</label>
      <select id="payrollClass" name="payrollClass"
        class="w-full bg-transparent border border-blue-500 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-transparent"
        disabled>
      </select>
    </div>

    <!-- Output Format -->
    <div>
      <label class="block font-medium mb-2">Output Format</label>
      <div class="flex space-x-4">
        <label class="flex text-sm items-center space-x-2">
          <input type="radio" name="format" value="pdf" checked>
          <span>PDF</span>
        </label>
        <label class="flex text-sm items-center space-x-2">
          <input type="radio" name="format" value="excel">
          <span>Excel</span>
        </label>
      </div>
    </div>

    <!-- Buttons -->
    <div class="flex gap-2 justify-end pt-2">
      <button type="reset" id="clearBtn" class="px-4 py-2 bg-gray-500 text-white rounded hover:bg-gray-600">
        Clear
      </button>
      <button type="button" id="generateBtn" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
        Generate
      </button>
    </div>
  </form>
</section>


<!-- Loading Indicator -->
<div id="loadingIndicator" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-lg w-80 p-6 text-center">
    <div class="relative w-10 h-10 mx-auto mb-4">
      <div class="absolute left-1 w-[6px] bg-blue-600 rounded animate-grow-up"></div>
      <div class="absolute right-1 w-[6px] bg-blue-600 rounded animate-grow-down [animation-delay:0.3s]"></div>
      <div
        class="absolute top-1/2 left-1 h-[6px] bg-blue-600 rounded animate-expand [animation-delay:0.6s] -translate-y-1/2">
      </div>
    </div>
    <span class="text-gray-700">Generating payslips...</span>
  </div>
</div>

<!-- Confirmation Modal -->
<div id="confirmModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-lg w-96 p-6">
    <h3 class="text-lg font-semibold mb-4">Confirm Payslip Generation</h3>
    <p class="mb-6 text-gray-700">Do you want to continue and generate payslips?</p>

    <div class="flex justify-end space-x-2">
      <button id="cancelBtn" class="px-4 py-2 bg-gray-400 text-white rounded hover:bg-gray-500">
        Cancel
      </button>
      <button id="continueBtn" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
        Continue
      </button>
    </div>
  </div>
</div>

<!-- Success Modal -->
<div id="successModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-lg w-96 p-6 text-center">
    <h3 class="text-lg font-semibold text-green-600 mb-4">Success</h3>
    <p class="mb-6 text-gray-700" id="successMessage">Payslips generated successfully!</p>
    <button id="successOkBtn" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700">
      OK
    </button>
  </div>
</div>

<!-- Error Modal -->
<div id="errorModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-lg w-96 p-6 text-center">
    <h3 class="text-lg font-semibold text-red-600 mb-4">Error</h3>
    <p class="mb-6 text-gray-700" id="errorMessage">Please fill in Start and End Service Numbers.</p>
    <button id="errorOkBtn" class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700">
      OK
    </button>
  </div>
</div>

<!-- Preview Modal -->
<div id="previewModal" class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4">
  <div class="bg-gray-50 rounded-lg shadow-lg w-full max-w-4xl max-h-[90vh] overflow-hidden">
    <div class="sticky top-0 bg-navy border-b px-4 py-2 flex justify-between items-center">
      <h3 class="text-lg text-white font-semibold">Payslip Preview</h3>
      <button id="closePreviewBtn" class="text-white text-4xl">&times;</button>
    </div>

    <div class="overflow-auto" style="max-height: calc(90vh - 120px); background: #d1d5db;">
      <iframe id="previewIframe"
              title="Payslip Preview"
              style="width: 100%; min-height: 842px; border: none; background: #d1d5db; display: block;">
      </iframe>
    </div>

    <div class="sticky bottom-0 bg-gray-50 border-t px-6 py-2 flex justify-end space-x-2">
      <button id="cancelPreviewBtn" class="px-4 py-2 bg-gray-400 text-white rounded hover:bg-gray-500">
        Cancel
      </button>
      <button id="downloadPreviewBtn" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
        Download PDF
      </button>
    </div>
  </div>
</div>

<script>
  const auth = window.authService;
  const peopleRadios = document.querySelectorAll('input[name="people"]');
  const startNo = document.getElementById("startNo");
  const endNo = document.getElementById("endNo");
  const generateBtn = document.getElementById("generateBtn");
  const clearBtn = document.getElementById("clearBtn");
  const loadingIndicator = document.getElementById("loadingIndicator");
  const payrollClass = document.getElementById("payrollClass");

  const confirmModal = document.getElementById("confirmModal");
  const cancelBtn = document.getElementById("cancelBtn");
  const continueBtn = document.getElementById("continueBtn");

  const successModal = document.getElementById("successModal");
  const successOkBtn = document.getElementById("successOkBtn");
  const successMessage = document.getElementById("successMessage");

  const errorModal = document.getElementById("errorModal");
  const errorOkBtn = document.getElementById("errorOkBtn");
  const errorMessage = document.getElementById("errorMessage");

  // ── Load payroll classes ──────────────────────────────────────────
  async function loadPayrollClasses() {
    try {
      const token = localStorage.getItem('token');
      const response = await auth.fetchWithAuth(`/payslips/filter-options`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (response.ok) {
        const result = await response.json();
        if (result.success && result.data.locations) {
          payrollClass.innerHTML = '<option value="">All Locations</option>';
          result.data.locations.forEach(cls => {
            const option = document.createElement('option');
            option.value = cls.classcode;
            option.textContent = cls.classname || cls.classcode;
            payrollClass.appendChild(option);
          });
        }
      }
    } catch (error) {
      console.error('Error loading locations:', error);
    }
  }

  async function fetchDatabaseName() {
    try {
      const token = localStorage.getItem("token");
      const res = await auth.fetchWithAuth("/payslips/database", {
        method: "GET",
        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` }
      });
      const data = await res.json();
      payrollClass.innerHTML = "";
      const option = document.createElement("option");
      option.value = data.database;
      option.textContent = data.class_name;
      option.selected = true;
      payrollClass.appendChild(option);
    } catch (err) {
      console.error("Failed to load payroll class:", err);
    }
  }

  function toggleInputs() {
    const selectedValue = document.querySelector('input[name="people"]:checked').value;
    if (selectedValue === 'all') {
      startNo.disabled = true; endNo.disabled = true;
      startNo.value = ''; endNo.value = '';
    } else if (selectedValue === 'specific') {
      startNo.disabled = false; endNo.disabled = false;
    } else if (selectedValue === 'individual') {
      startNo.disabled = false; endNo.disabled = true; endNo.value = '';
    }
  }

  function updateFormatOptions() {
    const selectedPeople = document.querySelector('input[name="people"]:checked').value;
    const excelRadio = document.querySelector('input[name="format"][value="excel"]');
    const pdfRadio = document.querySelector('input[name="format"][value="pdf"]');
    /*if (selectedPeople === 'individual') {
      excelRadio.disabled = true;
      excelRadio.parentElement.classList.add('opacity-50', 'cursor-not-allowed');
      pdfRadio.checked = true;
    } else {
      excelRadio.disabled = false;
      excelRadio.parentElement.classList.remove('opacity-50', 'cursor-not-allowed');
    }*/
  }

  peopleRadios.forEach(radio => {
    radio.addEventListener("change", () => { toggleInputs(); updateFormatOptions(); });
  });

  generateBtn.addEventListener("click", () => {
    const selectedPeople = document.querySelector('input[name="people"]:checked').value;
    if (selectedPeople === 'specific' && (!startNo.value || !endNo.value)) {
      errorMessage.textContent = 'Please fill in both Start and End Service Numbers for range selection.';
      errorModal.classList.remove("hidden"); return;
    }
    if (selectedPeople === 'individual' && !startNo.value) {
      errorMessage.textContent = 'Please enter a Service Number.';
      errorModal.classList.remove("hidden"); return;
    }
    confirmModal.classList.remove("hidden");
  });

  cancelBtn.addEventListener("click", () => confirmModal.classList.add("hidden"));

  continueBtn.addEventListener("click", async () => {
    confirmModal.classList.add("hidden");
    loadingIndicator.classList.remove("hidden");
    generateBtn.disabled = true;

    const selectedPeople = document.querySelector('input[name="people"]:checked').value;
    const payrollClassVal = document.getElementById("payrollClass").value;
    const format = document.querySelector('input[name="format"]:checked').value;

    try {
      const token = localStorage.getItem('token');
      const params = new URLSearchParams();

      if (selectedPeople === 'all') {
        params.append('optall', '1'); params.append('empno1', ''); params.append('empno2', '');
      } else if (selectedPeople === 'specific') {
        params.append('optrange', '1'); params.append('empno1', startNo.value); params.append('empno2', endNo.value);
      } else if (selectedPeople === 'individual') {
        params.append('optindividual', '1'); params.append('empno1', startNo.value); params.append('empno2', '');
      }

      params.append('branch', payrollClassVal);
      params.append('wxdate', new Date().toISOString().split('T')[0]);

      const dataResponse = await auth.fetchWithAuth(`/payslips/generate?${params.toString()}`, {
        method: 'GET',
        headers: { 'Authorization': `Bearer ${token}` }
      });

      if (!dataResponse.ok) {
        const errorData = await dataResponse.json();
        throw new Error(errorData.message || errorData.error || 'Failed to generate payslip data');
      }

      const result = await dataResponse.json();
      if (!result.success || !result.data || result.data.length === 0) {
        throw new Error('No payslip data generated. Please check your selection.');
      }

      loadingIndicator.classList.add("hidden");
      generateBtn.disabled = false;

      // Always show preview first; download happens from inside the modal
      showPreviewModal(result.data, format, token);

    } catch (error) {
      loadingIndicator.classList.add("hidden");
      generateBtn.disabled = false;
      errorMessage.textContent = error.message || 'Failed to generate payslips. Please try again.';
      errorModal.classList.remove("hidden");
      console.error('Error:', error);
    }
  });

  successOkBtn.addEventListener("click", () => successModal.classList.add("hidden"));
  errorOkBtn.addEventListener("click", () => errorModal.classList.add("hidden"));

  clearBtn.addEventListener("click", () => {
    document.querySelector('input[name="people"][value="all"]').checked = true;
    toggleInputs();
  });

  // ══════════════════════════════════════════════════════════════════
  // PREVIEW MODAL — renders the EXACT A5 template inside an iframe
  // ══════════════════════════════════════════════════════════════════

  function showPreviewModal(payslipDataArray, format, token) {
    // Normalise: always work with an array
    const dataArray = Array.isArray(payslipDataArray) ? payslipDataArray : [payslipDataArray];
    window.currentPayslipData = dataArray;
    window.currentFormat = format;
    window.currentToken = token;

    // Update download button label to reflect format and count
    const dlBtn = document.getElementById('downloadPreviewBtn');
    const count = dataArray.length;
    dlBtn.textContent = count > 1
      ? `Download ${count} Payslips (${format.toUpperCase()})`
      : `Download PDF`;

    // Attempt to load the logo as base64 so the watermark works
    fetch('photos/logo.png')
      .then(r => r.blob())
      .then(blob => new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.readAsDataURL(blob);
      }))
      .catch(() => '')
      .then(logoDataUrl => {
        const html = buildExactPayslipHTML(dataArray, logoDataUrl);
        const iframe = document.getElementById('previewIframe');

        // Each A5 page is 794px + 24px gap + 32px top/bottom body padding
        const estimatedHeight = dataArray.length * 818 + 32;
        iframe.style.height = estimatedHeight + 'px';

        // Write HTML directly into the iframe
        iframe.srcdoc = html;

        // Refine height once content is actually loaded
        iframe.onload = function () {
          try {
            const body = iframe.contentDocument.body;
            if (body) {
              iframe.style.height = Math.max(794, body.scrollHeight + 20) + 'px';
            }
          } catch (e) { /* cross-origin safety, ignore */ }
        };

        document.getElementById('previewModal').classList.remove('hidden');
      });
  }

  // ── Helpers ──────────────────────────────────────────────────────

  function esc(s) {
    if (s === null || s === undefined) return '';
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function fmt(n) {
    return (parseFloat(n) || 0).toLocaleString('en-NG', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function fmtDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    return isNaN(d) ? dateStr : d.toLocaleDateString('en-GB', { day: '2-digit', month: 'long', year: 'numeric' });
  }

  function sumByType(earnings, type) {
    return (earnings || []).filter(e => e.type === type).reduce((s, e) => s + (parseFloat(e.amount) || 0), 0);
  }

  // ── Build the full A5 HTML document (exact replica of doc 2) ─────
  function buildExactPayslipHTML(employees, logoDataUrl) {
    const logoUrl = logoDataUrl || 'photos/logo.png';
    const payDate = fmtDate(new Date().toISOString());
    const className = employees[0] && employees[0].payclass_name ? employees[0].payclass_name : '';

    const css = `
      @page { size: A5; margin: 10mm; margin-top: 0.2mm; margin-bottom: 0.2mm; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html {
        font-family: 'Helvetica', 'Arial', sans-serif;
        font-size: 7pt; color: #1a1a1a; line-height: 1.2;
        background-color: #d1d5db;
      }
      body { background-color: transparent; margin: 0; }
      /* Each employee = one A5 sheet */
      .container {
        position: relative;
        width: 559px;       /* A5 at 96dpi: 148mm */
        min-height: 794px;  /* A5 at 96dpi: 210mm */
        margin: 16px auto;
        padding: 10mm;
        padding-top: 10px;
        padding-bottom: 10px;
        background-color: #f8fbff;
        box-shadow: 0 4px 24px rgba(0,0,0,0.28);
        overflow: hidden;
        z-index: 1;
      }
      .container:last-child { margin-bottom: 0; }
      /* Watermark per page — use ::before on each .container */
      .container::before {
        content: "";
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background-image: url('${logoUrl}');
        background-size: auto 100%; background-repeat: no-repeat;
        background-position: center center;
        opacity: 0.02; z-index: 0; pointer-events: none;
      }
      .container > * { position: relative; z-index: 1; }
      @media print {
        html { background: none; }
        body { padding: 0; }
        .container {
          width: 100%; min-height: 0; margin: 0; padding: 10px;
          box-shadow: none; page-break-after: always;
          background-color: #f8fbff;
          print-color-adjust: exact; -webkit-print-color-adjust: exact;
        }
        .container:last-child { page-break-after: auto; }
        .container::before { position: fixed; }
      }
      .header-wrapper {
        display: flex; align-items: flex-start; margin-bottom: 8px;
        border-bottom: 2px solid #1a1a1a; padding-bottom: 5px;
      }
      .className { flex-shrink: 0; margin-right: 20px; align-self: center; font-size: 6pt; font-weight: bold; }
      .header { flex-grow: 1; text-align: center; }
      .header h1 {
        font-size: 13pt; font-weight: bold; margin-bottom: 2px; letter-spacing: 1.5px;
        color: #1e40af; font-family: 'Libre Baskerville', Georgia, serif;
      }
      .header h2 {
        font-size: 10pt; font-weight: normal; margin-top: 2px; color: #4a4a4a;
        font-family: 'Libre Baskerville', Georgia, serif;
      }
      .pay-period {
        width: 100%; margin: 3px 0; font-size: 7pt;
        display: flex; justify-content: space-between; align-items: center;
        background-color: #fafafa;
      }
      .pp-left, .pp-right { color: #4a4a4a; white-space: nowrap; }
      .pp-left strong, .pp-right strong { color: #1a1a1a; }
      .pp-center {
        flex-grow: 1; text-align: center; font-size: 7pt; font-weight: bold;
        color: #1a1a1a; letter-spacing: 0.5px; text-transform: uppercase;
        padding: 0 5px; white-space: nowrap;
        font-family: "Times New Roman", Times, serif; font-style: italic;
      }
      .section-header {
        font-size: 8pt; font-weight: bold; margin-top: 3px; margin-bottom: 4px;
        padding: 2px 5px; color: #1e40af; text-transform: uppercase;
        letter-spacing: 0.5px; width: 70%;
      }
      .employee-info {
        margin-bottom: 6px; padding: 2px 6px; background-color: #fafafa;
        border: 1px solid #d0d0d0; width: 70%;
      }
      .info-row { display: flex; padding: 2px 0; font-size: 7pt; border-bottom: 1px solid #f0f0f0; }
      .info-row:last-child { border-bottom: none; }
      .info-label { font-weight: 600; min-width: 85px; flex-shrink: 0; color: #1a1a1a; }
      .info-value { flex-grow: 1; color: #4a4a4a; }
      .items-table { width: 70%; border-collapse: collapse; margin-bottom: 0; }
      .items-table tbody tr { border-bottom: 1px solid #f0f0f0; }
      .items-table tbody td { padding: 1px 4px; font-size: 7pt; vertical-align: middle; color: #4a4a4a; }
      .items-table tbody td.amount {
        text-align: right; white-space: nowrap;
        font-family: 'Courier New', monospace; color: #1a1a1a;
        font-weight: 700; font-size: 7.5pt; padding-right: 8px; width: 90px;
      }
      /* Deduction layout — left zone (70%) + right zone (30%) side by side */
      .full-row { width: 100%; display: flex; align-items: flex-start; }
      .full-row .left-zone { width: 70%; flex-shrink: 0; }
      .full-row .right-zone { width: 30%; flex-shrink: 0; padding-left: 0; }
      /* Left-zone deduction table — stays within 70% */
      .ded-table { width: 100%; border-collapse: collapse; margin-bottom: 0; }
      .ded-table tbody tr { border-bottom: 1px solid #f0f0f0; }
      .ded-table col.col-desc { width: auto; }
      .ded-table col.col-amt { width: 90px; }
      .ded-table td { padding: 1px 4px; font-size: 7pt; vertical-align: middle; }
      .ded-table td.ded-desc { color: #4a4a4a; }
      .ded-table td.ded-amt {
        text-align: right; white-space: nowrap;
        font-family: 'Courier New', monospace; color: #1a1a1a;
        font-weight: 700; font-size: 7.5pt; padding-right: 8px;
      }
      /* Right-zone rows — L.Bal / Os.Mths, one per deduction row */
      .rz-rows { width: 100%; }
      .rz-row {
        display: flex; justify-content: space-between; align-items: center;
        min-height: 14.8px; padding: 1px 4px 1px 12px; box-sizing: border-box;
      }
      .rz-row.rz-has-data { border-bottom: 1px solid #f0f0f0; }
      .rz-row.rz-empty { border-bottom: none; }
      .rz-lbal {
        text-align: left; font-family: 'Courier New', monospace;
        font-size: 7pt; font-weight: 600; color: #1a1a1a;
      }
      .rz-osmths {
        text-align: right; font-family: 'Courier New', monospace;
        font-size: 7pt; font-weight: 600; color: #7c3aed;
      }
      /* Deduction section header — label 70% + L.Bal/Os.Mths 30% */
      .ded-header-row { width: 100%; display: flex; align-items: flex-end; }
      .ded-header-row .dh-label {
        width: 70%; flex-shrink: 0; font-size: 8pt; font-weight: bold;
        margin-top: 3px; margin-bottom: 4px; padding: 2px 5px; color: #1e40af;
        text-transform: uppercase; letter-spacing: 0.5px;
      }
      .ded-header-row .dh-cols {
        width: 30%; flex-shrink: 0; display: flex;
        justify-content: space-between; padding: 0 4px 4px 12px;
      }
      .dh-col { font-size: 7pt; font-weight: 600; color: #4a4a4a; }
      /* Total / net-pay rows */
      .total-row {
        background-color: #f5f5f5; border-top: 1px solid #d0d0d0;
        border-bottom: 1px solid #d0d0d0; padding: 2px 6px;
        display: flex; justify-content: space-between;
        font-size: 8pt; font-weight: 600; width: 70%;
      }
      .total-row .label { text-transform: uppercase; color: #1a1a1a; }
      .total-row .amount {
        text-align: right; min-width: 90px;
        font-family: 'Courier New', monospace; color: #1a1a1a; font-weight: 700;
      }
      .emolument-row {
        background-color: #f5f5f5; border: 1px solid #1a1a1a;
        padding: 3px 6px; margin: 2px 0; display: flex;
        justify-content: space-between; font-size: 8.5pt; font-weight: bold; width: 70%;
      }
      .emolument-row .label { text-transform: uppercase; color: #1a1a1a; }
      .emolument-row .amount {
        text-align: right; min-width: 90px;
        font-family: 'Courier New', monospace; color: #1a1a1a; font-weight: 700;
      }
      .net-pay {
        background-color: #f0f0f0; border: 2px solid #1a1a1a;
        padding: 5px 6px; margin: 4px 0; display: flex;
        justify-content: space-between; font-size: 9pt; font-weight: bold; width: 70%;
      }
      .net-pay .label { text-transform: uppercase; letter-spacing: 1px; }
      .net-pay .amount {
        text-align: right; min-width: 80px;
        font-family: 'Courier New', monospace; font-weight: 800;
      }
      .footer {
        margin-top: 3px; padding-top: 1px; border-top: 2px solid #d0d0d0;
        text-align: center; font-size: 6pt; color: #6a6a6a;
      }
      .footer p { margin: 1px 0; }
      .footer p:first-child { font-weight: 600; color: #4a4a4a; }
      @media print {
        body { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
        body::before { position: fixed; display: block; }
      }
    `;

    const pages = employees.map((emp, idx) => {
      const earnings  = emp.earnings  || [];
      const deductions = emp.deductions || [];

      const taxableRows = earnings
        .filter(e => e.type === 'Taxable')
        .map(e => `<tr><td>${esc(e.description)}</td><td class="amount">&#x20A6;${fmt(e.amount)}</td></tr>`)
        .join('');

      const nonTaxableRows = earnings
        .filter(e => e.type === 'Non-Taxable')
        .map(e => `<tr><td>${esc(e.description)}</td><td class="amount">&#x20A6;${fmt(e.amount)}</td></tr>`)
        .join('');

      const dedLeftRows = deductions.map(item =>
        `<tr>
          <td class="ded-desc">${esc(item.description)}</td>
          <td class="ded-amt">&#x20A6;${fmt(item.amount)}</td>
        </tr>`
      ).join('');

      const dedRightRows = deductions.map(item => {
        const lbal  = (item.is_loan && item.loan_balance) ? fmt(item.loan_balance) : '';
        const osmth = (item.is_loan && item.outstanding_months && item.outstanding_months !== '-' && item.outstanding_months !== 0)
          ? esc(String(item.outstanding_months)) : '';
        const hasData = !!(lbal || osmth);
        return `<div class="rz-row ${hasData ? 'rz-has-data' : 'rz-empty'}">
          <span class="rz-lbal">${lbal}</span>
          <span class="rz-osmths">${osmth}</span>
        </div>`;
      }).join('');

      const taxableTotal    = sumByType(earnings, 'Taxable');
      const nonTaxableTotal = sumByType(earnings, 'Non-Taxable');
      const totalEmolument  = taxableTotal + nonTaxableTotal;

      const nsitfRow = emp.nsitfcode
        ? `<div class="info-row"><span class="info-label">RSA (Pension):</span><span class="info-value">${esc(emp.nsitfcode)}</span></div>`
        : '';

      const pageBreak = '';

      return `
      <div class="container">

        <!-- HEADER -->
        <div class="header-wrapper">
          <div class="className">${emp.payclass ? esc(emp.payclass_name || '') : ''}</div>
          <div class="header">
            <h1>Nigerian Navy (Naval Headquarters)</h1>
            <h2>CENTRAL PAY OFFICE, 23 POINT ROAD APAPA</h2>
          </div>
        </div>

        <!-- PAY PERIOD -->
        <div class="pay-period">
          <span class="pp-left"><strong>Pay Period:</strong> ${esc(emp.payroll_month)} ${esc(String(emp.payroll_year))}</span>
          <span class="pp-center">${esc(emp.payclass_name || className)} PAYSLIP</span>
          <span class="pp-right"><strong>Produced On:</strong> ${payDate}</span>
        </div>

        <!-- EMPLOYEE INFO -->
        <div class="section-header">Personnel Information</div>
        <div class="employee-info">
          <div class="info-row">
            <span class="info-label">Name:</span>
            <span class="info-value">${esc(emp.title)}. ${esc(emp.surname)} ${esc(emp.othername)}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Service No:</span>
            <span class="info-value">${esc(emp.employee_id)}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Grade:</span>
            <span class="info-value">${esc(emp.gradelevel)}${emp.gradetype ? ' - ' + esc(emp.gradetype) : ''}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Department:</span>
            <span class="info-value">${esc(emp.department)}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Branch:</span>
            <span class="info-value">${esc(emp.factory)}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Bank Account:</span>
            <span class="info-value">${esc(emp.bank_account_number)}${emp.bank_name ? ' (' + esc(emp.bank_name) + ')' : ''}</span>
          </div>
          ${nsitfRow}
        </div>

        <!-- TAXABLE PAYMENT — deduction-style header with L.Bal / Os.Mths labels -->
        <div class="ded-header-row">
          <div class="dh-label">Taxable Payment</div>
          <div class="dh-cols">
            <span class="dh-col">&#x20A6;L.Bal</span>
            <span class="dh-col">Os.Mths</span>
          </div>
        </div>
        <table class="items-table">
          <tbody>${taxableRows}</tbody>
        </table>
        <div class="total-row">
          <span class="label">Total Taxable Payment</span>
          <span class="amount">&#x20A6;${fmt(taxableTotal)}</span>
        </div>

        <!-- NON-TAXABLE PAYMENT -->
        <div class="section-header">Non-Taxable Payment</div>
        <table class="items-table">
          <tbody>${nonTaxableRows}</tbody>
        </table>
        <div class="total-row">
          <span class="label">Total Non-Taxable Payment</span>
          <span class="amount">&#x20A6;${fmt(nonTaxableTotal)}</span>
        </div>

        <!-- TOTAL EMOLUMENT -->
        <div class="emolument-row">
          <span class="label">Total Emolument</span>
          <span class="amount">&#x20A6;${fmt(totalEmolument)}</span>
        </div>

        <!-- DEDUCTIONS -->
        <div class="section-header">Deductions</div>
        <div class="full-row">
          <div class="left-zone">
            <table class="ded-table">
              <colgroup><col class="col-desc"><col class="col-amt"></colgroup>
              <tbody>${dedLeftRows}</tbody>
            </table>
          </div>
          <div class="right-zone">
            <div class="rz-rows">${dedRightRows}</div>
          </div>
        </div>
        <div class="total-row">
          <span class="label">Total Deduction</span>
          <span class="amount">&#x20A6;${fmt(emp.total_deductions)}</span>
        </div>

        <!-- NET PAY -->
        <div class="net-pay">
          <span class="label">Net Payment This Month</span>
          <span class="amount">&#x20A6;${fmt(emp.net_pay)}</span>
        </div>

        <div class="footer">
          <p>All rights reserved &copy; Hicad Systems Limited.</p>
        </div>

      </div>
      ${pageBreak}`;
    }).join('');

    return `<!DOCTYPE html>
    <html>
    <head>
      <meta charset="UTF-8">
      <style>${css}</style>
    </head>
    <body>${pages}</body>
    </html>`;
  }

  // ── Download payslips (unchanged) ────────────────────────────────
  async function downloadPayslips(data, format, token) {
    const exportEndpoint = format === 'pdf' ? '/payslips/export/pdf' : '/payslips/export/excel';

    const exportResponse = await auth.fetchWithAuth(exportEndpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({ data: data })
    });

    if (!exportResponse.ok) throw new Error('Failed to generate file');

    const blob = await exportResponse.blob();
    const url = window.URL.createObjectURL(blob);

    if (format === 'pdf') window.open(url, '_blank');

    const a = document.createElement('a');
    a.href = url;
    a.download = `payslips_${new Date().getTime()}.${format === 'pdf' ? 'pdf' : 'xlsx'}`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => window.URL.revokeObjectURL(url), 100);
  }

  // ── Preview modal controls ────────────────────────────────────────
  document.getElementById('closePreviewBtn').addEventListener('click', () => {
    document.getElementById('previewModal').classList.add('hidden');
    // Clear iframe to free memory
    document.getElementById('previewIframe').removeAttribute('srcdoc');
  });

  document.getElementById('cancelPreviewBtn').addEventListener('click', () => {
    document.getElementById('previewModal').classList.add('hidden');
    document.getElementById('previewIframe').removeAttribute('srcdoc');
  });

  document.getElementById('downloadPreviewBtn').addEventListener('click', async () => {
    const dlBtn = document.getElementById('downloadPreviewBtn');
    dlBtn.disabled = true;
    dlBtn.textContent = 'Preparing…';
    try {
      await downloadPayslips(window.currentPayslipData, window.currentFormat || 'pdf', window.currentToken);
      document.getElementById('previewModal').classList.add('hidden');
      document.getElementById('previewIframe').removeAttribute('srcdoc');
      const count = window.currentPayslipData.length;
      successMessage.textContent = count > 1
        ? `${count} payslips downloaded successfully!`
        : 'Payslip downloaded successfully!';
      successModal.classList.remove('hidden');
    } catch (error) {
      errorMessage.textContent = 'Failed to download payslip. Please try again.';
      errorModal.classList.remove('hidden');
    } finally {
      dlBtn.disabled = false;
      const fmt = window.currentFormat || 'pdf';
      const count = (window.currentPayslipData || []).length;
      dlBtn.textContent = count > 1 ? `Download ${count} Payslips (${fmt.toUpperCase()})` : 'Download PDF';
    }
  });

  toggleInputs();
  updateFormatOptions();
  loadPayrollClasses();
  fetchDatabaseName();
</script>
