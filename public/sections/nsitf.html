<style>
  @keyframes grow-up {
    0% { height: 0; bottom: 0; }
    100% { height: 100%; bottom: 0; }
  }
  @keyframes grow-down {
    0% { height: 0; top: 0; }
    100% { height: 100%; top: 0; }
  }
  @keyframes expand {
    0% { width: 0; left: 50%; transform: translate(-50%, -50%); }
    100% { width: 100%; left: 0; transform: translateY(-50%); }
  }
  .animate-grow-up {
    animation: grow-up 0.6s ease-in-out infinite alternate;
    position: absolute;
    bottom: 0;
  }
  .animate-grow-down {
    animation: grow-down 0.6s ease-in-out infinite alternate;
    position: absolute;
    top: 0;
  }
  .animate-expand {
    animation: expand 0.6s ease-in-out infinite alternate;
  }
</style>

<!-- NSITF REPORT -->
<section class="items border rounded-lg m-6 max-w-xl mr-auto p-6 mx-auto">
  <h2 class="text-xl text-center border-b font-bold text-blue-600 mb-4">Print NSITF Reports</h2>

  <form id="nsitfPfaForm" class="space-y-4">
    <!-- Pfa Selection -->
    <div>
      <label class="block font-medium mb-2">Select PFA</label>
      <div class="flex space-x-4">
        <label class="flex text-sm items-center space-x-2">
          <input type="radio" id="allPfas" name="pfaChoice" value="all" checked>
          <span>All PFAS</span>
        </label>
        <label class="flex text-sm items-center space-x-2">
          <input type="radio" id="specificPfa" name="pfaChoice" value="specific">
          <span>Specific PFA</span>
        </label>
      </div>
      <select id="pfaDropdown"
        class="w-full bg-transparent border border-blue-500 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-transparent" disabled>
        <option value="">Select Pfa</option>
      </select>
    </div>

    <!-- Processing Month + Year -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
      <div class="col-span-1">
        <label for="pfaType" class="block text-sm font-medium mb-1">PFA Payment Type</label>
        <select id="pfaType"
          class="w-full bg-transparent border border-blue-500 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-transparent">
          <option value="">Select Type</option>
          <!-- Options populated from database -->
        </select>
      </div>
      <div class="col-span-1">
        <label for="pfaMonth" class="block text-sm font-medium mb-1">Processing Month</label>
        <select id="pfaMonth"
          class="w-full bg-transparent border border-blue-500 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-transparent">
          <option value="">Select Month</option>
          <option>January</option><option>February</option><option>March</option>
          <option>April</option><option>May</option><option>June</option>
          <option>July</option><option>August</option><option>September</option>
          <option>October</option><option>November</option><option>December</option>
        </select>
      </div>
      <div class="col-span-1">
        <label for="pfaYear" class="block text-sm font-medium mb-1">Processing Year</label>
        <input type="number" id="year" name="year" placeholder="Year"
          class="w-full bg-transparent border border-blue-500 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          min="2000" max="2100" value="" />
      </div>
    </div>

    <!-- Output Format -->
    <div>
      <label class="block font-medium mb-2">Output Format</label>
      <div class="flex space-x-4">
        <label class="flex text-sm items-center space-x-2">
          <input type="radio" name="pfaFormat" value="pdf" checked><span>PDF</span>
        </label>
        <label class="flex text-sm items-center space-x-2">
          <input type="radio" name="pfaFormat" value="excel"><span>Excel</span>
        </label>
      </div>
    </div>

    <div class="flex justify-between items-center gap-2 mb-4">
      <div class="flex items-center space-x-2">
        <input type="checkbox" id="pfaSummary" class="h-4 w-4">
        <label for="pfaSummary" class="text-sm">Summary Report</label>
      </div>
      <div class="flex space-x-2 pt-2">
        <button type="reset" id="pfaClearBtn" class="px-4 py-2 bg-gray-500 text-white rounded hover:bg-gray-600">Clear</button>
        <button type="button" id="pfaPrintBtn" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Generate</button>
      </div>
    </div>
  </form>
</section>

<!-- Confirm -->
<div id="pfaConfirmModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-lg w-96 p-6">
    <h3 class="text-lg font-semibold mb-4">Confirm Generation</h3>
    <p class="mb-6 text-gray-700">Do you want to continue with report generation?</p>
    <div class="flex justify-end gap-2">
      <button id="pfaCancelBtn" class="px-4 py-2 bg-gray-400 text-white rounded hover:bg-gray-500">Cancel</button>
      <button id="pfaContinueBtn" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Continue</button>
    </div>
  </div>
</div>

<!-- Processing -->
<div id="pfaProcessingModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-lg w-80 p-6 text-center">
    <div class="relative w-10 h-10 mx-auto mb-4">
      <div class="absolute left-1 w-[6px] bg-blue-600 rounded animate-grow-up"></div>
      <div class="absolute right-1 w-[6px] bg-blue-600 rounded animate-grow-down [animation-delay:0.3s]"></div>
      <div class="absolute top-1/2 left-1 h-[6px] bg-blue-600 rounded animate-expand [animation-delay:0.6s] -translate-y-1/2"></div>
    </div>
    <p class="text-gray-700">Generating report...</p>
  </div>
</div>

<!-- Success -->
<div id="pfaSuccessModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-lg w-96 p-6 text-center">
    <h3 class="text-lg font-semibold text-green-600 mb-4">Success</h3>
    <p class="mb-6 text-gray-700" id="pfaSuccessMessage">Report generated successfully!</p>
    <button id="pfaPrintNowBtn" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">OK</button>
  </div>
</div>

<!-- Error -->
<div id="pfaErrorModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-lg w-96 p-6 text-center">
    <h3 class="text-lg font-semibold text-red-600 mb-4">Error</h3>
    <p id="pfaErrorText" class="mb-6 text-gray-700">Please complete required fields.</p>
    <button id="pfaErrorOkBtn" class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700">OK</button>
  </div>
</div>

<!-- Preview Modal — portrait: max-w-4xl -->
<div id="pfaPreviewModal"
  class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4">
  <div class="bg-gray-50 rounded-lg shadow-lg w-full max-w-5xl max-h-[90vh] overflow-hidden">
    <div class="sticky top-0 bg-navy px-6 py-2 flex justify-between items-center">
      <h3 class="text-lg font-semibold text-white">NSITF Report Preview</h3>
      <button id="pfaClosePreviewBtn" class="text-white hover:text-gray-200 text-2xl">&times;</button>
    </div>
    <div class="overflow-auto" style="max-height: calc(90vh - 100px); background: #d1d5db;">
      <iframe id="pfaPreviewIframe" title="NSITF Report Preview"
        style="width: 100%; min-height: 842px; border: none; background: white; display: block;"></iframe>
    </div>
    <div class="sticky bottom-0 bg-gray-50 border-t px-6 py-2 flex justify-end space-x-2">
      <button id="pfaCancelPreviewBtn" class="px-4 py-2 bg-gray-400 text-white rounded hover:bg-gray-500">Cancel</button>
      <button id="pfaDownloadPreviewBtn" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Download</button>
    </div>
  </div>
</div>

<script>
  const auth = window.authService;
  const API_BASE = '/nstif';

  const allPfas = document.getElementById('allPfas');
  const specificPfa = document.getElementById('specificPfa');
  const pfaDropdown = document.getElementById('pfaDropdown');
  const pfaMonth = document.getElementById('pfaMonth');
  const pfaYear = document.getElementById('year');
  const pfaType = document.getElementById('pfaType');
  const pfaPrintBtn = document.getElementById('pfaPrintBtn');
  const pfaClearBtn = document.getElementById('pfaClearBtn');

  const pfaConfirmModal = document.getElementById('pfaConfirmModal');
  const pfaCancelBtn = document.getElementById('pfaCancelBtn');
  const pfaContinueBtn = document.getElementById('pfaContinueBtn');

  const pfaProcessingModal = document.getElementById('pfaProcessingModal');
  const pfaSuccessModal = document.getElementById('pfaSuccessModal');
  const pfaPrintNowBtn = document.getElementById('pfaPrintNowBtn');
  const pfaSuccessMessage = document.getElementById('pfaSuccessMessage');

  const pfaErrorModal = document.getElementById('pfaErrorModal');
  const pfaErrorOkBtn = document.getElementById('pfaErrorOkBtn');
  const pfaErrorText = document.getElementById('pfaErrorText');

  // ── Helpers ─────────────────────────────────────────────────────
  function getMonthNumber(monthName) {
    const months = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];
    return months.indexOf(monthName) + 1;
  }
  function getMonthName(monthNum) {
    const months = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];
    return months[monthNum - 1] || '';
  }

  // ── Load PFAs ───────────────────────────────────────────────────
  async function loadPfas() {
    try {
      const token = localStorage.getItem('token');
      const response = await auth.fetchWithAuth(`${API_BASE}/filter-options`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (response.ok) {
        const result = await response.json();
        if (result.success && result.data.pfas) {
          pfaDropdown.innerHTML = '<option value="">Select Pfa</option>';
          result.data.pfas.forEach(pfa => {
            const option = document.createElement('option');
            option.value = pfa.pfa_code;
            option.textContent = pfa.pfa_name;
            pfaDropdown.appendChild(option);
          });
        }
      }
    } catch (error) { console.error('Error loading PFAS:', error); }
  }

  // ── Load current period ─────────────────────────────────────────
  async function loadCurrentPeriod() {
    try {
      const token = localStorage.getItem('token');
      const response = await auth.fetchWithAuth(`${API_BASE}/filter-options`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (response.ok) {
        const result = await response.json();
        if (result.success && result.data.currentPeriod) {
          const period = result.data.currentPeriod;
          pfaMonth.value = getMonthName(period.month);
          pfaYear.value = period.year;
        }
      }
    } catch (error) { console.error('Error loading current period:', error); }
  }

  // ── Load PFA Types ─────────────────────────────────────────────
  async function loadPfaTypes() {
    try {
      const token = localStorage.getItem('token');
      const response = await auth.fetchWithAuth(`${API_BASE}/filter-options`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (response.ok) {
        const result = await response.json();
        if (result.success && result.data.paymentCodes) {
          pfaType.innerHTML = '<option value="">Select Type</option>';
          result.data.paymentCodes.forEach(code => {
            const option = document.createElement('option');
            option.value = code.payment_code;
            option.textContent = code.payment_description;
            pfaType.appendChild(option);
          });
        }
      }
    } catch (error) { console.error('Error loading PFA types:', error); }
  }

  // ── Toggles ─────────────────────────────────────────────────────
  function togglePfaSelect() {
    pfaDropdown.disabled = allPfas.checked;
    if (allPfas.checked) pfaDropdown.value = '';
  }
  allPfas.addEventListener('change', togglePfaSelect);
  specificPfa.addEventListener('change', togglePfaSelect);

  // ── Validate & show confirm ─────────────────────────────────────
  pfaPrintBtn.addEventListener('click', () => {
    if (!pfaMonth.value) {
      pfaErrorText.textContent = 'Please select a processing month.';
      pfaErrorModal.classList.remove('hidden'); return;
    }
    if (specificPfa.checked && !pfaDropdown.value) {
      pfaErrorText.textContent = 'Please choose a PFA when "Specific Pfa" is selected.';
      pfaErrorModal.classList.remove('hidden'); return;
    }
    if (!pfaType.value) {
      pfaErrorText.textContent = 'Please select a PFA payment type.';
      pfaErrorModal.classList.remove('hidden'); return;
    }
    pfaConfirmModal.classList.remove('hidden');
  });

  pfaCancelBtn.addEventListener('click', () => pfaConfirmModal.classList.add('hidden'));

  // ── Generate ────────────────────────────────────────────────────
  pfaContinueBtn.addEventListener('click', async () => {
    pfaConfirmModal.classList.add('hidden');
    pfaProcessingModal.classList.remove('hidden');
    pfaPrintBtn.disabled = true;

    const format = document.querySelector('input[name="pfaFormat"]:checked').value;
    const summary = document.getElementById('pfaSummary').checked;
    const monthNum = getMonthNumber(pfaMonth.value);
    const year = pfaYear.value || new Date().getFullYear();
    const type = pfaType.value;

    try {
      const token = localStorage.getItem('token');
      const params = new URLSearchParams({
        format, month: monthNum, year, payment_codes: type,
        summaryOnly: summary ? 'true' : 'false'
      });
      if (specificPfa.checked && pfaDropdown.value) params.append('pfa_code', pfaDropdown.value);

      const response = await auth.fetchWithAuth(`${API_BASE}/generate?${params.toString()}`, {
        method: 'GET', headers: { 'Authorization': `Bearer ${token}` }
      });

      if (!response.ok) {
        const errorData = await response.json().catch(() => ({}));
        throw new Error(errorData.error || 'Failed to generate report');
      }

      const blob = await response.blob();
      pfaProcessingModal.classList.add('hidden');
      pfaPrintBtn.disabled = false;

      window.pfaCurrentBlob = blob;
      window.pfaCurrentFormat = format;
      window.pfaCurrentMonth = pfaMonth.value;
      window.pfaCurrentYear = year;

      const iframe = document.getElementById('pfaPreviewIframe');
      const dlBtn = document.getElementById('pfaDownloadPreviewBtn');

      if (format === 'pdf') {
        const blobUrl = window.URL.createObjectURL(blob);
        window.pfaCurrentBlobUrl = blobUrl;
        iframe.src = blobUrl + '#toolbar=0';
        iframe.style.minHeight = '842px';
        dlBtn.textContent = 'Download PDF';
      } else {
        iframe.srcdoc = `<div style="font-family:Arial,sans-serif;padding:40px;text-align:center;color:#555;">
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#1e40af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin:0 auto 16px;display:block;">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
            <line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/>
          </svg>
          <p style="font-size:16pt;font-weight:bold;color:#1e40af;margin-bottom:8px;">Excel Report Ready</p>
          <p style="font-size:10pt;">Click <strong>Download Excel</strong> below to save the file.</p>
        </div>`;
        iframe.style.minHeight = '300px';
        dlBtn.textContent = 'Download Excel';
      }

      document.getElementById('pfaPreviewModal').classList.remove('hidden');

    } catch (error) {
      pfaProcessingModal.classList.add('hidden');
      pfaPrintBtn.disabled = false;
      pfaErrorText.textContent = error.message || 'Failed to generate report. Please try again.';
      pfaErrorModal.classList.remove('hidden');
      console.error('Error:', error);
    }
  });

  // ── Preview modal controls ──────────────────────────────────────
  function closePreview() {
    document.getElementById('pfaPreviewModal').classList.add('hidden');
    const iframe = document.getElementById('pfaPreviewIframe');
    iframe.src = 'about:blank';
    iframe.removeAttribute('srcdoc');
    if (window.pfaCurrentBlobUrl) {
      window.URL.revokeObjectURL(window.pfaCurrentBlobUrl);
      window.pfaCurrentBlobUrl = null;
    }
  }

  document.getElementById('pfaClosePreviewBtn').addEventListener('click', closePreview);
  document.getElementById('pfaCancelPreviewBtn').addEventListener('click', closePreview);

  document.getElementById('pfaDownloadPreviewBtn').addEventListener('click', () => {
    if (!window.pfaCurrentBlob) return;
    const fmt = window.pfaCurrentFormat || 'pdf';
    const url = window.URL.createObjectURL(window.pfaCurrentBlob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `pfa_report_${window.pfaCurrentMonth}_${window.pfaCurrentYear}.${fmt === 'pdf' ? 'pdf' : 'xlsx'}`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    window.URL.revokeObjectURL(url);

    pfaSuccessMessage.textContent = 'Report downloaded successfully!';
    pfaSuccessModal.classList.remove('hidden');
  });

  pfaPrintNowBtn.addEventListener('click', () => {
    pfaSuccessModal.classList.add('hidden');
    document.getElementById('nsitfPfaForm').reset();
    allPfas.checked = true;
    togglePfaSelect();
    loadCurrentPeriod();
  });

  pfaErrorOkBtn.addEventListener('click', () => pfaErrorModal.classList.add('hidden'));

  pfaClearBtn.addEventListener('click', () => {
    setTimeout(() => {
      allPfas.checked = true;
      togglePfaSelect();
      pfaMonth.value = '';
      loadCurrentPeriod();
    }, 0);
  });

  // ── Init ────────────────────────────────────────────────────────
  togglePfaSelect();
  loadPfas();
  loadCurrentPeriod();
  loadPfaTypes();
</script>
