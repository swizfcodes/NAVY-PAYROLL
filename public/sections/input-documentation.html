<style>
  .dropdown-container {
    position: relative;
  }

  .dropdown-list {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    max-height: 200px;
    overflow-y: auto;
    background: white;
    border: 1px solid #d1d5db;
    border-radius: 0.5rem;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    z-index: 50;
  }

  .dropdown-item:hover {
    background-color: #eff6ff;
  }

  @keyframes grow-up {
    0% { height: 0; bottom: 0; }
    100% { height: 100%; bottom: 0; }
  }
  @keyframes grow-down {
    0% { height: 0; top: 0; }
    100% { height: 100%; top: 0; }
  }
  @keyframes expand {
    0% { width: 0; left: 50%; transform: translate(-50%, -50%); }
    100% { width: 100%; left: 0; transform: translateY(-50%); }
  }
  .animate-grow-up {
    animation: grow-up 0.6s ease-in-out infinite alternate;
    position: absolute;
    bottom: 0;
  }
  .animate-grow-down {
    animation: grow-down 0.6s ease-in-out infinite alternate;
    position: absolute;
    top: 0;
  }
  .animate-expand {
    animation: expand 0.6s ease-in-out infinite alternate;
  }
</style>

  <!-- Add New Form -->

          <option value="5">May</option>
          <option value="6">June</option>
          <option value="7">July</option>
          <option value="8">August</option>
          <option value="9">September</option>
          <option value="10">October</option>
          <option value="11">November</option>

        </select>
      </div>
      <div>
        <label for="newRef" class="block text-sm font-medium text-gray-700">Reference No</label>

        class="px-6 py-2 bg-gray-600 hover:bg-gray-700 text-white rounded-lg shadow">

    </div>

  <form id="inputDocForm" class="space-y-4">
    <!-- Name Dropdown - Conditionally Visible -->
    <div class="dropdown-container" id="mainSelectContainer">
      <label for="docName" class="block text-sm font-medium text-gray-700">Select Name</label>
      <div class="relative w-full lg:w-1/2 md:w-1/2">
        <input type="text" id="docName" placeholder="Search employee..."

        <svg class="absolute right-3 top-1/2 transform -translate-y-1/2 h-5 w-5 text-gray-400 pointer-events-none"

            <option value="7">July</option>

      <!-- Action Buttons -->

        <!-- View Mode Buttons -->

        <div id="viewButtons" class="flex space-x-4">
          <button type="button" id="clearBtn"
            class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg shadow">

<!-- Success Modal -->

  class="fixed inset-0 bg-black bg-opacity-50 backdrop-blur-sm hidden flex items-center justify-center z-50">
  <div class="bg-white rounded-lg p-8 max-w-sm w-full mx-4 text-center">
    <div id="loadingSpinner" class="flex justify-center mb-4">
      <div class="relative w-10 h-10">
        <div class="absolute left-1 w-[6px] bg-blue-600 rounded animate-grow-up"></div>
        <div class="absolute right-1 w-[6px] bg-blue-600 rounded animate-grow-down [animation-delay:0.3s]"></div>
        <div
          class="absolute top-1/2 left-1 h-[6px] bg-blue-600 rounded animate-expand [animation-delay:0.6s] -translate-y-1/2">
        </div>
      </div>
    </div>
    <div id="successTick" class="hidden flex justify-center mb-4">
      <div class="w-10 h-10 bg-green-500 rounded-full flex items-center justify-center">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
        </svg>
      </div>
    </div>
    <div id="errorIcon" class="hidden flex justify-center mb-4">
      <div class="w-10 h-10 bg-red-500 rounded-full flex items-center justify-center">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </div>
    </div>
    <p id="successMessage" class="text-gray-700 font-medium">Processing...</p>
  </div>
</div>


<script>
  const auth = window.authService;
  (function () {
    const API_BASE = '/documentation';

    function getAuthToken() {
      return localStorage.getItem('token');
    }

    let isEditing = false;
    let originalData = {};
    let allEmployees = [];
    let allDocumentation = [];
    let currentPickerRecords = null;
    let currentRecordId = null;

    const monthMap = {
      '1': 'January', '2': 'February', '3': 'March', '4': 'April',
      '5': 'May', '6': 'June', '7': 'July', '8': 'August',
      '9': 'September', '10': 'October', '11': 'November', '12': 'December'
    };

    const docNameInput = document.getElementById("docName");
    const docNameId = document.getElementById("docNameId");
    const docNameDropdown = document.getElementById("docNameDropdown");
    const docNameDropdownItems = document.getElementById("docNameDropdownItems");
    const mainSelectContainer = document.getElementById("mainSelectContainer");

    const formFields = document.getElementById("formFields");
    const addNewForm = document.getElementById("addNewForm");
    const addNewBtn = document.getElementById("addNewBtn");
    const viewButtons = document.getElementById("viewButtons");
    const editButtons = document.getElementById("editButtons");

    const successModal = document.getElementById("successModal");
    const loadingSpinner = document.getElementById("loadingSpinner");
    const successTick = document.getElementById("successTick");
    const errorIcon = document.getElementById("errorIcon");
    const successMessage = document.getElementById("successMessage");

    const newNameInput = document.getElementById("newName");
    const newNameId = document.getElementById("newNameId");
    const newNameDropdown = document.getElementById("newNameDropdown");
    const newNameDropdownItems = document.getElementById("newNameDropdownItems");

    const docYear = document.getElementById("docYear");
    const docMonth = document.getElementById("docMonth");
    const docRef = document.getElementById("docRef");
    const docComments = document.getElementById("docComments");

    // ─── API ───────────────────────────────────────────────────────────────────

    async function fetchEmployees() {
      try {
        const token = getAuthToken();
        const response = await auth.fetchWithAuth('/regno/employees', {
          method: 'GET',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const result = await response.json();

        if (result.data && Array.isArray(result.data)) {
          allEmployees = result.data;
          renderEmployeeDropdown(allEmployees, docNameDropdownItems);
          renderEmployeeDropdown(allEmployees, newNameDropdownItems);
        }
      } catch (error) {
        console.error('Error fetching employees:', error);
      }
    }

    async function fetchDocumentation() {
      try {
        const token = getAuthToken();
        const response = await auth.fetchWithAuth(API_BASE, {
          method: 'GET',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        allDocumentation = await response.json();
      } catch (error) {
        console.error('Error fetching documentation:', error);
      }
    }

    async function loadDocumentation(doc_numb) {
      try {
        const token = getAuthToken();
        const encodedId = encodeURIComponent(doc_numb);

        const response = await auth.fetchWithAuth(`${API_BASE}/${encodedId}`, {
          method: 'GET',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await response.json();

        // Support both array and single object responses
        const records = Array.isArray(data) ? data : [data];

        if (records.length > 1) {
          currentPickerRecords = null; // Fresh load — reset picker state
          showRecordPicker(records);
        } else if (records.length === 1) {
          currentPickerRecords = null; // Single record — no picker
          fillForm(records[0]);
        }

      } catch (error) {
        console.error('Error loading documentation:', error);
      }
    }

    async function createDocumentation(data) {
      try {
        const token = getAuthToken();
        const response = await auth.fetchWithAuth(`${API_BASE}/create`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify(data)
        });
        const result = await response.json();

        if (response.ok) {
          showSuccessModal('Record created successfully!');
          await fetchDocumentation();
          return true;
        } else {
          showError(result.error || 'Failed to create record');
          return false;
        }
      } catch (error) {
        console.error('Error creating documentation:', error);
        showError('Error creating record');
        return false;
      }
    }

    async function updateDocumentation(id, data) {
      try {
        const token = getAuthToken();
        const response = await auth.fetchWithAuth(`${API_BASE}/${id}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify(data)
        });
        const result = await response.json();
        if (response.ok) {
          showSuccessModal('Record updated successfully!');
          await fetchDocumentation();
          return true;
        } else {
          showError(result.error || 'Failed to update record');
          return false;
        }
      } catch (error) {
        showError('Error updating record');
        return false;
      }
    }

    // ─── UI ────────────────────────────────────────────────────────────────────

    function renderEmployeeDropdown(employees, containerElement) {
      containerElement.innerHTML = '';

      let filteredEmployees = employees;
      if (containerElement === docNameDropdownItems) {
        // Main dropdown: only show employees who have at least one documentation record
        filteredEmployees = employees.filter(emp =>
          allDocumentation.some(doc => doc.doc_numb === emp.Empl_ID)
        );
      }
      // Add New dropdown: show all employees, no prefill

      filteredEmployees.forEach(emp => {
        const div = document.createElement('div');
        div.className = 'dropdown-item px-3 py-2 hover:bg-blue-50 cursor-pointer border-b border-gray-100';
        div.setAttribute('data-value', emp.Empl_ID);
        div.innerHTML = `
        <span class="font-semibold text-blue-600">${emp.Empl_ID}</span> - ${emp.Surname} ${emp.OtherName}
      `;

        div.addEventListener('click', function () {
          const value = this.getAttribute('data-value');
          const text = this.textContent.trim();

          if (containerElement === docNameDropdownItems) {
            docNameInput.value = text;
            docNameId.value = value;
            docNameDropdown.classList.add('hidden');
            loadDocumentation(value);
          } else {
            // Add New dropdown — always blank, no prefill
            newNameInput.value = text;
            newNameId.value = value;
            newNameDropdown.classList.add('hidden');
          }
        });

        containerElement.appendChild(div);
      });
    }

    function fillForm(record) {
      currentRecordId = record.id;
      docYear.value = record.doc_year || '';
      docMonth.value = record.doc_month || '';
      docRef.value = record.doc_ref || '';
      docComments.value = record.doc_remark || '';

      // Store current record's ref for update tracking
      docNameId.dataset.currentRef = record.doc_ref || '';

      // Properly hide picker instead of display:none
      const picker = document.getElementById("recordPickerList");
      if (picker) picker.style.display = 'none';

      formFields.classList.remove("hidden");
      setViewMode();
    }

    function showRecordPicker(records) {
      // Always hide form fields first
      formFields.classList.add("hidden");
      editButtons.classList.add("hidden");
      viewButtons.classList.remove("hidden");

      const existing = document.getElementById("recordPickerList");
      if (existing) existing.remove();

      currentPickerRecords = records;

      const picker = document.createElement("div");
      picker.id = "recordPickerList";

      const inputWidth = mainSelectContainer.querySelector('.relative').offsetWidth;
      picker.style.width = inputWidth + 'px';
      picker.className = "mt-4 border border-gray-200 rounded-lg overflow-hidden";

      picker.innerHTML = `
        <div class="bg-blue-50 px-4 py-2 border-b border-gray-200 flex items-center justify-between">
          <p class="text-sm font-semibold text-blue-700">
            ${records.length} records found — select one to view or edit
          </p>
          <button id="printPersonRecordsBtn" type="button"
            class="px-3 py-1 bg-green-600 hover:bg-green-700 text-white text-xs rounded shadow flex items-center gap-1">
            <i class="fas fa-print"></i> Print All
          </button>
        </div>
        <div class="divide-y divide-gray-100">
          ${records.map((rec, i) => `
            <div
              class="flex items-center justify-between px-4 py-3 hover:bg-blue-50 cursor-pointer transition-colors record-pick-item"
              data-index="${i}">
              <div class="text-sm">
                <span class="font-semibold text-gray-800">${rec.doc_ref || '—'}</span>
                <span class="text-gray-500 ml-3">
                  ${monthMap[rec.doc_month] || rec.doc_month || '—'} ${rec.doc_year || ''}
                </span>
              </div>
              <div class="text-xs text-gray-400 truncate max-w-xs">${rec.doc_remark || ''}</div>
              <i class="fas fa-chevron-right text-gray-400 text-xs ml-4"></i>
            </div>
          `).join('')}
        </div>
      `;

      mainSelectContainer.insertAdjacentElement("afterend", picker);

      // Fix 1: stopPropagation prevents bubbling that causes section refresh
      document.getElementById("printPersonRecordsBtn").addEventListener("click", (e) => {
        e.preventDefault();
        e.stopPropagation();
        printPersonRecords(records);
      });

      picker.querySelectorAll(".record-pick-item").forEach(item => {
        item.addEventListener("click", function (e) {
          e.stopPropagation();
          const index = parseInt(this.dataset.index);
          picker.style.display = 'none';
          fillForm(records[index]);
        });
      });
    }

    function filterDropdown(searchText, dropdownItems) {
      const items = dropdownItems.querySelectorAll('.dropdown-item');
      items.forEach(item => {
        const text = item.textContent.toLowerCase();
        item.style.display = text.includes(searchText.toLowerCase()) ? 'block' : 'none';
      });
    }

    function setViewMode() {
      isEditing = false;
      viewButtons.classList.remove("hidden");
      editButtons.classList.add("hidden");

      docYear.readOnly = true;
      docMonth.disabled = true;
      docRef.readOnly = true;
      docComments.readOnly = true;

      [docYear, docMonth, docRef, docComments].forEach(field => {
        field.classList.remove("bg-yellow-50", "border-yellow-300");
      });
    }

    function setEditMode() {
      isEditing = true;

      originalData = {
        year: docYear.value,
        month: docMonth.value,
        ref: docRef.value,
        comments: docComments.value
      };

      viewButtons.classList.add("hidden");
      editButtons.classList.remove("hidden");

      docYear.readOnly = false;
      docMonth.disabled = false;
      docRef.readOnly = false;
      docComments.readOnly = false;

      [docYear, docMonth, docRef, docComments].forEach(field => {
        field.classList.add("bg-yellow-50", "border-yellow-300");
      });
    }

    async function saveChanges() {
      const data = {
        doc_year: docYear.value,
        doc_month: docMonth.value,
        doc_ref: docRef.value,
        doc_remark: docComments.value
      };

      const success = await updateDocumentation(currentRecordId, data);
      if (success) {
        setTimeout(() => {
          setViewMode(); // Always return to view mode after save
        }, 2000);
      }
    }

    function cancelEdit() {
      docYear.value = originalData.year;
      docMonth.value = originalData.month;
      docRef.value = originalData.ref;
      docComments.value = originalData.comments;
      setViewMode(); // Always return to view mode on cancel
    }

    function clearMainForm() {
      // Coming from picker — go back to picker
      if (currentPickerRecords) {
        formFields.classList.add("hidden");
        editButtons.classList.add("hidden");
        viewButtons.classList.remove("hidden");
        currentRecordId = null;

        const picker = document.getElementById("recordPickerList");
        if (picker) {
          picker.style.display = 'block';
        } else {
          showRecordPicker(currentPickerRecords);
        }
        return;
      }

      // No picker — full clear
      docNameInput.value = "";
      docNameId.value = "";
      docNameId.dataset.currentRef = "";
      docYear.value = "";
      docMonth.value = "";
      docRef.value = "";
      docComments.value = "";
      formFields.classList.add("hidden");
      isEditing = false;
      currentPickerRecords = null;
      currentRecordId = null;

      const picker = document.getElementById("recordPickerList");
      if (picker) picker.remove();
    }

    async function saveNewRecord() {
      const doc_numb = newNameId.value;
      const doc_year = document.getElementById("newYear").value;
      const doc_month = document.getElementById("newMonth").value;
      const doc_ref = document.getElementById("newRef").value;
      const doc_remark = document.getElementById("newComments").value;

      if (!doc_numb || !doc_year || !doc_month || !doc_ref) {
        showError("Please fill in all required fields");
        return;
      }

      // Check if identical record already exists
      const existingRecord = allDocumentation.find(doc =>
        doc.doc_numb === doc_numb &&
        doc.doc_year === doc_year &&
        doc.doc_month === doc_month &&
        doc.doc_ref === doc_ref &&
        (doc.doc_remark || '') === (doc_remark || '')
      );

      if (existingRecord) {
        showError("No changes made — this record already exists.");
        setTimeout(() => cancelNew(), 2000);
        return;
      }

      const data = { doc_numb, doc_year, doc_month, doc_ref, doc_remark };

      const success = await createDocumentation(data);
      if (success) {
        setTimeout(() => cancelNew(), 2000);
      }
    }

    function cancelNew() {
      addNewForm.classList.add("hidden");
      mainSelectContainer.classList.remove("hidden");

    function clearNewFields() {
      newNameInput.value = "";

      document.getElementById("newMonth").value = "";
      document.getElementById("newRef").value = "";
      document.getElementById("newComments").value = "";
    }

    function showSuccessModal(message, isError = false) {
      successMessage.textContent = "Processing...";
      loadingSpinner.classList.remove("hidden");
      successTick.classList.add("hidden");
      errorIcon.classList.add("hidden");
      successModal.classList.remove("hidden");

      setTimeout(() => {
        loadingSpinner.classList.add("hidden");
        if (isError) {
          errorIcon.classList.remove("hidden");
        } else {
          successTick.classList.remove("hidden");
        }
        successMessage.textContent = message;

        setTimeout(() => {
          successModal.classList.add("hidden");
        }, 2000);
      }, 1000);
    }

    function showError(message) {
      showSuccessModal(message, true);
    }

    `);

      printWindow.onload = () => printWindow.print();
    }

    // ─── EVENT LISTENERS ───────────────────────────────────────────────────────

    addNewBtn.addEventListener("click", function () {
      formFields.classList.add("hidden");
      addNewForm.classList.remove("hidden");
      mainSelectContainer.classList.add("hidden");
      docNameInput.value = "";
      docNameId.value = "";
      const picker = document.getElementById("recordPickerList");
      if (picker) picker.remove();
      clearNewFields();
    });

    document.getElementById("clearBtn").addEventListener("click", clearMainForm);
    document.getElementById("editBtn").addEventListener("click", setEditMode);
    document.getElementById("saveBtn").addEventListener("click", saveChanges);
    document.getElementById("cancelEditBtn").addEventListener("click", cancelEdit);
    document.getElementById("saveNewBtn").addEventListener("click", saveNewRecord);
    document.getElementById("cancelNewBtn").addEventListener("click", cancelNew);
    document.getElementById("printBtn").addEventListener("click", printSelected);
    document.getElementById("printAllBtn").addEventListener("click", printAll);

    docNameInput.addEventListener('focus', () => docNameDropdown.classList.remove('hidden'));
    docNameInput.addEventListener('input', function () {
      filterDropdown(this.value, docNameDropdownItems);
      docNameDropdown.classList.remove('hidden');
    });

    newNameInput.addEventListener('focus', () => newNameDropdown.classList.remove('hidden'));
    newNameInput.addEventListener('input', function () {
      filterDropdown(this.value, newNameDropdownItems);
      newNameDropdown.classList.remove('hidden');
    });

    document.addEventListener('click', function (e) {
      if (!docNameInput.contains(e.target) && !docNameDropdown.contains(e.target)) {
        docNameDropdown.classList.add('hidden');
      }
      if (!newNameInput.contains(e.target) && !newNameDropdown.contains(e.target)) {
        newNameDropdown.classList.add('hidden');
      }
    });

    // ─── INIT ──────────────────────────────────────────────────────────────────

    fetchDocumentation();
    fetchEmployees();

    // Hide quick nav buttons user has no access to
    document.querySelectorAll('[id^="quickNav-"]').forEach(btn => {
      const menuKey = btn.id.replace('quickNav-', '');
      window.checkMenuAccess(menuKey, btn);
    });

  })();
