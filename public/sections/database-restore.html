<style>
  @keyframes grow-up {
    0% { height: 0; bottom: 0; }
    100% { height: 100%; bottom: 0; }
  }
  @keyframes grow-down {
    0% { height: 0; top: 0; }
    100% { height: 100%; top: 0; }
  }
  @keyframes expand {
    0% { width: 0; left: 50%; transform: translate(-50%, -50%); }
    100% { width: 100%; left: 0; transform: translateY(-50%); }
  }
  .animate-grow-up {
    animation: grow-up 0.6s ease-in-out infinite alternate;
    position: absolute;
    bottom: 0;
  }
  .animate-grow-down {
    animation: grow-down 0.6s ease-in-out infinite alternate;
    position: absolute;
    top: 0;
  }
  .animate-expand {
    animation: expand 0.6s ease-in-out infinite alternate;
  }
</style>

<section class="p-3">
    <!-- Connection Status -->
    <div class="mb-3">
        <div id="connectionStatus">
            <div class="flex items-center flex-wrap gap-2 justify-between">
                <div class="flex items-center">
                    <div id="statusIndicator" class="w-3 h-3 rounded-full bg-yellow-500 mr-3"></div>
                    <span id="statusText" class="text-blue-600 font-bold">Connecting to server...</span>
                </div>
                <div class="flex gap-2 items-center">
                    <button onclick="window.navigation.navigateToSection('database-backup', 'Payroll Class Backup')"
                        class="bg-yellow-600 hover:bg-yellow-700 px-4 py-2 rounded text-white transition-colors">
                        <i class="fas fa-database text-white mr-2"></i> Class Backup
                    </button>

                    <button id="refreshConnection"
                        class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded text-white transition-colors">
                        <i class="fas fa-sync-alt mr-2"></i>Refresh
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="grid lg:grid-cols-2 gap-3">
        <!-- Restore Configuration -->
        <div class="rounded-lg border border-slate-700">
            <div class="p-3 border-b border-slate-700">
                <h2 class="text-xl text-blue-600 font-semibold flex items-center">
                    <i class="fas fa-cog mr-2 text-black"></i>
                    Restore Configuration
                </h2>
            </div>
            <div class="p-3 space-y-2">
                <!-- Database Selection -->
                <div>
                    <label class="block text-sm font-medium text-gray-900 mb-2">Payroll Class</label>
                    <select id="restoreDatabaseSelect"
                        class="w-full border border-slate-300 rounded-lg px-3 py-2 bg-gray-100 text-gray-700 cursor-not-allowed"
                        disabled>
                        <option id="dbNameOption">Loading...</option>
                    </select>
                </div>

                <!-- File Upload -->
                <div>
                    <label class="block text-sm font-medium text-gray-900 mb-2">Backup File</label>
                    <input type="file" id="backupFileInput" accept=".sql', '.dump', '.bak', '.gz', '.zip"
                        class="w-full p-1 text-sm text-gray-900 border border-slate-600 rounded-lg cursor-pointer bg-transparent focus:outline-none">
                </div>

                <!-- Restore Mode -->
                <div>
                    <label class="block text-sm font-medium text-gray-900 mb-2">Restore Mode</label>
                    <select id="restoreMode"
                        class="w-full bg-transparent border border-slate-600 rounded-lg px-3 py-2 focus:ring-2 focus:ring-green-500 focus:border-transparent">
                        <option value="overwrite">Overwrite Existing Data</option>
                        <option value="merge">Merge with Existing Data</option>
                    </select>
                </div>

                <!-- Action Buttons -->
                <div class="flex space-x-3 pt-2">
                    <button id="startRestore"
                        class="flex-1 bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-4 rounded-lg transition-colors">
                        <i class="fas fa-upload mr-2"></i>Start Restore
                    </button>
                    <button id="cancelRestore"
                        class="flex-1 bg-amber-100/25 hover:bg-amber-50 text-red-600 font-medium py-2 px-4 rounded-lg transition-colors">
                        <i class="fas fa-times mr-2"></i>Cancel
                    </button>
                </div>
            </div>
        </div>

        <!-- Restore History -->
        <div class="rounded-lg border border-slate-700">
            <div class="p-3 border-b border-slate-700">
                <h2 class="text-xl font-semibold text-blue-600 flex items-center">
                    <i class="fas fa-history mr-2 text-yellow-500"></i>
                    Restore History
                </h2>
            </div>
            <div class="p-3">
                <div id="restoreHistory" class="space-y-3 max-h-96 overflow-y-auto">
                    <!-- Restore entries will be populated here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Progress Modal -->
    <div id="restoreProgressModal"
        class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-6 mx-4 w-full max-w-md border border-slate-300 shadow-xl text-center">
            <h3 class="text-lg font-semibold text-gray-900 mb-4">Restore in Progress...</h3>
            <div class="flex justify-center mb-4">
                <div class="relative w-10 h-10">
                    <div class="absolute left-1 w-[6px] bg-blue-600 rounded animate-grow-up"></div>
                    <div class="absolute right-1 w-[6px] bg-blue-600 rounded animate-grow-down [animation-delay:0.3s]"></div>
                    <div class="absolute top-1/2 left-1 h-[6px] bg-blue-600 rounded animate-expand [animation-delay:0.6s] -translate-y-1/2"></div>
                </div>
            </div>
            <div id="restoreProgressPercent" class="text-2xl font-bold text-blue-600 mb-1">0%</div>
            <div id="restoreProgressText" class="text-gray-600 text-sm mb-4">Initializing restore...</div>
            <div class="flex justify-end">
                <button id="cancelRestoreProgress"
                    class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded text-white transition-colors">
                    Cancel
                </button>
            </div>
        </div>
    </div>

    <!-- Statistics Cards -->
    <div class="grid md:grid-cols-3 gap-6 mt-6">
        <div class="rounded-lg border border-slate-700 p-6">
            <div class="flex items-center">
                <div class="p-3 bg-green-600 rounded-full">
                    <i class="fas fa-check text-lg text-white"></i>
                </div>
                <div class="ml-4">
                    <p class="text-gray-900 font-bold text-sm">Successful Restores</p>
                    <p id="restoreSuccessCount" class="text-2xl font-semibold text-blue-600">0</p>
                </div>
            </div>
        </div>
        <div class="rounded-lg border border-slate-700 p-6">
            <div class="flex items-center">
                <div class="p-3 bg-yellow-600 rounded-full">
                    <i class="fas fa-exclamation-triangle text-lg text-white"></i>
                </div>
                <div class="ml-4">
                    <p class="text-gray-900 font-bold text-sm">Failed Restores</p>
                    <p id="restoreFailedCount" class="text-2xl font-semibold text-blue-600">0</p>
                </div>
            </div>
        </div>
        <div class="rounded-lg border border-slate-700 p-6">
            <div class="flex items-center">
                <div class="p-3 bg-black rounded-full">
                    <i class="fas fa-calendar text-lg text-white"></i>
                </div>
                <div class="ml-4">
                    <p class="text-gray-900 font-bold text-sm">Last Restore</p>
                    <p id="lastRestore" class="text-xl font-semibold text-blue-600">Never</p>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- Confirmation Modal -->
<div id="confirmModal"
    class="fixed inset-0 bg-black bg-opacity-50 backdrop-blur-sm hidden flex items-center justify-center z-50">
    <div class="bg-white rounded-lg p-6 max-w-md w-full mx-4">
        <h3 class="text-lg font-semibold text-gray-800 mb-4" id="confirmModalTitle">Confirm Delete</h3>
        <p class="text-gray-600 mb-6" id="confirmModalMessage">Are you sure you want to delete this record? This action
            cannot be undone.</p>
        <div class="flex justify-end space-x-4">
            <button id="cancelDelete"
                class="bg-gray-300 text-gray-700 px-4 py-2 rounded hover:bg-gray-400">Cancel</button>
            <button id="confirmDelete" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">Delete</button>
        </div>
    </div>
</div>

<!-- Success Modal -->
<div id="successModal"
    class="fixed inset-0 bg-black bg-opacity-50 backdrop-blur-sm hidden flex items-center justify-center z-50">
    <div class="bg-white rounded-lg p-8 max-w-sm w-full mx-4 text-center">
        <div id="loadingSpinner" class="flex justify-center mb-4">
            <div class="relative w-10 h-10">
                <div class="absolute left-1 w-[6px] bg-blue-600 rounded animate-grow-up"></div>
                <div class="absolute right-1 w-[6px] bg-blue-600 rounded animate-grow-down [animation-delay:0.3s]">
                </div>
                <div
                    class="absolute top-1/2 left-1 h-[6px] bg-blue-600 rounded animate-expand [animation-delay:0.6s] -translate-y-1/2">
                </div>
            </div>
        </div>
        <div id="successTick" class="hidden flex justify-center mb-4">
            <div class="w-10 h-10 bg-green-500 rounded-full flex items-center justify-center">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
        </div>
        <p id="successMessage" class="text-gray-700 font-medium">Processing...</p>
    </div>
</div>

<script>
    const auth = window.authService;
    class databaseRestore {
        constructor() {
            this.historyContainer = document.getElementById("restoreHistory");
            this.successCount = document.getElementById("restoreSuccessCount");
            this.failedCount = document.getElementById("restoreFailedCount");
            this.lastRestore = document.getElementById("lastRestore");

            this.progressModal = document.getElementById("restoreProgressModal");
            this.progressPercent = document.getElementById("restoreProgressPercent");
            this.progressText = document.getElementById("restoreProgressText");

            // bind UI actions
            document.getElementById("refreshConnection")
                .addEventListener("click", () => this.checkConnection());

            document.getElementById("startRestore")
                .addEventListener("click", () => this.startRestore());

            document.getElementById("cancelRestore")
                .addEventListener("click", () => this.resetForm());

            document.getElementById("cancelRestoreProgress")
                .addEventListener("click", () => this.hideProgress());

            // initialize
            this.initialize();
        }

        async initialize() {
            await this.fetchDatabaseName(); // waits for DB context to be set server-side
            this.checkConnection();
            this.loadHistory();
            this.loadStats();
        }

        async fetchDatabaseName() {
            try {
                const token = localStorage.getItem("token");

                const res = await auth.fetchWithAuth("/api/restore-db/database", {
                    method: "GET",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    }
                });
                const data = await res.json();

                const select = document.getElementById("restoreDatabaseSelect");
                select.innerHTML = "";

                const option = document.createElement("option");
                option.value = data.database;
                option.textContent = data.class_name;
                option.selected = true;

                select.appendChild(option);

                this.dbName = data.database;
            } catch (err) {
                console.error("Failed to load DB name:", err);
            }
        }

        async checkConnection() {
            const indicator = document.getElementById("statusIndicator");
            const text = document.getElementById("statusText");

            try {
                const token = localStorage.getItem("token");

                const res = await auth.fetchWithAuth("/api/restore-db/status", {
                    method: "GET",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    }
                });

                const data = await res.json();

                if (data.status === "connected") {
                    indicator.className = "w-3 h-3 rounded-full bg-green-500 mr-3";
                    text.textContent = `Connected (${data.engine})`;
                    text.className = "text-green-600 font-bold";
                } else {
                    indicator.className = "w-3 h-3 rounded-full bg-red-500 mr-3";
                    text.textContent = "Disconnected";
                    text.className = "text-red-600 font-bold";
                }
            } catch (err) {
                indicator.className = "w-3 h-3 rounded-full bg-red-500 mr-3";
                text.textContent = "Connection error";
                text.className = "text-red-600 font-bold";
            }
        }

        async startRestore() {
            const database = document.getElementById("restoreDatabaseSelect").value;
            const fileInput = document.getElementById("backupFileInput");
            const mode = document.getElementById("restoreMode").value;

            if (!database || !fileInput.files.length) {
                alert("Please select database and file.");
                return;
            }

            const formData = new FormData();
            formData.append("database", database);
            formData.append("mode", mode);
            formData.append("file", fileInput.files[0]);
            formData.append("skipPreBackup", "true");

            this.progressModal.classList.remove('hidden');
            this.progressPercent.textContent = '0%';
            this.progressText.textContent = 'Starting restore...';

            try {
                if (this.progressInterval) {
                    clearInterval(this.progressInterval);
                    this.progressInterval = null;
                }
                const token = localStorage.getItem("token");

                const res = await auth.fetchWithAuth("/api/restore-db/restore", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${token}`
                    },
                    body: formData
                });

                const result = await res.json();

                if (!result.success || !result.sessionId) {
                    this.hideProgress();
                    this.showNotification("Failed to start restore: " + (result.error || "Unknown error"), 'error');
                    return;
                }

                console.log('Restore started with session:', result.sessionId);

                this.progressPercent.textContent = '5%';
                this.progressText.textContent = 'Connecting to progress tracker...';

                const eventSource = new EventSource(
                    `/api/restore-db/progress/${result.sessionId}?token=${encodeURIComponent(token)}`
                );

                eventSource.onmessage = (event) => {
                    const progress = JSON.parse(event.data);

                    console.log('Progress update:', progress);

                    // Update percentage display with real backend data
                    this.progressPercent.textContent = progress.percent + '%';
                    this.progressText.textContent = progress.message;

                    if (progress.stage === 'complete' || progress.stage === 'failed') {
                        eventSource.close();

                        setTimeout(async () => {
                            this.hideProgress();

                            if (progress.stage === 'complete') {
                                this.showNotification('Restore completed successfully!', 'success');
                                await this.loadHistory();
                                await this.loadStats();
                            } else {
                                this.showNotification(`Restore failed: ${progress.message}`, 'error');
                                await this.loadHistory();
                            }
                        }, 1500);
                    }
                };

                eventSource.onerror = (error) => {
                    if (eventSource.readyState === EventSource.CLOSED) return;
                    console.error('SSE Error:', error);
                    eventSource.close();
                    this.hideProgress();
                    this.showNotification('Connection lost to progress tracker', 'error');
                };

            } catch (err) {
                console.error("Restore error:", err);
                this.hideProgress();
                this.showNotification('Restore failed: ' + err.message, 'error');
            }
        }

        async loadHistory(retryCount = 0) {
            try {
                const token = localStorage.getItem("token");

                const res = await auth.fetchWithAuth("/api/restore-db/history", {
                    method: "GET",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    }
                });

                // If still 401 after fetchWithAuth retry, wait and try again
                if (res.status === 401 && retryCount < 3) {
                    console.warn(`loadHistory 401, retrying (${retryCount + 1}/3)...`);
                    await new Promise(r => setTimeout(r, 1000));
                    return this.loadHistory(retryCount + 1);
                }
                
                const data = await res.json();

                if (data.history && data.history.length > 0) {
                    const sorted = data.history.sort(
                        (a, b) => new Date(b.date) - new Date(a.date)
                    );

                    this.historyContainer.innerHTML = sorted.map(entry => `
                    <div class="flex items-center gap-2 justify-between p-3 bg-gray-50 rounded-lg border">
                        <div class="flex items-center">
                            <div class="p-2 rounded-full mr-3">
                                <i class="fas fa-database text-green-600"></i>
                            </div>
                            <div>
                                <p class="font-medium text-sm text-gray-900">${entry.filename}</p>
                                <p class="text-[13px] text-gray-500">
                                    ${entry.class_name} • ${new Date(entry.date).toLocaleString()} • 
                                    <span class="${entry.status === "Success" ? "text-success" : "text-red-600"}">
                                        ${entry.status}
                                    </span>
                                </p>
                            </div>
                        </div>
                        <div class="flex space-x-2">
                            <button class="delete-btn text-red-600 hover:text-red-800" 
                                    data-filename="${entry.filename}">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `).join("");

                    this.bindDeleteButtons();
                } else {
                    this.historyContainer.innerHTML = `
                    <div class="text-center py-8 text-gray-500">
                        <i class="fas fa-inbox text-3xl mb-2"></i>
                        <p>No restore history found</p>
                    </div>
                `;
                }
            } catch (err) {
                console.error("Failed to load restore history:", err);
            }
        }

        bindDeleteButtons() {
            const deleteButtons = this.historyContainer.querySelectorAll('.delete-btn');
            deleteButtons.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    this.deleteRestoreEntry(btn.dataset.filename);
                });
            });
        }

        async deleteRestoreEntry(filename) {
            this.showConfirmDelete(filename, async () => {
                try {
                    const token = localStorage.getItem("token");

                    const response = await auth.fetchWithAuth(`/api/restore-db/restore/${encodeURIComponent(filename)}`, {
                        method: 'DELETE',
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": `Bearer ${token}`
                        }
                    });

                    const result = await response.json();

                    if (result.success) {
                        this.showNotification('File deleted successfully', 'success');
                        this.loadHistory();
                        this.loadStats();
                    } else {
                        throw new Error(result.error || 'Delete failed');
                    }
                } catch (error) {
                    this.showNotification('Delete failed: ' + error.message, 'error');
                }
            });
        }

        // ── Confirm Delete Modal ────────────────────────────────────────────
        showConfirmDelete(filename, onConfirm) {
            const modal = document.getElementById('confirmModal');
            const confirmBtn = document.getElementById('confirmDelete');
            const cancelBtn = document.getElementById('cancelDelete');

            document.getElementById('confirmModalTitle').textContent = 'Confirm Delete';
            document.getElementById('confirmModalMessage').textContent =
                `Are you sure you want to delete "${filename}"? This action cannot be undone.`;

            const close = () => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            };

            confirmBtn.onclick = () => { close(); onConfirm(); };
            cancelBtn.onclick = close;

            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        async loadStats(retryCount = 0) {
            try {
                const token = localStorage.getItem("token");

                const res = await auth.fetchWithAuth("/api/restore-db/stats", {
                    method: "GET",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    }
                });

                if (res.status === 401 && retryCount < 3) {
                    console.warn(`loadStats 401, retrying (${retryCount + 1}/3)...`);
                    await new Promise(r => setTimeout(r, 1000));
                    return this.loadStats(retryCount + 1);
                }

                const stats = await res.json();

                this.successCount.textContent = stats.successful || 0;
                this.failedCount.textContent = stats.failed || 0;
                this.lastRestore.textContent = stats.lastRestore
                    ? new Date(stats.lastRestore).toLocaleString()
                    : "Never";
            } catch (err) {
                console.error("Failed to load restore stats:", err);
            }
        }

        showProgress(progress = 0, message = "Initializing restore...") {
            this.progressModal.classList.remove("hidden");
            this.progressPercent.textContent = progress + "%";
            this.progressText.textContent = message;
        }

        hideProgress() {
            this.progressModal.classList.add("hidden");
            if (this.progressInterval) {
                clearInterval(this.progressInterval);
            }
        }

        resetForm() {
            const fileInput = document.getElementById("backupFileInput");
            const modeSelect = document.getElementById("restoreMode");

            if (fileInput) fileInput.value = "";
            if (modeSelect) modeSelect.value = "overwrite";
        }

        incrementSuccessfulRestores() {
            const el = document.getElementById("restoreSuccessCount");
            if (el) el.textContent = parseInt(el.textContent || 0) + 1;
        }

        incrementFailedRestores() {
            const el = document.getElementById("restoreFailedCount");
            if (el) el.textContent = parseInt(el.textContent || 0) + 1;
        }

        updateLastRestore(timestamp) {
            const el = document.getElementById("lastRestore");
            if (el) el.textContent = new Date(timestamp).toLocaleString();
        }

        showNotification(message, type = 'info') {
            const colors = {
                success: 'bg-green-500',
                error: 'bg-red-500',
                info: 'bg-blue-500'
            };

            const notification = document.createElement('div');
            notification.className = `
                fixed 
                top-1/2 
                left-1/2 
                transform -translate-x-1/2 -translate-y-1/2
                ${colors[type]} 
                text-white 
                px-6 py-3 
                rounded-lg 
                shadow-lg 
                z-50 
                transition-all duration-300
                `;
            notification.textContent = message;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.remove();
            }, 3000);
        }
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => {
            window.restoreManager = new databaseRestore();
        });
    } else {
        window.restoreManager = new databaseRestore();
    }
</script>
