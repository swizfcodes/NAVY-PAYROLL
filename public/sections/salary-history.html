<!-- ============================================================
     PAYSLIP + SALARY HISTORY — Tabbed UI
     ============================================================ -->
<style>
  @keyframes grow-up {
    0% {
      height: 0;
      bottom: 0;
    }

    100% {
      height: 100%;
      bottom: 0;
    }
  }

  @keyframes grow-down {
    0% {
      height: 0;
      top: 0;
    }

    100% {
      height: 100%;
      top: 0;
    }
  }

  @keyframes expand {
    0% {
      width: 0;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    100% {
      width: 100%;
      left: 0;
      transform: translateY(-50%);
    }
  }

  .animate-grow-up {
    animation: grow-up 0.6s ease-in-out infinite alternate;
    position: absolute;
    bottom: 0;
  }

  .animate-grow-down {
    animation: grow-down 0.6s ease-in-out infinite alternate;
    position: absolute;
    top: 0;
  }

  .animate-expand {
    animation: expand 0.6s ease-in-out infinite alternate;
  }
</style>

<section class="items border rounded-lg m-6 max-w-xl mx-auto">

  <!-- ── TABS ──────────────────────────────────────────────────── -->
  <div class="flex">
    <button id="tab-payslip"
      class="tab-btn flex-1 py-3 text-sm font-bold tracking-wide border-b-4 border-yellow-600 text-blue-500  transition-all"
      onclick="window.switchTab('payslip')">
      Payslip
    </button>
    <button id="tab-salaryhistory"
      class="tab-btn flex-1 py-3 text-sm font-bold tracking-wide border-b-4 border-transparent text-gray-500 hover:text-gray-700 transition-all"
      onclick="window.switchTab('salaryhistory')">
      Salary History
    </button>
  </div>

  <!-- ══════════════════════════════════════════════════════════════
       TAB 1 — PAYSLIP
  ══════════════════════════════════════════════════════════════ -->
  <div id="pane-payslip" class="p-6 space-y-4">
    <h2 class="text-xl text-center font-bold text-blue-600 border-b mb-2">Generate and Print Payslip History</h2>

    <form id="payslipForm" class="space-y-4">

      <!-- People -->
      <div>
        <label class="block font-medium mb-2 text-sm">Select People</label>
        <div class="flex space-x-4">
          <label class="flex text-sm items-center space-x-2">
            <input type="radio" name="ps_people" value="all" checked> <span>All</span>
          </label>
          <label class="flex text-sm items-center space-x-2">
            <input type="radio" name="ps_people" value="specific"> <span>Specific</span>
          </label>
          <label class="flex text-sm items-center space-x-2">
            <input type="radio" name="ps_people" value="individual"> <span>Individual</span>
          </label>
        </div>
      </div>

      <!-- Service numbers -->
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium mb-1">Start Service No</label>
          <input type="text" id="ps_startNo" class="w-full border rounded px-3 py-2 focus:ring focus:ring-blue-300"
            disabled />
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">End Service No</label>
          <input type="text" id="ps_endNo" class="w-full border rounded px-3 py-2 focus:ring focus:ring-blue-300"
            disabled />
        </div>
      </div>

      <!-- Payroll class + Year + Month -->
      <div>
        <label class="block text-sm font-medium mb-1">Payroll Class</label>
        <div class="grid grid-cols-3 gap-3">
          <select id="ps_payrollClass"

          </select>
          <input type="number" id="ps_year" placeholder="Year" min="2000" max="2100"

          <select id="ps_month"
            class="w-full bg-transparent border border-blue-500 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500">
            <option value="">Month</option>
            <option value="01">January</option>
            <option value="02">February</option>
            <option value="03">March</option>
            <option value="04">April</option>
            <option value="05">May</option>
            <option value="06">June</option>
            <option value="07">July</option>
            <option value="08">August</option>
            <option value="09">September</option>

            <option value="11">November</option>

      <!-- Format -->

          </label>
          <label class="flex text-sm items-center space-x-2">
            <input type="radio" name="ps_format" value="excel"> <span>Excel</span>

          <!-- IPPIS checkbox -->
          <div class="flex items-center space-x-2 pt-1">
            <input type="checkbox" id="ps_ippis" class="w-4 h-4 accent-blue-600">

        <button type="button" id="ps_generateBtn"

    </form>
  </div>

<!-- ── SCRIPT ─────────────────────────────────────────────────────── -->
<script>
  const auth = window.authService;
  const token = () => localStorage.getItem('token');

  // ── Shared modal refs ──────────────────────────────────────────────
  const loadingModal = document.getElementById('sharedLoadingModal');
  const loadingText = document.getElementById('sharedLoadingText');
  const confirmModal = document.getElementById('sharedConfirmModal');
  const confirmTitle = document.getElementById('sharedConfirmTitle');
  const confirmText = document.getElementById('sharedConfirmText');
  const continueBtn = document.getElementById('sharedContinueBtn');
  const cancelBtn = document.getElementById('sharedCancelBtn');
  const successModal = document.getElementById('sharedSuccessModal');
  const successMessage = document.getElementById('sharedSuccessMessage');
  const errorModal = document.getElementById('sharedErrorModal');
  const errorMessage = document.getElementById('sharedErrorMessage');
  const previewModal = document.getElementById('sharedPreviewModal');
  const previewTitle = document.getElementById('sharedPreviewTitle');
  const previewIframe = document.getElementById('sharedPreviewIframe');
  const downloadBtn = document.getElementById('sharedDownloadPreviewBtn');

  // ── Modal helpers ──────────────────────────────────────────────────
  function showLoading(msg) { loadingText.textContent = msg || 'Generating...'; loadingModal.classList.remove('hidden'); }
  function hideLoading() { loadingModal.classList.add('hidden'); }
  function showError(msg) { errorMessage.textContent = msg; errorModal.classList.remove('hidden'); }
  function showSuccess(msg) { successMessage.textContent = msg; successModal.classList.remove('hidden'); }

  document.getElementById('sharedErrorOkBtn').addEventListener('click', () => errorModal.classList.add('hidden'));
  document.getElementById('sharedSuccessOkBtn').addEventListener('click', () => successModal.classList.add('hidden'));
  cancelBtn.addEventListener('click', () => confirmModal.classList.add('hidden'));
  document.getElementById('sharedClosePreviewBtn').addEventListener('click', closePreview);
  document.getElementById('sharedCancelPreviewBtn').addEventListener('click', closePreview);
  function closePreview() { previewModal.classList.add('hidden'); previewIframe.removeAttribute('srcdoc'); }

  // ── Tab switching ──────────────────────────────────────────────────
  window.switchTab = function (tab) {
    ['payslip', 'salaryhistory'].forEach(t => {
      const btn = document.getElementById(`tab-${t}`);
      const pane = document.getElementById(`pane-${t}`);
      const active = t === tab;
      btn.classList.toggle('border-yellow-600', active);
      btn.classList.toggle('text-blue-500', active);
      btn.classList.toggle('hover:text-gray-700', !active);
      //btn.classList.toggle('bg-yellow-50', active);
      btn.classList.toggle('border-transparent', !active);
      btn.classList.toggle('text-gray-500', !active);
      pane.classList.toggle('hidden', !active);
    });
  }

  // ── Shared payroll class loader ────────────────────────────────────
  async function loadPayrollClasses() {
    try {
      const res = await auth.fetchWithAuth('/payslips/database', {
        headers: { Authorization: `Bearer ${token()}` }
      });

      if (!res.ok) return;

      const result = await res.json();

      const classes = Array.isArray(result)
        ? result
        : result
          ? [result]
          : [];

      const selectors = [
        document.getElementById('ps_payrollClass'),
        document.getElementById('sh_payrollClass')
      ];

      selectors.forEach(sel => {
        if (!sel) return;

        sel.innerHTML = '';

        classes.forEach((c, index) => {
          const option = document.createElement('option');

          option.value = c.database || `class_${index}`;
          option.textContent = c.class_name || option.value;

          sel.appendChild(option);
        });

        if (sel.options.length > 0) {
          sel.selectedIndex = 0;
        }
      });

    } catch (e) {
      console.error('loadPayrollClasses:', e);
    }
  }

  // ── Helper: month name from value ─────────────────────────────────
  const MONTH_NAMES = ['', 'January', 'February', 'March', 'April', 'May', 'June',
    'July', 'August', 'September', 'October', 'November', 'December'];

  // ══════════════════════════════════════════════════════════════════
  // TAB 1 — PAYSLIP LOGIC
  // ══════════════════════════════════════════════════════════════════
  (function () {
    const radios = document.querySelectorAll('input[name="ps_people"]');
    const startNo = document.getElementById('ps_startNo');
    const endNo = document.getElementById('ps_endNo');
    const genBtn = document.getElementById('ps_generateBtn');
    const clearBtn = document.getElementById('ps_clearBtn');
    const ippisChk = document.getElementById('ps_ippis');

    function toggleInputs() {
      const v = document.querySelector('input[name="ps_people"]:checked').value;
      startNo.disabled = v === 'all';
      endNo.disabled = v !== 'specific';
      if (v === 'all') { startNo.value = ''; endNo.value = ''; }
      if (v === 'individual') { endNo.value = ''; }
      // Excel disabled for individual
      const excelRadio = document.querySelector('input[name="ps_format"][value="excel"]');
      /*if (v === 'individual') {
        excelRadio.disabled = true;
        excelRadio.parentElement.classList.add('opacity-50', 'cursor-not-allowed');
        document.querySelector('input[name="ps_format"][value="pdf"]').checked = true;
      } else {
        excelRadio.disabled = false;
        excelRadio.parentElement.classList.remove('opacity-50', 'cursor-not-allowed');
      }*/
    }

    radios.forEach(r => r.addEventListener('change', toggleInputs));
    toggleInputs();

    genBtn.addEventListener('click', () => {
      const v = document.querySelector('input[name="ps_people"]:checked').value;
      if (v === 'specific' && (!startNo.value || !endNo.value)) {
        return showError('Please fill in both Start and End Service Numbers.');
      }
      if (v === 'individual' && !startNo.value) {
        return showError('Please enter a Service Number.');
      }
      const yr = document.getElementById('ps_year').value;
      const mo = document.getElementById('ps_month').value;
      if (!yr || !mo) return showError('Please select both Year and Month.');

      confirmTitle.textContent = 'Confirm Payslip Generation';
      confirmText.textContent = 'Do you want to continue and generate payslips?';
      confirmModal.classList.remove('hidden');

      // Wire continue button for this context
      const handler = async () => {
        continueBtn.removeEventListener('click', handler);
        confirmModal.classList.add('hidden');
        await runPayslipGeneration();
      };
      continueBtn.addEventListener('click', handler);
    });

    clearBtn.addEventListener('click', () => {
      document.querySelector('input[name="ps_people"][value="all"]').checked = true;
      toggleInputs();
    });

    async function runPayslipGeneration() {
      const v = document.querySelector('input[name="ps_people"]:checked').value;
      const fmt = document.querySelector('input[name="ps_format"]:checked').value;
      const yr = document.getElementById('ps_year').value;
      const mo = document.getElementById('ps_month').value;
      const cls = document.getElementById('ps_payrollClass').value;
      const useIppis = ippisChk.checked;

      showLoading('Generating payslips...');
      genBtn.disabled = true;

      try {
        if (useIppis) {
          // ── CONSOLIDATED path ──────────────────────────────────
          const period = yr + mo;
          const body = {
            period,
            payrollClass: cls,
            printRange: v !== 'all'
          };
          if (v === 'specific') { body.employeeFrom = startNo.value; body.employeeTo = endNo.value; }
          if (v === 'individual') { body.employeeFrom = startNo.value; body.employeeTo = startNo.value; }

          const res = await auth.fetchWithAuth('/consolidated/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token()}` },
            body: JSON.stringify(body)
          });
          const result = await res.json();
          hideLoading(); genBtn.disabled = false;
          if (!result.success) return showError(result.error || 'Failed to generate consolidated payslips.');
          showPreview(result.data, fmt, 'consolidated', `Consolidated Payslip — ${MONTH_NAMES[+mo]} ${yr}`);
        } else {
          // ── STANDARD NAVY path ─────────────────────────────────
          const params = new URLSearchParams();
          if (v === 'all') { params.append('optall', '1'); params.append('empno1', ''); params.append('empno2', ''); }
          if (v === 'specific') { params.append('optrange', '1'); params.append('empno1', startNo.value); params.append('empno2', endNo.value); }
          if (v === 'individual') { params.append('optindividual', '1'); params.append('empno1', startNo.value); params.append('empno2', ''); }
          params.append('branch', cls);
          params.append('wxdate', new Date().toISOString().split('T')[0]);
          params.append('year', yr);
          params.append('month', mo);

          const res = await auth.fetchWithAuth(`/payslips/generate?${params}`, {
            headers: { Authorization: `Bearer ${token()}` }
          });
          const result = await res.json();
          hideLoading(); genBtn.disabled = false;
          if (!result.success || !result.data?.length) return showError('No payslip data generated.');
          showPreview(result.data, fmt, 'payslip', `Payslip — ${MONTH_NAMES[+mo]} ${yr}`);
        }
      } catch (e) {
        hideLoading(); genBtn.disabled = false;
        showError(e.message || 'Failed to generate payslips.');
      }
    }
  })();

  // ══════════════════════════════════════════════════════════════════
  // TAB 2 — SALARY HISTORY LOGIC
  // ══════════════════════════════════════════════════════════════════
  (function () {
    const radios = document.querySelectorAll('input[name="sh_people"]');
    const startNo = document.getElementById('sh_startNo');
    const endNo = document.getElementById('sh_endNo');
    const genBtn = document.getElementById('sh_generateBtn');
    const clearBtn = document.getElementById('sh_clearBtn');
    const ippisChk = document.getElementById('sh_ippis');

    function toggleInputs() {
      const v = document.querySelector('input[name="sh_people"]:checked').value;
      startNo.disabled = v === 'all';
      endNo.disabled = v !== 'specific';
      if (v === 'all') { startNo.value = ''; endNo.value = ''; }
      if (v === 'individual') { endNo.value = ''; }
    }

    radios.forEach(r => r.addEventListener('change', toggleInputs));
    toggleInputs();

    genBtn.addEventListener('click', () => {
      const v = document.querySelector('input[name="sh_people"]:checked').value;
      const fromYr = document.getElementById('sh_fromYear').value;
      const fromMo = document.getElementById('sh_fromMonth').value;
      const toYr = document.getElementById('sh_toYear').value;
      const toMo = document.getElementById('sh_toMonth').value;

      if (v === 'specific' && (!startNo.value || !endNo.value))
        return showError('Please fill in both Start and End Service Numbers.');
      if (v === 'individual' && !startNo.value)
        return showError('Please enter a Service Number.');
      if (!fromYr || !fromMo) return showError('Please select a From period (Year and Month).');
      if (!toYr || !toMo) return showError('Please select a To period (Year and Month).');

      const fromPeriod = fromYr + fromMo;
      const toPeriod = toYr + toMo;
      if (toPeriod < fromPeriod) return showError('To period must be after From period.');

      // Validate max 12 months
      const months = (parseInt(toYr) - parseInt(fromYr)) * 12 + (parseInt(toMo) - parseInt(fromMo)) + 1;
      if (months > 12) return showError('Date range cannot exceed 12 months.');

      confirmTitle.textContent = 'Confirm Salary History Generation';
      confirmText.textContent = 'Do you want to continue and generate salary history?';
      confirmModal.classList.remove('hidden');

      const handler = async () => {
        continueBtn.removeEventListener('click', handler);
        confirmModal.classList.add('hidden');
        await runSalaryHistoryGeneration(fromPeriod, toPeriod);
      };
      continueBtn.addEventListener('click', handler);
    });

    clearBtn.addEventListener('click', () => {
      document.querySelector('input[name="sh_people"][value="all"]').checked = true;
      toggleInputs();
    });

    async function runSalaryHistoryGeneration(fromPeriod, toPeriod) {
      const v = document.querySelector('input[name="sh_people"]:checked').value;
      const fmt = document.querySelector('input[name="sh_format"]:checked').value;
      const cls = document.getElementById('sh_payrollClass').value;
      const useIppis = ippisChk.checked;

      showLoading('Generating salary history...');
      genBtn.disabled = true;

      try {
        const body = {
          fromPeriod,
          toPeriod,
          payrollClass: cls,
          useIppis: useIppis ? 'Y' : 'N',
          printRange: v !== 'all'
        };
        if (v === 'specific') { body.empnoFrom = startNo.value; body.empnoTo = endNo.value; }
        if (v === 'individual') { body.empnoFrom = startNo.value; body.empnoTo = startNo.value; }

        const res = await auth.fetchWithAuth('/salary-history/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token()}` },
          body: JSON.stringify(body)
        });
        const result = await res.json();
        hideLoading(); genBtn.disabled = false;

        if (!result.success || !result.data?.length)
          return showError(result.error || 'No salary history data generated.');

        const label = `Salary History — ${fromPeriod} to ${toPeriod}`;
        showPreview(result.data, fmt, 'salaryhistory', label);
      } catch (e) {
        hideLoading(); genBtn.disabled = false;
        showError(e.message || 'Failed to generate salary history.');
      }
    }
  })();

  // ══════════════════════════════════════════════════════════════════
  // SHARED PREVIEW
  // ══════════════════════════════════════════════════════════════════
  let _previewState = {};

  function showPreview(data, fmt, type, title) {
    _previewState = { data, fmt, type };
    previewTitle.textContent = title;

    const count = Array.isArray(data) ? data.length : 1;
    downloadBtn.textContent = count > 1
      ? `Download ${count} ${type === 'salaryhistory' ? 'Reports' : 'Payslips'} (${fmt.toUpperCase()})`
      : `Download ${fmt.toUpperCase()}`;

    fetch('photos/logo.png')
      .then(r => r.blob())
      .then(blob => new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.readAsDataURL(blob);
      }))
      .catch(() => '')
      .then(logoDataUrl => {
        if (type === 'salaryhistory') {
          previewModal.querySelector('.bg-gray-50').style.maxWidth = '98vw';
        } else {
          previewModal.querySelector('.bg-gray-50').style.maxWidth = '';
        }

        let html;

        if (type === 'salaryhistory') {
          html = buildSalaryHistoryHTML(Array.isArray(data) ? data : [data], logoDataUrl);
        } else if (type === 'consolidated') {
          // uses existing buildConsolidatedHTML from the consolidated script
          html = buildConsolidatedHTML(Array.isArray(data) ? data : [data], logoDataUrl);
        } else {
          // standard payslip
          html = buildExactPayslipHTML(Array.isArray(data) ? data : [data], logoDataUrl);
        }

        const arr = Array.isArray(data) ? data : [data];
        const estH = type === 'salaryhistory'
          ? arr.length * 700 + 48
          : arr.length * 818 + 32;

        if (type === 'salaryhistory') {
          previewIframe.style.width = '100%';
          previewIframe.style.minHeight = '700px';
        }
        previewIframe.style.height = estH + 'px';
        previewIframe.srcdoc = html;
        previewIframe.onload = function () {
          try {
            const b = previewIframe.contentDocument.body;
            if (b) previewIframe.style.height = Math.max(600, b.scrollHeight + 20) + 'px';
          } catch (e) { }
        };
        previewModal.classList.remove('hidden');
      });
  }

  // ── Download handler ───────────────────────────────────────────────
  downloadBtn.addEventListener('click', async () => {
    downloadBtn.disabled = true;
    downloadBtn.textContent = 'Preparing…';
    try {
      const { data, fmt, type } = _previewState;
      let endpoint;
      if (type === 'salaryhistory') endpoint = fmt === 'pdf' ? '/salary-history/export/pdf' : '/salary-history/export/excel';
      else if (type === 'consolidated') endpoint = fmt === 'pdf' ? '/consolidated/export/pdf' : '/consolidated/export/excel';
      else endpoint = fmt === 'pdf' ? '/payslips/export/pdf' : '/payslips/export/excel';

      const res = await auth.fetchWithAuth(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token()}` },
        body: JSON.stringify({ data })
      });
      if (!res.ok) throw new Error('Failed to generate file');
      const blob = await res.blob();
      const url = window.URL.createObjectURL(blob);
      if (fmt === 'pdf') window.open(url, '_blank');
      const a = document.createElement('a');
      a.href = url;
      a.download = `${type}_${Date.now()}.${fmt === 'pdf' ? 'pdf' : 'xlsx'}`;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => window.URL.revokeObjectURL(url), 100);
      closePreview();
      showSuccess('Downloaded successfully!');
    } catch (e) {
      showError('Failed to download. Please try again.');
    } finally {
      downloadBtn.disabled = false;
      const { fmt, type, data } = _previewState;
      const count = Array.isArray(data) ? data.length : 1;
      downloadBtn.textContent = count > 1
        ? `Download ${count} ${type === 'salaryhistory' ? 'Reports' : 'Payslips'} (${fmt?.toUpperCase()})`
        : `Download ${fmt?.toUpperCase()}`;
    }
  });

  // ══════════════════════════════════════════════════════════════════
  // SALARY HISTORY HTML BUILDER
  // ══════════════════════════════════════════════════════════════════
  function buildSalaryHistoryHTML(employees, logoDataUrl) {
    const logoUrl = logoDataUrl || 'photos/logo.png';
    const now = new Date();
    const prodDate = now.toLocaleDateString('en-GB', { day: '2-digit', month: 'long', year: 'numeric' });
    const prodTime = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

    function periodLabel(p) {
      if (!p || p.length < 6) return p || '';
      const mo = parseInt(p.substring(4, 6));
      return MONTH_NAMES[mo] ? MONTH_NAMES[mo].substring(0, 3) + ' ' + p.substring(0, 4) : p;
    }

    function fmtAmt(n) {
      const v = parseFloat(n) || 0;
      return v === 0 ? '' : v.toLocaleString('en-NG', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    function esc(s) {
      if (s === null || s === undefined) return '';
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    const firstEmp = employees[0] || {};
    const numCols = (firstEmp.periods || []).length;
    const manyCol = numCols >= 10;
    const cellPad = manyCol ? '1px 1.5px' : '2.5px 4px';
    const cellFontSize = manyCol ? '6pt' : '7pt';
    const amtMinWidth = manyCol ? '50px' : 'auto';  

    const css = `
    @page { size: A4 landscape; margin: 0.8mm; background-color: #f8fbff; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Helvetica, Arial, sans-serif; font-size: 7pt; color: #1a1a1a; background: #d1d5db; margin: 0; padding: 16px 0; }
    .page {
      position: relative;
      width: 1050px;
      min-height: 794px;
      margin: 0 auto 4px auto;
      padding: 2px 4px;
      background-color: #f8fbff;
      box-shadow: 0 4px 24px rgba(0,0,0,0.28);
      overflow: hidden;
      z-index: 1;
      page-break-after: always;
    }
    .page:last-child { page-break-after: auto; margin-bottom: 0; }
    .page::before {
      content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background-image: url('${logoUrl}'); background-size: auto 80%;
      background-repeat: no-repeat; background-position: center center;
      opacity: 0.02; z-index: 0; pointer-events: none;
    }
    .page > * { position: relative; z-index: 1; }
    @media print {
      body { background: none; padding: 0; }
      .page { width: 100%; margin: 0; padding: 10px; box-shadow: none; background-color: #f8fbff; print-color-adjust: exact; -webkit-print-color-adjust: exact; }
      .page::before { position: fixed; }
    }
    .header-wrapper { display: flex; align-items: flex-start; margin-bottom: 6px; border-bottom: 2px solid #1a1a1a; padding-bottom: 4px; }
    .className { flex-shrink: 0; margin-right: 16px; align-self: center; font-size: 8pt; font-weight: bold; }
    .header { flex-grow: 1; text-align: center; }
    .header h1 { font-size: 13pt; font-weight: bold; letter-spacing: 1.5px; color: #1e40af; font-family: 'Libre Baskerville', Georgia, serif; }
    .header h2 { font-size: 9pt; font-weight: normal; color: #4a4a4a; margin-top: 2px; font-family: 'Libre Baskerville', Georgia, serif; }

    .meta-row { display: flex; justify-content: space-between; align-items: center; margin: 5px 0 18px; font-size: 8pt; }
    .meta-left { font-weight: bold; color: #1a1a1a; text-transform: uppercase; letter-spacing: 0.4px; }
    .meta-center { color: #4a4a4a; }
    .meta-right { color: #4a4a4a; }
    .meta-row strong { color: #1a1a1a; }

    .emp-banner { border-top: 1px solid #c7d7f5; border-bottom: 1px solid #c7d7f5; padding: 4px 0; margin-bottom: 30px; display: flex; gap: 24px; font-size: 7.5pt; }
    .emp-banner .ef { display: flex; gap: 4px; }
    .emp-banner .el { font-weight: 600; color: #1a1a1a; }
    .emp-banner .ev { color: #4a4a4a; }

    table { width: 100%; border-collapse: collapse; font-size: 7pt; }

    thead th, tbody td {
      padding: ${cellPad}; vertical-align: middle;
      border-left: 0.5px solid #c8d4e8; border-right: 0.5px solid #c8d4e8; border-bottom: 0.5px solid #c8d4e8;
    }
    thead th:first-child, tbody td:first-child { border-left: none; }
    thead th:last-child, tbody td:last-child { border-right: none; }

    thead th { color: #1e40af; text-align: left; font-weight: bold; font-size: ${cellFontSize}; text-transform: uppercase; letter-spacing: 0.3px; white-space: ${manyCol ? 'normal' : 'nowrap'}; background: #e8f0fe; border-bottom: 1.5px solid #0056A0; }
    thead th.amt { text-align: right; min-width: ${amtMinWidth}; }

    tbody td.desc { color: #4a4a4a; font-size: ${cellFontSize}; }
    tbody td.amt { text-align: right; font-family: 'Courier New', monospace; font-weight: 600; white-space: ${manyCol ? 'normal' : 'nowrap'}; color: #1a1a1a; font-size: ${cellFontSize}; min-width: ${amtMinWidth}; }
    tbody td.ded-amt { text-align: right; font-family: 'Courier New', monospace; font-weight: 600; white-space: ${manyCol ? 'normal' : 'nowrap'}; font-size: ${cellFontSize}; min-width: ${amtMinWidth}; }

    tr.section-label td { background: #cfe2ff; color: #1e3a8a; font-weight: bold; font-size: 7pt; padding: 3px 4px; letter-spacing: 0.3px; text-transform: uppercase; white-space: nowrap; }
    tr.source-label td { color: #1a1a1a; font-weight: bold; font-size: 8pt; padding: 5px 4px 3px 4px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1.5px solid #1e40af; }

    tbody tr.total-row td { background-color: #f5f5f5; font-weight: 700; font-size: 7.5pt; padding: 3px 4px; color: #1e3a8a; }
    tbody tr.total-row td.amt { font-family: 'Courier New', monospace; text-align: right; color: #1e3a8a; }
    tbody tr.net-row td { background-color: #f0f0f0; font-weight: 800; font-size: 8pt; padding: 4px; }
    tbody tr.net-row td.amt { font-family: 'Courier New', monospace; text-align: right; }

    .footer { margin-top: 10px; padding-top: 6px; border-top: 1px solid #d0d0d0; text-align: center; font-size: 6.5pt; color: #6a6a6a; }
  `;

    const pages = employees.map((emp) => {
      const periods = emp.periods || [];
      const rows = emp.rows || [];
      const useIppis = !!emp.useIppis;
      const numCols = periods.length;

      const colHeaders = `
      <th style="min-width:${manyCol ? '110px' : '140px'};">Description</th>
      ${periods.map(p => `<th class="amt">${esc(periodLabel(p))}</th>`).join('')}
    `;

      function colTotals(subset) {
        const sums = new Array(numCols).fill(0);
        subset.forEach(r => {
          (r.amounts || []).forEach((a, i) => { sums[i] += parseFloat(a) || 0; });
        });
        return sums;
      }

      function renderAmtCells(amounts) {
        return new Array(numCols).fill(0).map((_, i) => {
          const v = fmtAmt(amounts[i]);
          return `<td class="amt">${v ? '&#x20A6;' + v : ''}</td>`;
        }).join('');
      }

      function renderDedAmtCells(amounts) {
        return new Array(numCols).fill(0).map((_, i) => {
          const v = fmtAmt(amounts[i]);
          return `<td class="ded-amt">${v ? '(&#x20A6;' + v + ')' : ''}</td>`;
        }).join('');
      }

      function renderTotalCells(sums) {
        return sums.map(s => `<td class="amt">${s !== 0 ? '&#x20A6;' + fmtAmt(s) : ''}</td>`).join('');
      }

      let tableBody = '';

      if (!useIppis) {
        const earnings = rows.filter(r => ['BP', 'PT'].includes(r.bpc));
        const deductions = rows.filter(r => ['PR', 'OT'].includes(r.bpc));
        const emolTotals = colTotals(earnings);
        const dedTotals = colTotals(deductions);
        const netTotals = emolTotals.map((v, i) => v - dedTotals[i]);

        tableBody += `<tr class="section-label"><td colspan="${numCols + 1}">Earnings</td></tr>`;
        earnings.forEach(r => {
          tableBody += `<tr><td class="desc" style="white-space:nowrap;">${esc(r.description)}</td>${renderAmtCells(r.amounts)}</tr>`;
        });
        tableBody += `<tr class="total-row"><td><strong>Total Emolument</strong></td>${renderTotalCells(emolTotals)}</tr>`;

        tableBody += `<tr class="section-label"><td colspan="${numCols + 1}">Deductions</td></tr>`;
        deductions.forEach(r => {
          tableBody += `<tr><td class="desc">${esc(r.description)}</td>${renderAmtCells(r.amounts)}</tr>`;
        });
        tableBody += `<tr class="total-row"><td><strong>Total Deduction</strong></td>${renderTotalCells(dedTotals)}</tr>`;

        tableBody += `<tr class="net-row"><td><strong>NET</strong></td>${netTotals.map(s => `<td class="amt">${s !== 0 ? '&#x20A6;' + fmtAmt(s) : ''}</td>`).join('')}</tr>`;

      } else {
        ['IPPIS', 'NAVY'].forEach(src => {
          const srcRows = rows.filter(r => r.source === src);
          const earnings = srcRows.filter(r => ['BP', 'PT'].includes(r.bpc));
          const deductions = srcRows.filter(r => ['PR', 'OT'].includes(r.bpc));
          const taxable = srcRows.filter(r => r.bpc === 'BP');
          const nonTaxable = srcRows.filter(r => r.bpc === 'PT');
          const emolTotals = colTotals(earnings);
          const dedTotals = colTotals(deductions);
          const srcNetTotals = emolTotals.map((v, i) => v - dedTotals[i]);

          tableBody += `<tr class="source-label"><td colspan="${numCols + 1}">${src}</td></tr>`;

          if (taxable.length) {
            tableBody += `<tr class="section-label"><td colspan="${numCols + 1}">Taxable Payment</td></tr>`;
            taxable.forEach(r => {
              tableBody += `<tr><td class="desc" style="white-space:nowrap;">${esc(r.description)}</td>${renderAmtCells(r.amounts)}</tr>`;
            });
          }
          if (nonTaxable.length) {
            tableBody += `<tr class="section-label"><td colspan="${numCols + 1}">Non-Taxable Payment</td></tr>`;
            nonTaxable.forEach(r => {
              tableBody += `<tr><td class="desc">${esc(r.description)}</td>${renderAmtCells(r.amounts)}</tr>`;
            });
          }
          if (src === 'IPPIS') {
            tableBody += `<tr class="total-row"><td><strong>Total Taxable Payment</strong></td>${renderTotalCells(emolTotals)}</tr>`;
          }
          if (deductions.length) {
            tableBody += `<tr class="section-label"><td colspan="${numCols + 1}">Deductions</td></tr>`;
            deductions.forEach(r => {
              tableBody += `<tr><td class="desc">${esc(r.description)}</td>${renderDedAmtCells(r.amounts)}</tr>`;
            });
            //tableBody += `<tr class="total-row"><td><strong>${src} Total Deduction</strong></td>${renderTotalCells(dedTotals)}</tr>`;
          }
          tableBody += `<tr class="total-row"><td><strong>${src} Total</strong></td>${srcNetTotals.map(s => `<td class="amt">${s !== 0 ? '&#x20A6;' + fmtAmt(s) : ''}</td>`).join('')}</tr>`;
        });

        const allEarnings = rows.filter(r => ['BP', 'PT'].includes(r.bpc));
        const allDeductions = rows.filter(r => ['PR', 'OT'].includes(r.bpc));
        const grandEmol = colTotals(allEarnings);
        const grandDed = colTotals(allDeductions);
        const grandNet = grandEmol.map((v, i) => v - grandDed[i]);
        tableBody += `<tr class="net-row"><td><strong>NET(IPPIS + NAVY)</strong></td>${grandNet.map(s => `<td class="amt">${s !== 0 ? '&#x20A6;' + fmtAmt(s) : ''}</td>`).join('')}</tr>`;
      }

    const pageWidth = manyCol ? '1250px' : '1050px';
    return `
    <div class="page" style="width:${pageWidth};">

      <div class="header-wrapper">
        <div class="className">${esc(emp.payclass_name || emp.payclass || '')}</div>
        <div class="header">
          <h1>Nigerian Navy (Naval Headquarters)</h1>
          <h2>CENTRAL PAY OFFICE, 23 POINT ROAD APAPA</h2>
        </div>
      </div>

      <div class="meta-row">
        <div class="meta-left">Salary History</div>
        <div class="meta-center">Produced <strong>${prodDate}</strong> at <strong>${prodTime}</strong></div>
        <div class="meta-right">Period: <strong>${esc(periodLabel(emp.fromPeriod))}</strong> &mdash; <strong>${esc(periodLabel(emp.toPeriod))}</strong></div>
      </div>

      <div class="emp-banner">
        <div class="ef"><span class="el">Service No:</span><span class="ev">${esc(emp.numb)}</span></div>
        <div class="ef"><span class="el">Name:</span><span class="ev">${esc(emp.surname)} ${esc(emp.othername)}</span></div>
        <div class="ef"><span class="el">Class:</span><span class="ev">${esc(emp.payclass_name || emp.payclass)}</span></div>
      </div>

      <table>
        <thead><tr>${colHeaders}</tr></thead>
        <tbody>${tableBody}</tbody>
      </table>

      <div class="footer"><p>All rights reserved &copy; Hicad Systems Limited.</p></div>
    </div>`;
    }).join('');

    return `<!DOCTYPE html><html><head><meta charset="UTF-8">
  <style>${css}</style></head><body>${pages}</body></html>`;
  }

  // ── Build the full A5 HTML document (exact replica of doc 2) ─────
  function buildExactPayslipHTML(employees, logoDataUrl) {
    const logoUrl = logoDataUrl || 'photos/logo.png';
    const payDate = fmtDate(new Date().toISOString());
    const selectedOption = document.getElementById('ps_payrollClass').options[document.getElementById('ps_payrollClass').selectedIndex];
    const className = (selectedOption && selectedOption.text) ? selectedOption.text : '';

    function esc(s) {
      if (s === null || s === undefined) return '';
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function fmt(n) {
      return (parseFloat(n) || 0).toLocaleString('en-NG', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function fmtDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      return isNaN(d) ? dateStr : d.toLocaleDateString('en-GB', { day: '2-digit', month: 'long', year: 'numeric' });
    }

    function sumByType(earnings, type) {
      return (earnings || []).filter(e => e.type === type).reduce((s, e) => s + (parseFloat(e.amount) || 0), 0);
    }

    const css = `
      @page { size: A5; margin: 10mm; margin-top: 0.2mm; margin-bottom: 0.2mm; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html {
        font-family: 'Helvetica', 'Arial', sans-serif;
        font-size: 7pt; color: #1a1a1a; line-height: 1.2;
        background-color: #d1d5db;
      }
      body { background-color: transparent; margin: 0; padding: 16px 0; }
      /* Each employee = one A5 sheet */
      .container {
        position: relative;
        width: 559px;       /* A5 at 96dpi: 148mm */
        min-height: 794px;  /* A5 at 96dpi: 210mm */
        margin: 0 auto 24px auto;
        padding: 28px 28px 20px 28px;
        background-color: #f8fbff;
        box-shadow: 0 4px 24px rgba(0,0,0,0.28);
        overflow: hidden;
        z-index: 1;
      }
      .container:last-child { margin-bottom: 0; }
      /* Watermark per page — use ::before on each .container */
      .container::before {
        content: "";
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background-image: url('${logoUrl}');
        background-size: auto 100%; background-repeat: no-repeat;
        background-position: center center;
        opacity: 0.02; z-index: 0; pointer-events: none;
      }
      .container > * { position: relative; z-index: 1; }
      @media print {
        html { background: none; }
        body { padding: 0; }
        .container {
          width: 100%; min-height: 0; margin: 0; padding: 10px;
          box-shadow: none; page-break-after: always;
          background-color: #f8fbff;
          print-color-adjust: exact; -webkit-print-color-adjust: exact;
        }
        .container:last-child { page-break-after: auto; }
        .container::before { position: fixed; }
      }
      .header-wrapper {
        display: flex; align-items: flex-start; margin-bottom: 8px;
        border-bottom: 2px solid #1a1a1a; padding-bottom: 5px;
      }
      .className { flex-shrink: 0; margin-right: 20px; align-self: center; font-size: 6pt; font-weight: bold; }
      .header { flex-grow: 1; text-align: center; }
      .header h1 {
        font-size: 13pt; font-weight: bold; margin-bottom: 2px; letter-spacing: 1.5px;
        color: #1e40af; font-family: 'Libre Baskerville', Georgia, serif;
      }
      .header h2 {
        font-size: 10pt; font-weight: normal; margin-top: 2px; color: #4a4a4a;
        font-family: 'Libre Baskerville', Georgia, serif;
      }
      .pay-period {
        width: 100%; margin: 3px 0; font-size: 7pt;
        display: flex; justify-content: space-between; align-items: center;
        background-color: #fafafa;
      }
      .pp-left, .pp-right { color: #4a4a4a; white-space: nowrap; }
      .pp-left strong, .pp-right strong { color: #1a1a1a; }
      .pp-center {
        flex-grow: 1; text-align: center; font-size: 7pt; font-weight: bold;
        color: #1a1a1a; letter-spacing: 0.5px; text-transform: uppercase;
        padding: 0 5px; white-space: nowrap;
        font-family: "Times New Roman", Times, serif; font-style: italic;
      }
      .section-header {
        font-size: 8pt; font-weight: bold; margin-top: 3px; margin-bottom: 4px;
        padding: 2px 5px; color: #1e40af; text-transform: uppercase;
        letter-spacing: 0.5px; width: 70%;
      }
      .employee-info {
        margin-bottom: 6px; padding: 2px 6px; background-color: #fafafa;
        border: 1px solid #d0d0d0; width: 70%;
      }
      .info-row { display: flex; padding: 2px 0; font-size: 7pt; border-bottom: 1px solid #f0f0f0; }
      .info-row:last-child { border-bottom: none; }
      .info-label { font-weight: 600; min-width: 85px; flex-shrink: 0; color: #1a1a1a; }
      .info-value { flex-grow: 1; color: #4a4a4a; }
      .items-table { width: 70%; border-collapse: collapse; margin-bottom: 0; }
      .items-table tbody tr { border-bottom: 1px solid #f0f0f0; }
      .items-table tbody td { padding: 1px 4px; font-size: 7pt; vertical-align: middle; color: #4a4a4a; }
      .items-table tbody td.amount {
        text-align: right; white-space: nowrap;
        font-family: 'Courier New', monospace; color: #1a1a1a;
        font-weight: 700; font-size: 7.5pt; padding-right: 8px; width: 90px;
      }
      /* Deduction layout — left zone (70%) + right zone (30%) side by side */
      .full-row { width: 100%; display: flex; align-items: flex-start; }
      .full-row .left-zone { width: 70%; flex-shrink: 0; }
      .full-row .right-zone { width: 30%; flex-shrink: 0; padding-left: 0; }
      /* Left-zone deduction table — stays within 70% */
      .ded-table { width: 100%; border-collapse: collapse; margin-bottom: 0; }
      .ded-table tbody tr { border-bottom: 1px solid #f0f0f0; }
      .ded-table col.col-desc { width: auto; }
      .ded-table col.col-amt { width: 90px; }
      .ded-table td { padding: 1px 4px; font-size: 7pt; vertical-align: middle; }
      .ded-table td.ded-desc { color: #4a4a4a; }
      .ded-table td.ded-amt {
        text-align: right; white-space: nowrap;
        font-family: 'Courier New', monospace; color: #1a1a1a;
        font-weight: 700; font-size: 7.5pt; padding-right: 8px;
      }
      /* Right-zone rows — L.Bal / Os.Mths, one per deduction row */
      .rz-rows { width: 100%; }
      .rz-row {
        display: flex; justify-content: space-between; align-items: center;
        min-height: 14.8px; padding: 1px 4px 1px 12px; box-sizing: border-box;
      }
      .rz-row.rz-has-data { border-bottom: 1px solid #f0f0f0; }
      .rz-row.rz-empty { border-bottom: none; }
      .rz-lbal {
        text-align: left; font-family: 'Courier New', monospace;
        font-size: 7pt; font-weight: 600; color: #1a1a1a;
      }
      .rz-osmths {
        text-align: right; font-family: 'Courier New', monospace;
        font-size: 7pt; font-weight: 600; color: #7c3aed;
      }
      /* Deduction section header — label 70% + L.Bal/Os.Mths 30% */
      .ded-header-row { width: 100%; display: flex; align-items: flex-end; }
      .ded-header-row .dh-label {
        width: 70%; flex-shrink: 0; font-size: 8pt; font-weight: bold;
        margin-top: 3px; margin-bottom: 4px; padding: 2px 5px; color: #1e40af;
        text-transform: uppercase; letter-spacing: 0.5px;
      }
      .ded-header-row .dh-cols {
        width: 30%; flex-shrink: 0; display: flex;
        justify-content: space-between; padding: 0 4px 4px 12px;
      }
      .dh-col { font-size: 7pt; font-weight: 600; color: #4a4a4a; }
      /* Total / net-pay rows */
      .total-row {
        background-color: #f5f5f5; border-top: 1px solid #d0d0d0;
        border-bottom: 1px solid #d0d0d0; padding: 2px 6px;
        display: flex; justify-content: space-between;
        font-size: 8pt; font-weight: 600; width: 70%;
      }
      .total-row .label { text-transform: uppercase; color: #1a1a1a; }
      .total-row .amount {
        text-align: right; min-width: 90px;
        font-family: 'Courier New', monospace; color: #1a1a1a; font-weight: 700;
      }
      .emolument-row {
        background-color: #f5f5f5; border: 1px solid #1a1a1a;
        padding: 3px 6px; margin: 2px 0; display: flex;
        justify-content: space-between; font-size: 8.5pt; font-weight: bold; width: 70%;
      }
      .emolument-row .label { text-transform: uppercase; color: #1a1a1a; }
      .emolument-row .amount {
        text-align: right; min-width: 90px;
        font-family: 'Courier New', monospace; color: #1a1a1a; font-weight: 700;
      }
      .net-pay {
        background-color: #f0f0f0; border: 2px solid #1a1a1a;
        padding: 5px 6px; margin: 4px 0; display: flex;
        justify-content: space-between; font-size: 9pt; font-weight: bold; width: 70%;
      }
      .net-pay .label { text-transform: uppercase; letter-spacing: 1px; }
      .net-pay .amount {
        text-align: right; min-width: 80px;
        font-family: 'Courier New', monospace; font-weight: 800;
      }
      .footer {
        margin-top: 3px; padding-top: 1px; border-top: 2px solid #d0d0d0;
        text-align: center; font-size: 6pt; color: #6a6a6a;
      }
      .footer p { margin: 1px 0; }
      .footer p:first-child { font-weight: 600; color: #4a4a4a; }
      @media print {
        body { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
        body::before { position: fixed; display: block; }
      }
    `;

    const pages = employees.map((emp, idx) => {
      const earnings = emp.earnings || [];
      const deductions = emp.deductions || [];

      const taxableRows = earnings
        .filter(e => e.type === 'Taxable')
        .map(e => `<tr><td>${esc(e.description)}</td><td class="amount">&#x20A6;${fmt(e.amount)}</td></tr>`)
        .join('');

      const nonTaxableRows = earnings
        .filter(e => e.type === 'Non-Taxable')
        .map(e => `<tr><td>${esc(e.description)}</td><td class="amount">&#x20A6;${fmt(e.amount)}</td></tr>`)
        .join('');

      const dedLeftRows = deductions.map(item =>
        `<tr>
          <td class="ded-desc">${esc(item.description)}</td>
          <td class="ded-amt">&#x20A6;${fmt(item.amount)}</td>
        </tr>`
      ).join('');

      const dedRightRows = deductions.map(item => {
        const lbal = (item.is_loan && item.loan_balance) ? fmt(item.loan_balance) : '';
        const osmth = (item.is_loan && item.outstanding_months && item.outstanding_months !== '-' && item.outstanding_months !== 0)
          ? esc(String(item.outstanding_months)) : '';
        const hasData = !!(lbal || osmth);
        return `<div class="rz-row ${hasData ? 'rz-has-data' : 'rz-empty'}">
          <span class="rz-lbal">${lbal}</span>
          <span class="rz-osmths">${osmth}</span>
        </div>`;
      }).join('');

      const taxableTotal = sumByType(earnings, 'Taxable');
      const nonTaxableTotal = sumByType(earnings, 'Non-Taxable');
      const totalEmolument = taxableTotal + nonTaxableTotal;

      const nsitfRow = emp.nsitfcode
        ? `<div class="info-row"><span class="info-label">RSA (Pension):</span><span class="info-value">${esc(emp.nsitfcode)}</span></div>`
        : '';

      const pageBreak = '';

      return `
      <div class="container">

        <!-- HEADER -->
        <div class="header-wrapper">
          <div class="className">${emp.payclass ? esc(emp.payclass_name || '') : ''}</div>
          <div class="header">
            <h1>Nigerian Navy (Naval Headquarters)</h1>
            <h2>CENTRAL PAY OFFICE, 23 POINT ROAD APAPA</h2>
          </div>
        </div>

        <!-- PAY PERIOD -->
        <div class="pay-period">
          <span class="pp-left"><strong>Pay Period:</strong> ${esc(emp.payroll_month)} ${esc(String(emp.payroll_year))}</span>
          <span class="pp-center">${esc(emp.payclass_name || className)} PAYSLIP</span>
          <span class="pp-right"><strong>Produced On:</strong> ${payDate}</span>
        </div>

        <!-- EMPLOYEE INFO -->
        <div class="section-header">Personnel Information</div>
        <div class="employee-info">
          <div class="info-row">
            <span class="info-label">Name:</span>
            <span class="info-value">${esc(emp.title)}. ${esc(emp.surname)} ${esc(emp.othername)}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Service No:</span>
            <span class="info-value">${esc(emp.employee_id)}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Grade:</span>
            <span class="info-value">${esc(emp.gradelevel)}${emp.gradetype ? ' - ' + esc(emp.gradetype) : ''}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Department:</span>
            <span class="info-value">${esc(emp.department)}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Branch:</span>
            <span class="info-value">${esc(emp.factory)}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Bank Account:</span>
            <span class="info-value">${esc(emp.bank_account_number)}${emp.bank_name ? ' (' + esc(emp.bank_name) + ')' : ''}</span>
          </div>
          ${nsitfRow}
        </div>

        <!-- TAXABLE PAYMENT — deduction-style header with L.Bal / Os.Mths labels -->
        <div class="ded-header-row">
          <div class="dh-label">Taxable Payment</div>
          <div class="dh-cols">
            <span class="dh-col">&#x20A6;L.Bal</span>
            <span class="dh-col">Os.Mths</span>
          </div>
        </div>
        <table class="items-table">
          <tbody>${taxableRows}</tbody>
        </table>
        <div class="total-row">
          <span class="label">Total Taxable Payment</span>
          <span class="amount">&#x20A6;${fmt(taxableTotal)}</span>
        </div>

        <!-- NON-TAXABLE PAYMENT -->
        <div class="section-header">Non-Taxable Payment</div>
        <table class="items-table">
          <tbody>${nonTaxableRows}</tbody>
        </table>
        <div class="total-row">
          <span class="label">Total Non-Taxable Payment</span>
          <span class="amount">&#x20A6;${fmt(nonTaxableTotal)}</span>
        </div>

        <!-- TOTAL EMOLUMENT -->
        <div class="emolument-row">
          <span class="label">Total Emolument</span>
          <span class="amount">&#x20A6;${fmt(totalEmolument)}</span>
        </div>

        <!-- DEDUCTIONS -->
        <div class="section-header">Deductions</div>
        <div class="full-row">
          <div class="left-zone">
            <table class="ded-table">
              <colgroup><col class="col-desc"><col class="col-amt"></colgroup>
              <tbody>${dedLeftRows}</tbody>
            </table>
          </div>
          <div class="right-zone">
            <div class="rz-rows">${dedRightRows}</div>
          </div>
        </div>
        <div class="total-row">
          <span class="label">Total Deduction</span>
          <span class="amount">&#x20A6;${fmt(emp.total_deductions)}</span>
        </div>

        <!-- NET PAY -->
        <div class="net-pay">
          <span class="label">Net Payment This Month</span>
          <span class="amount">&#x20A6;${fmt(emp.net_pay)}</span>
        </div>

        <div class="footer">
          <p>All rights reserved &copy; Hicad Systems Limited.</p>
        </div>

      </div>
      ${pageBreak}`;
    }).join('');

    return `<!DOCTYPE html>
    <html>
    <head>
      <meta charset="UTF-8">
      <style>${css}</style>
    </head>
    <body>${pages}</body>
    </html>`;
  }

  // ── Consolidated Payslip Helpers ─────────────────//
  function esc(s) {
    if (s == null) return '';
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
  function fmt(n) {
    return (parseFloat(n) || 0).toLocaleString('en-NG', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  function fmtDate(d) {
    if (!d) return '';
    const dt = new Date(d);
    return isNaN(dt) ? d : dt.toLocaleDateString('en-GB', { day: '2-digit', month: 'long', year: 'numeric' });
  }

  // ── Render one payment table (taxable / nontaxable) ────────────
  function renderPayTable(items) {
    if (!items || !items.length) return '';
    return items.map(item =>
      `<tr><td>${esc(item.description)}</td><td class="amount">&#x20A6;${fmt(item.amount)}</td></tr>`
    ).join('');
  }

  // ── Render deductions — left 70% table + right 30% L.Bal/Os.Mths zone ──
  function renderDedSection(items) {
    if (!items || !items.length) return '';
    const leftRows = items.map(item =>
      `<tr><td class="ded-desc">${esc(item.description)}</td><td class="ded-amt">(&#x20A6;${fmt(item.amount)})</td></tr>`
    ).join('');
    const rightRows = items.map(item => {
      const lbal = item.loan_balance ? fmt(item.loan_balance) : '';
      const osmth = (item.outstanding_months && item.outstanding_months !== '-' && item.outstanding_months !== 0)
        ? esc(String(item.outstanding_months)) : '';
      const hasData = !!(lbal || osmth);
      return `<div class="rz-row ${hasData ? 'rz-has-data' : 'rz-empty'}">
          <span class="rz-lbal">${lbal}</span>
          <span class="rz-osmths">${osmth}</span>
        </div>`;
    }).join('');
    return `<div class="full-row">
        <div class="left-zone">
          <table class="ded-table">
            <colgroup><col class="col-desc"><col class="col-amt"></colgroup>
            <tbody>${leftRows}</tbody>
          </table>
        </div>
        <div class="right-zone"><div class="rz-rows">${rightRows}</div></div>
      </div>`;
  }

  // ── Build one employee page ────────────────────────────────────
  function renderEmployee(emp, globals) {
    const nsitfRow = emp.nsitfcode
      ? `<div class="info-row"><span class="info-label">RSA (Pension):</span><span class="info-value">${esc(emp.nsitfcode)}</span></div>`
      : '';

    // IPPIS block
    let ippisHtml = '';
    if (emp.ippis) {
      const ip = emp.ippis;
      ippisHtml += `<div class="source-row">
          <div class="sr-header">IPPIS</div>
          <div class="sr-labels"><span class="sr-lbl">&#x20A6;L.Bal</span><span class="sr-lbl">Os.Mths</span></div>
        </div>`;
      if (ip.taxable && ip.taxable.length) {
        ippisHtml += `<div class="section-header">Taxable Payment</div>
          <table class="items-table"><tbody>${renderPayTable(ip.taxable)}</tbody></table>`;
      }
      if (ip.nontaxable && ip.nontaxable.length) {
        ippisHtml += `<div class="section-header">Non-Taxable Payment</div>
          <table class="items-table"><tbody>${renderPayTable(ip.nontaxable)}</tbody></table>`;
      }
      if (ip.deductions && ip.deductions.length) {
        ippisHtml += `<div class="section-header">Deductions</div>${renderDedSection(ip.deductions)}`;
      }
      ippisHtml += `<div class="total-row"><span class="label">IPPIS Total</span><span class="amount">&#x20A6;${fmt(ip.net)}</span></div>`;
    }

    // NAVY block
    let navyHtml = '';
    if (emp.navy) {
      const nv = emp.navy;
      navyHtml += `<div class="source-header">NAVY</div>`;
      if (nv.taxable && nv.taxable.length) {
        navyHtml += `<div class="section-header">Taxable Payment</div>
          <table class="items-table"><tbody>${renderPayTable(nv.taxable)}</tbody></table>`;
      }
      if (nv.nontaxable && nv.nontaxable.length) {
        navyHtml += `<div class="section-header">Non-Taxable Payment</div>
            <table class="items-table"><tbody>${renderPayTable(nv.nontaxable)}</tbody></table>`;
      }
      if (nv.deductions && nv.deductions.length) {
        navyHtml += `<div class="section-header">Deductions</div>${renderDedSection(nv.deductions)}`;
      }
      navyHtml += `<div class="total-row"><span class="label">NAVY Total</span><span class="amount">&#x20A6;${fmt(nv.net)}</span></div>`;
    }

    return `<div class="container">
      <div class="header-wrapper">
        <div class="className">${esc(globals.className)}</div>
        <div class="header">
          <h1>Nigerian Navy (Naval Headquarters)</h1>
          <h2>CENTRAL PAY OFFICE, 23 POINT ROAD APAPA</h2>
        </div>
      </div>

      <div class="pay-period">
        <span class="pp-left"><strong>Pay Period:</strong> ${esc(emp.payroll_month)} ${esc(String(emp.payroll_year))}</span>
        <span class="pp-center">${esc(globals.className)} CONSOLIDATED PAYSLIP</span>
        <span class="pp-right"><strong>Produced On:</strong> ${globals.payDate}</span>
      </div>

      <div class="section-header">Personnel Information</div>
      <div class="employee-info">
        <div class="info-row"><span class="info-label">Name:</span><span class="info-value">${esc(emp.title)}. ${esc(emp.surname)} ${esc(emp.othername)}</span></div>
        <div class="info-row"><span class="info-label">Service No:</span><span class="info-value">${esc(emp.employee_id)}</span></div>
        <div class="info-row"><span class="info-label">Grade:</span><span class="info-value">${esc(emp.gradelevel)}</span></div>
        <div class="info-row"><span class="info-label">Department:</span><span class="info-value">${esc(emp.department)}</span></div>
        <div class="info-row"><span class="info-label">Branch:</span><span class="info-value">${esc(emp.factory)}</span></div>
        <div class="info-row"><span class="info-label">Bank Account:</span><span class="info-value">${esc(emp.bank_account_number)}${emp.bank_name ? ' (' + esc(emp.bank_name) + ')' : ''}</span></div>
        ${nsitfRow}
      </div>

      ${ippisHtml}
      ${navyHtml}

      <div class="net-pay">
        <span class="label">NET PAYMENT THIS MONTH</span>
        <span class="amount">&#x20A6;${fmt(emp.net_pay)}</span>
      </div>

      <div class="footer"><p>All rights reserved &#xA9; Hicad Systems Limited.</p></div>
    </div>`;
  }

  function buildConsolidatedHTML(employees, logoDataUrl) {
    const logoUrl = logoDataUrl || 'photos/logo.png';
    const payDate = fmtDate(new Date().toISOString());
    const selectedOption = document.getElementById('ps_payrollClass').options[document.getElementById('ps_payrollClass').selectedIndex];
    const className = (selectedOption && selectedOption.text) ? selectedOption.text : '';
    const globals = { className, payDate };

    const css = `
        @page { size: A5; margin: 10mm; margin-top: 0.2mm; margin-bottom: 0.2mm; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-family: 'Helvetica','Arial',sans-serif; font-size: 7pt; color: #1a1a1a; line-height: 1.2; background-color: #d1d5db; }
        body { background-color: transparent; margin: 0; padding: 16px 0; }

        .container {
          position: relative; width: 559px; min-height: 794px;
          margin: 0 auto 24px auto; padding: 28px 28px 20px 28px;
          background-color: #f8fbff; box-shadow: 0 4px 24px rgba(0,0,0,0.28); overflow: hidden; z-index: 1;
        }
        .container:last-child { margin-bottom: 0; }
        .container::before {
          content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
          background-image: url('${logoUrl}'); background-size: auto 100%;
          background-repeat: no-repeat; background-position: center center;
          opacity: 0.02; z-index: 0; pointer-events: none;
        }
        .container > * { position: relative; z-index: 1; }

        @media print {
          html { background: none; } body { padding: 0; }
          .container { width:100%; min-height:0; margin:0; padding:10px; box-shadow:none; page-break-after:always; background-color:#f8fbff; print-color-adjust:exact; -webkit-print-color-adjust:exact; }
          .container:last-child { page-break-after:auto; }
          .container::before { position: fixed; }
        }

        .header-wrapper { display:flex; align-items:flex-start; margin-bottom:8px; border-bottom:2px solid #1a1a1a; padding-bottom:5px; }
        .className { flex-shrink:0; margin-right:20px; align-self:center; font-size:7pt; }
        .header { flex-grow:1; text-align:center; }
        .header h1 { font-size:13pt; font-weight:bold; margin-bottom:2px; letter-spacing:1.5px; color:#1e40af; font-family:'Libre Baskerville',Georgia,serif; }
        .header h2 { font-size:10pt; font-weight:normal; margin-top:2px; color:#4a4a4a; font-family:'Libre Baskerville',Georgia,serif; }

        .pay-period { width:100%; margin:3px 0; font-size:7pt; display:flex; justify-content:space-between; align-items:center; background-color:#fafafa; }
        .pp-left,.pp-right { color:#4a4a4a; white-space:nowrap; }
        .pp-left strong,.pp-right strong { color:#1a1a1a; }
        .pp-center { flex-grow:1; text-align:center; font-size:7pt; font-weight:bold; color:#1a1a1a; letter-spacing:0.5px; text-transform:uppercase; padding:0 5px; white-space:nowrap; font-family:"Times New Roman",Times,serif; font-style:italic; }

        .items-table { width:70%; border-collapse:collapse; margin-bottom:0; }

        .rz-rows { width:100%; }

    const body = employees.map(emp => renderEmployee(emp, globals)).join('');

    return `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>${css}</style></head><body>${body}</body></html>`;
