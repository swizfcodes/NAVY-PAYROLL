<style>
    @keyframes grow-up {
        0% {
            height: 0;
            bottom: 0;
        }

        100% {
            height: 100%;
            bottom: 0;
        }
    }

    @keyframes grow-down {
        0% {
            height: 0;
            top: 0;
        }

        100% {
            height: 100%;
            top: 0;
        }
    }

    @keyframes expand {
        0% {
            width: 0;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        100% {
            width: 100%;
            left: 0;
            transform: translateY(-50%);
        }
    }

    .animate-grow-up {
        animation: grow-up 0.6s ease-in-out infinite alternate;
        position: absolute;
        bottom: 0;
    }

    .animate-grow-down {
        animation: grow-down 0.6s ease-in-out infinite alternate;
        position: absolute;
        top: 0;
    }

    .animate-expand {
        animation: expand 0.6s ease-in-out infinite alternate;
    }
</style>

<script>
    const auth = window.authService;
    class DatabaseBackup {
        constructor() {
            this.fetchDatabaseName();
            this.init();
            this.loadBackupHistory();
            this.checkConnection();
            this.updateStatistics();
        }

        init() {
            document.getElementById('startBackup').addEventListener('click', () => this.startBackup());
            document.getElementById('scheduleBackup').addEventListener('click', () => this.scheduleBackup());
            document.getElementById('refreshConnection').addEventListener('click', () => this.checkConnection());
            document.getElementById('cancelBackup').addEventListener('click', () => this.cancelBackup());

            // Alert modal close
            document.getElementById('alertModalClose').addEventListener('click', () => {
                this.hideAlertModal();
            });

            // Auto-refresh history every 30 seconds
            setInterval(() => this.loadBackupHistory(), 30000);
        }

        async fetchDatabaseName() {
            try {
                const token = localStorage.getItem("token");
                const res = await auth.fetchWithAuth("/api/backup-db/database", {
                    method: "GET",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    }
                });
                const data = await res.json();
                const select = document.getElementById("databaseSelect");
                select.innerHTML = "";
                const option = document.createElement("option");
                option.value = data.database;
                option.textContent = data.class_name;
                option.selected = true;
                select.appendChild(option);
                this.dbName = data.database;
            } catch (err) {
                this.showAlertModal('Failed to load database name. Please refresh and try again.', 'error', 'Load Error');
            }
        }

        async checkConnection() {
            const statusIndicator = document.getElementById('statusIndicator');
            const statusText = document.getElementById('statusText');

            statusIndicator.className = 'w-3 h-3 rounded-full bg-yellow-500 mr-3';
            statusText.textContent = 'Checking connection...';

            try {
                const token = localStorage.getItem("token");
                const response = await auth.fetchWithAuth('/api/backup-db/health', {
                    method: "GET",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    }
                });
                if (response.ok) {
                    statusIndicator.className = 'w-3 h-3 rounded-full bg-green-500 mr-3';
                    statusText.textContent = 'Connected to server';
                } else {
                    throw new Error('Server responded with error');
                }
            } catch (error) {
                statusIndicator.className = 'w-3 h-3 rounded-full bg-red-500 mr-3';
                statusText.textContent = 'Connection failed';
                this.showAlertModal('Unable to connect to the server. Please check your network and try again.', 'error', 'Connection Failed');
            }
        }

        async startBackup() {
            const backupType = document.getElementById('backupType').value;
            const compression = document.getElementById('compression').checked;
            const storage = document.querySelector('input[name="storage"]:checked').value;

            this.showProgressModal();

            try {
                const token = localStorage.getItem("token");
                const response = await auth.fetchWithAuth('/api/backup-db/backup/mysql', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        database: this.dbName,
                        backupType,
                        compression,
                        storage
                    })
                });

                this.simulateProgress();
                const result = await response.json();

                if (result.success) {
                    this.hideProgressModal();
                    this.showSuccessModal('Backup completed successfully!');
                    this.loadBackupHistory();
                    this.updateStatistics();
                } else {
                    throw new Error(result.error || 'Backup failed');
                }
            } catch (error) {
                this.hideProgressModal();
                this.showAlertModal('Backup failed: ' + error.message, 'error', 'Backup Error');
            }
        }

        async scheduleBackup() {
            const schedule = document.getElementById('scheduleSelect').value;
            if (schedule === 'manual') {
                this.showAlertModal('Please select a schedule option (Daily, Weekly, or Monthly).', 'info', 'Select Schedule');
                return;
            }

            try {
                const token = localStorage.getItem("token");
                const response = await auth.fetchWithAuth('/api/backup-db/backup/schedule', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        schedule,
                        backupType: document.getElementById('backupType').value,
                        compression: document.getElementById('compression').checked,
                        storage: document.querySelector('input[name="storage"]:checked').value
                    })
                });

                const result = await response.json();

                if (result.success) {
                    this.showSuccessModal(`Backup scheduled for ${schedule} execution`);
                } else {
                    throw new Error(result.error || 'Scheduling failed');
                }
            } catch (error) {
                this.showAlertModal('Scheduling failed: ' + error.message, 'error', 'Schedule Error');
            }
        }

        async loadBackupHistory() {
            const historyContainer = document.getElementById('backupHistory');
            if (!historyContainer || !historyContainer.offsetParent) return;

            try {
                const token = localStorage.getItem("token");
                const response = await auth.fetchWithAuth('/api/backup-db/backups', {
                    method: "GET",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    }
                });
                const data = await response.json();

                if (data.backups && data.backups.length > 0) {
                    const sorted = data.backups.sort(
                        (a, b) => new Date(b.created) - new Date(a.created)
                    );
                    historyContainer.innerHTML = sorted.map(backup => `
                        <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg border">
                            <div class="flex items-center">
                                <div class="p-2 rounded-full mr-3">
                                    <i class="fas fa-database text-blue-600"></i>
                                </div>
                                <div>
                                    <p class="font-medium text-sm text-gray-900">${backup.filename}</p>
                                    <p class="text-sm text-gray-500">
                                        ${this.formatFileSize(backup.size)} • ${this.formatDate(backup.created)} 
                                    </p>
                                </div>
                            </div>
                            <div class="flex space-x-2">
                                <button class="download-btn text-blue-600 hover:text-blue-800" 
                                        data-filename="${backup.filename}">
                                    <i class="fas fa-download"></i>
                                </button>
                                <button class="delete-btn text-red-600 hover:text-red-800" 
                                        data-filename="${backup.filename}">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    historyContainer.innerHTML = `
                        <div class="text-center py-8 text-gray-500">
                            <i class="fas fa-inbox text-3xl mb-2"></i>
                            <p>No backups found</p>
                        </div>
                    `;
                }
            } catch (error) {
                this.showAlertModal('Failed to load backup history. Please try again.', 'error', 'Load Error');
            }

            const backupHistory = document.getElementById('backupHistory');
            if (!backupHistory.dataset.eventsBound) {
                backupHistory.addEventListener('click', (e) => {
                    const downloadBtn = e.target.closest('.download-btn');
                    const deleteBtn = e.target.closest('.delete-btn');

                    if (downloadBtn) this.downloadBackup(downloadBtn.dataset.filename);
                    if (deleteBtn) this.deleteBackup(deleteBtn.dataset.filename);
                });
                backupHistory.dataset.eventsBound = "true";
            }
        }

        async downloadBackup(filename) {
            try {
                const token = localStorage.getItem("token");
                const response = await auth.fetchWithAuth(`/api/backup-db/backup/download/${filename}`, {
                    method: "GET",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    }
                });
                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                    this.showSuccessModal('Download successful!');
                } else {
                    throw new Error('Download failed');
                }
            } catch (error) {
                this.showAlertModal('Download failed: ' + error.message, 'error', 'Download Error');
            }
        }

        async deleteBackup(filename) {
            this.showConfirmDelete(filename, async () => {
                try {
                    const token = localStorage.getItem("token");
                    const response = await auth.fetchWithAuth(`/api/backup-db/backup/${filename}`, {
                        method: 'DELETE',
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": `Bearer ${token}`
                        }
                    });

                    const result = await response.json();

                    if (result.success) {
                        this.showSuccessModal('Backup deleted successfully');
                        this.loadBackupHistory();
                        this.updateStatistics();
                    } else {
                        throw new Error(result.error || 'Delete failed');
                    }
                } catch (error) {
                    this.showAlertModal('Delete failed: ' + error.message, 'error', 'Delete Error');
                }
            });
        }

        async updateStatistics() {
            try {
                const token = localStorage.getItem("token");
                const response = await auth.fetchWithAuth('/api/backup-db/backup/stats', {
                    method: "GET",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    }
                });
                const stats = await response.json();

                document.getElementById('successCount').textContent = stats.successfulBackups || 0;
                document.getElementById('storageUsed').textContent = this.formatFileSize(stats.totalStorage || 0);
                document.getElementById('lastBackup').textContent = stats.lastBackup ?
                    this.formatDate(stats.lastBackup) : 'Never';
            } catch (error) {
                this.showAlertModal('Failed to load statistics. Please refresh.', 'error', 'Stats Error');
            }
        }

        // ── Progress Modal (animation loader) ──────────────────────────────
        showProgressModal() {
            const modal = document.getElementById('progressModal');
            document.getElementById('progressText').textContent = 'Initializing backup...';
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        hideProgressModal() {
            const modal = document.getElementById('progressModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.getElementById('progressText').textContent = 'Initializing backup...';
        }

        simulateProgress() {
            const progressText = document.getElementById('progressText');
            const steps = [
                'Connecting to database...',
                'Analyzing database structure...',
                'Exporting data...',
                'Compressing backup...',
                'Finalizing backup...'
            ];
            let step = 0;
            const interval = setInterval(() => {
                if (step < steps.length) {
                    progressText.textContent = steps[step++];
                } else {
                    clearInterval(interval);
                    progressText.textContent = 'Completing backup...';
                }
            }, 600);
        }

        cancelBackup() {
            this.hideProgressModal();
            this.showAlertModal('The backup operation was cancelled.', 'info', 'Backup Cancelled');
        }

        // ── Success Modal ───────────────────────────────────────────────────
        showSuccessModal(message) {
            const modal = document.getElementById('successModal');
            const loadingSpinner = document.getElementById('loadingSpinner');
            const successTick = document.getElementById('successTick');
            const successMessage = document.getElementById('successMessage');

            loadingSpinner.classList.remove('hidden');
            successTick.classList.add('hidden');
            successMessage.textContent = 'Processing...';

            modal.classList.remove('hidden');
            modal.classList.add('flex');

            setTimeout(() => {
                loadingSpinner.classList.add('hidden');
                successTick.classList.remove('hidden');
                successMessage.textContent = message || 'Operation successful!';
                setTimeout(() => {
                    modal.classList.add('hidden');
                    modal.classList.remove('flex');
                }, 1500);
            }, 1500);
        }

        // ── Alert Modal (replaces showNotification + console.error) ─────────
        showAlertModal(message, type = 'info', title = 'Notice') {
            const modal = document.getElementById('alertModal');
            const iconEl = document.getElementById('alertIcon');
            const titleEl = document.getElementById('alertModalTitle');
            const messageEl = document.getElementById('alertModalMessage');

            const config = {
                success: {
                    bg: 'bg-green-100',
                    iconColor: 'text-green-600',
                    icon: '<i class="fas fa-check-circle text-lg"></i>'
                },
                error: {
                    bg: 'bg-red-100',
                    iconColor: 'text-red-600',
                    icon: '<i class="fas fa-times-circle text-lg"></i>'
                },
                info: {
                    bg: 'bg-blue-100',
                    iconColor: 'text-blue-600',
                    icon: '<i class="fas fa-info-circle text-lg"></i>'
                }
            };

            const { bg, iconColor, icon } = config[type] || config.info;
            iconEl.className = `w-10 h-10 rounded-full flex items-center justify-center mr-3 flex-shrink-0 ${bg} ${iconColor}`;
            iconEl.innerHTML = icon;
            titleEl.textContent = title;
            messageEl.textContent = message;

            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        hideAlertModal() {
            const modal = document.getElementById('alertModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        // ── Confirm Delete Modal ────────────────────────────────────────────
        showConfirmDelete(filename, onConfirm) {
            const modal = document.getElementById('confirmModal');
            const confirmBtn = document.getElementById('confirmDelete');
            const cancelBtn = document.getElementById('cancelDelete');

            document.getElementById('confirmModalTitle').textContent = 'Confirm Delete';
            document.getElementById('confirmModalMessage').textContent =
                `Are you sure you want to delete "${filename}"? This action cannot be undone.`;

            const close = () => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            };

            confirmBtn.onclick = () => { close(); onConfirm(); };
            cancelBtn.onclick = close;

            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        formatFileSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString() + ' ' + date.toLocaleTimeString();
        }
    }

    // Initialize
    const backupManager = new DatabaseBackup();

    // Hide quick nav buttons user has no access to
    function applyQuickNavAccess() {
    const manager = window.quickAccessManager;

    // Wait for manager AND its menus to be populated
    if (!manager || !manager.userAccessibleMenus?.length) {
        setTimeout(applyQuickNavAccess, 50);
        return;
    }

    document.querySelectorAll('[id^="quickNav-"]').forEach(btn => {
        const menuKey = btn.id.replace('quickNav-', '');
        window.checkMenuAccess(menuKey, btn);
    });
    }

    applyQuickNavAccess();
    
</script>
