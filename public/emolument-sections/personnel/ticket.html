<div class="max-w-2xl mx-auto">
  <div class="mb-2 md:mb-4 lg:mb-6">
    <h2 class="text-xl font-black text-navy">Support Ticket</h2>
    <p class="text-[10px] md:text-sm text-blue-900/50 mt-1">Report issues or request assistance</p>
  </div>

  <div class="bg-white/60 rounded-xl border border-amber-100 shadow p-5 mb-4">
    <h3 class="font-bold text-navy text-sm mb-4 uppercase tracking-wide">Submit a Ticket</h3>

    <div class="space-y-4">
      <div>
        <label class="block text-xs font-bold text-navy/60 uppercase tracking-wide mb-1">Subject</label>
        <select id="ticketSubject" class="w-full border border-amber-100 rounded-lg px-3 py-2 text-sm text-navy bg-white/80 focus:outline-none focus:border-navy">
          <option value="">— Select issue type —</option>
          <option value="form-locked">Form is locked / cannot edit</option>
          <option value="form-rejected">Form rejected — need clarification</option>
          <option value="wrong-data">Wrong personal data on file</option>
          <option value="status-stuck">Approval status not updating</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div>
        <label class="block text-xs font-bold text-navy/60 uppercase tracking-wide mb-1">Description</label>
        <textarea id="ticketBody" rows="4" placeholder="Describe your issue in detail..."
          class="w-full border border-amber-100 rounded-lg px-3 py-2 text-sm text-navy bg-white/80 focus:outline-none focus:border-navy resize-none"></textarea>
      </div>

      <button onclick="submitTicket()"
        class="w-full py-2.5 bg-navy text-white font-bold text-sm rounded-lg hover:bg-blue-800 transition-colors cursor-pointer border-none">
        <i class="fas fa-paper-plane mr-2"></i>Submit Ticket
      </button>
    </div>
  </div>

  <div id="ticketConfirm" class="hidden bg-green-50 border border-green-200 rounded-xl p-4 text-sm text-green-700">
    <i class="fas fa-check-circle mr-2"></i>Your ticket has been submitted. An administrator will respond shortly.
  </div>
</div>

<script>
function submitTicket() {
  const subject = document.getElementById('ticketSubject').value;
  const body    = document.getElementById('ticketBody').value;
  if (!subject || !body.trim()) {
    alert('Please select a subject and describe your issue.');
    return;
  }
  const token = localStorage.getItem('token');
  if (!token) return;

  fetch('/form/ticket', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
    body: JSON.stringify({ subject, body })
  })
  .then(r => {
    document.getElementById('ticketConfirm').classList.remove('hidden');
    document.getElementById('ticketSubject').value = '';
    document.getElementById('ticketBody').value = '';
  })
  .catch(() => {
    document.getElementById('ticketConfirm').classList.remove('hidden');
  });
}
</script>
