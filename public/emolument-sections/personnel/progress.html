<div class="max-w-2xl mx-auto">
  <div class="mb-2 md:mb-4 lg:mb-6">
    <h2 class="text-xl font-black text-navy">Approval Progress</h2>
    <p class="text-[10px] md:text-sm text-blue-900/50 mt-1">Track your form through the approval workflow</p>
  </div>

  <div id="progressContent">
    <div class="flex items-center justify-center py-16 text-navy/30">
      <i class="fas fa-spinner fa-spin mr-2"></i> Loading...
    </div>
  </div>
</div>

<script>
(function() {
  const STEPS = [
    { key: 'SUBMITTED',     role: 'Personnel',  action: 'Form Submitted',    icon: 'fa-paper-plane' },
    { key: 'DO_REVIEWED',   role: 'DO',         action: 'Reviewed by DO',    icon: 'fa-eye' },
    { key: 'FO_APPROVED',   role: 'FO',         action: 'Approved by FO',    icon: 'fa-check' },
    { key: 'CPO_CONFIRMED', role: 'CPO',        action: 'Confirmed by CPO',  icon: 'fa-stamp' },
  ];
  const ORDER = ['DRAFT','SUBMITTED','DO_REVIEWED','FO_APPROVED','CPO_CONFIRMED'];

  function render(data) {
    const status  = data?.status || 'DRAFT';
    const shipName = data?.ship || '—';
    const formNo   = data?.form_number || '—';
    const currentIdx = ORDER.indexOf(status);

    const el = document.getElementById('progressContent');

    const rejected = status === 'REJECTED';
    const remarks  = data?.rejection_remarks || '';

    let html = `
      <div class="bg-white/60 rounded-xl border border-amber-100 shadow p-4 mb-4">
        <div class="grid grid-cols-2 gap-3 text-sm">
          <div>
            <div style="font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:rgba(30,64,175,0.4);">Form No</div>
            <div class="font-bold text-navy mt-0.5">${formNo}</div>
          </div>
          <div>
            <div style="font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:rgba(30,64,175,0.4);">Ship</div>
            <div class="font-bold text-navy mt-0.5">${shipName}</div>
          </div>
        </div>
      </div>`;

    if (rejected) {
      html += `<div class="bg-red-50 border border-red-200 rounded-xl p-4 mb-4">
        <div class="flex items-center gap-2 mb-2">
          <i class="fas fa-times-circle text-red-500"></i>
          <span class="font-bold text-red-700 text-sm">Form Rejected</span>
        </div>
        <p class="text-sm text-red-600">${remarks || 'Please review your form and resubmit.'}</p>
      </div>`;
    }

    html += `<div class="space-y-3">`;

    STEPS.forEach((step, i) => {
      let state = 'pending';
      if (!rejected && currentIdx > ORDER.indexOf(step.key)) state = 'done';
      else if (!rejected && currentIdx === ORDER.indexOf(step.key)) state = 'current';

      const colors = {
        done:    { bg: 'bg-green-50', border: 'border-green-200', icon: 'text-green-600', circle: 'bg-green-500 border-green-500 text-white', label: 'text-green-700' },
        current: { bg: 'bg-blue-50',  border: 'border-blue-200',  icon: 'text-blue-600',  circle: 'bg-navy border-navy text-white',          label: 'text-blue-700' },
        pending: { bg: 'bg-white/40', border: 'border-amber-100', icon: 'text-blue-900/20', circle: 'bg-white border-blue-900/15 text-blue-900/20', label: 'text-blue-900/30' },
      }[state];

      html += `
        <div class="flex items-center gap-4 p-4 rounded-xl border ${colors.bg} ${colors.border}">
          <div class="w-9 h-9 rounded-full border-2 flex items-center justify-center flex-shrink-0 ${colors.circle}">
            <i class="fas ${state === 'done' ? 'fa-check' : step.icon}" style="font-size:13px"></i>
          </div>
          <div class="flex-1 min-w-0">
            <div class="font-bold text-sm ${colors.label}">${step.action}</div>
            <div class="text-xs text-blue-900/40 mt-0.5">${step.role} · Step ${i + 1}</div>
          </div>
          ${state === 'current' ? '<span class="text-xs font-bold text-blue-600 bg-blue-100 px-2 py-0.5 rounded-full flex-shrink-0">In Progress</span>' : ''}
          ${state === 'done'    ? '<i class="fas fa-check-circle text-green-500 flex-shrink-0"></i>' : ''}
          ${state === 'pending' ? '<i class="fas fa-clock text-blue-900/15 flex-shrink-0"></i>' : ''}
        </div>`;
    });

    html += `</div>`;
    el.innerHTML = html;
  }

  const token = localStorage.getItem('token');
  if (!token) { render(null); return; }

  fetch('/form/load', { headers: { Authorization: 'Bearer ' + token } })
    .then(r => r.ok ? r.json() : null)
    .then(render)
    .catch(() => render(null));
})();
</script>
