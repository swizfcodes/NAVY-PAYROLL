<div class="p-2 md:p-4 lg:p-6">
  <div class="mb-2 md:mb-4 lg:mb-6">
    <h3 class="text-sm lg:text-lg font-bold mb-1 border-b text-navy text-center">Full log of all system actions and
      changes</h3>
  </div>

  <!-- Filters -->
  <div class="bg-white/60 rounded-xl border border-amber-100 shadow p-4 mb-4">
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-3">
      <div>
        <label class="block text-xs font-bold text-navy/60 uppercase tracking-wide mb-1">User / Service No</label>
        <input id="auditUser" type="text" placeholder="Search user..."
          class="w-full border border-amber-100 rounded-lg px-3 py-2 text-sm text-navy bg-white/80 focus:outline-none focus:border-navy" />
      </div>
      <div>
        <label class="block text-xs font-bold text-navy/60 uppercase tracking-wide mb-1">Action Type</label>
        <select id="auditAction"
          class="w-full border border-amber-100 rounded-lg px-3 py-2 text-sm text-navy bg-white/80 focus:outline-none">
          <option value="">All Actions</option>
          <option value="LOGIN">Login</option>
          <option value="FORM_SUBMIT">Form Submit</option>
          <option value="FORM_APPROVE">Form Approve</option>
          <option value="FORM_REJECT">Form Reject</option>
          <option value="ROLE_ASSIGN">Role Assign</option>
          <option value="ROLE_REVOKE">Role Revoke</option>
          <option value="CYCLE_OPEN">Cycle Open</option>
          <option value="CYCLE_CLOSE">Cycle Close</option>
          <option value="PAYROLL_SYNC">Payroll Sync</option>
        </select>
      </div>
      <div>
        <label class="block text-xs font-bold text-navy/60 uppercase tracking-wide mb-1">Date Range</label>
        <input id="auditDate" type="date"
          class="w-full border border-amber-100 rounded-lg px-3 py-2 text-sm text-navy bg-white/80 focus:outline-none focus:border-navy" />
      </div>
    </div>
    <button onclick="loadAudit()"
      class="w-full sm:w-auto px-5 py-2 bg-navy text-white text-sm font-bold rounded-lg cursor-pointer border-none hover:bg-blue-800 transition-colors">
      <i class="fas fa-search mr-2"></i>Search Audit Trail
    </button>
  </div>

  <!-- Results -->
  <div class="bg-white/60 rounded-xl border border-amber-100 shadow p-5">
    <div class="flex items-center justify-between mb-4">
      <h3 class="font-bold text-navy text-sm uppercase tracking-wide">Activity Log</h3>
      <span class="text-xs text-blue-900/40" id="auditCount"></span>
    </div>
    <div id="auditList">
      <div class="text-center py-10 text-blue-900/30 text-sm">
        <i class="fas fa-search fa-2x mb-3 block"></i>Use filters above to search audit logs
      </div>
    </div>
  </div>
</div>

<script>
  (() => {
    const token = localStorage.getItem('token');

    const ACTION_ICONS = {
      LOGIN: { icon: 'fa-sign-in-alt', color: 'text-blue-400' },
      FORM_SUBMIT: { icon: 'fa-paper-plane', color: 'text-amber-500' },
      FORM_APPROVE: { icon: 'fa-check', color: 'text-green-500' },
      FORM_REJECT: { icon: 'fa-times', color: 'text-red-400' },
      ROLE_ASSIGN: { icon: 'fa-user-shield', color: 'text-blue-600' },
      ROLE_REVOKE: { icon: 'fa-user-minus', color: 'text-red-400' },
      CYCLE_OPEN: { icon: 'fa-lock-open', color: 'text-green-600' },
      CYCLE_CLOSE: { icon: 'fa-lock', color: 'text-red-500' },
      PAYROLL_SYNC: { icon: 'fa-sync', color: 'text-amber-600' },
    };

    function loadAudit() {
      const user = document.getElementById('auditUser').value.trim();
      const action = document.getElementById('auditAction').value;
      const date = document.getElementById('auditDate').value;
      const el = document.getElementById('auditList');

      const params = new URLSearchParams();
      if (user) params.set('user', user);
      if (action) params.set('action', action);
      if (date) params.set('date', date);

      el.innerHTML = '<div class="flex items-center justify-center py-10 text-navy/30"><i class="fas fa-spinner fa-spin mr-2"></i></div>';

      fetch('/admin/audit?' + params, { headers: { Authorization: 'Bearer ' + token } })
        .then(r => r.ok ? r.json() : [])
        .then(rows => {
          document.getElementById('auditCount').textContent = rows.length + ' record(s)';
          if (!rows.length) { el.innerHTML = '<div class="text-center py-8 text-blue-900/30 text-sm">No audit records found</div>'; return; }

          el.innerHTML = `<div class="space-y-2">` + rows.map(r => {
            const info = ACTION_ICONS[r.action] || { icon: 'fa-circle', color: 'text-blue-900/30' };
            const dt = r.created_at ? new Date(r.created_at).toLocaleString('en-GB', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : '—';
            return `
          <div class="flex items-start gap-3 p-3 rounded-xl border border-amber-50 bg-white/40 hover:bg-amber-50/30 transition-all">
            <div class="w-8 h-8 rounded-lg bg-white flex items-center justify-center flex-shrink-0 shadow-sm">
              <i class="fas ${info.icon} ${info.color}" style="font-size:13px"></i>
            </div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2 flex-wrap">
                <span class="font-bold text-navy text-sm">${r.user_id || '—'}</span>
                <span class="text-xs font-bold px-2 py-0.5 rounded-full bg-blue-50 text-blue-600">${r.action?.replace(/_/g, ' ')}</span>
              </div>
              <div class="text-xs text-blue-900/50 mt-0.5">${r.description || '—'}</div>
              <div class="text-xs text-blue-900/30 mt-0.5">${dt} ${r.ip ? '· ' + r.ip : ''}</div>
            </div>
          </div>`;
          }).join('') + `</div>`;
        })
        .catch(() => { el.innerHTML = '<div class="text-center py-8 text-red-400 text-sm">Failed to load audit trail</div>'; });
    }
  })();
</script>
