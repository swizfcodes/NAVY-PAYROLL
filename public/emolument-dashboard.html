<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta charset="utf-8" />
  <title>NAVY — Emolument</title>

  <style>
    html { visibility: hidden; }
    html.ready { visibility: visible; }
    body { opacity: 0; transition: opacity 0.15s ease; }
    body.initialized { opacity: 1; }
  </style>

  <link rel="apple-touch-icon" sizes="180x180" href="photos/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="photos/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="photos/favicon-16x16.png">
  <link rel="manifest" href="photos/site.webmanifest">

  <link rel="stylesheet" href="styles/output.css">
  <link rel="stylesheet" href="more-assets/css/boxicons.min.css">
  <link rel="stylesheet" href="more-assets/css/fontawesome.all.min.css">
  <link rel="stylesheet" href="offline-assets/css/choices.min.css">
  <link rel="stylesheet" href="styles/dashboard.css">
  <script src="offline-assets/js/choices.min.js"></script>

  <style>
    /* ── Emolument-specific palette overrides ─────────────── */
    :root {
      --emol-accent:   #f5c842;   /* gold — same as payroll modal */
      --emol-navy:     #1e40af;
      --emol-surface:  rgba(255,255,255,0.15);
      --emol-border:   rgba(251,191,36,0.2);
    }

    /* ── Ship banner strip ───────────────────────────────── */
    .ship-banner {
      background: linear-gradient(90deg,
        rgba(245,200,66,0.12) 0%,
        rgba(30,64,175,0.08) 100%);
      border-bottom: 1px solid var(--emol-border);
      padding: 6px 16px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--emol-navy);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .ship-banner .ship-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 0 3px rgba(34,197,94,0.2);
      flex-shrink: 0;
    }

    /* ── Role badge ──────────────────────────────────────── */
    .role-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .role-badge.DO  { background: rgba(59,130,246,0.12);  color: #1d4ed8; }
    .role-badge.FO  { background: rgba(245,158,11,0.12);  color: #92400e; }
    .role-badge.CPO { background: rgba(16,185,129,0.12);  color: #065f46; }

    /* ── Stat cards ──────────────────────────────────────── */
    .emol-stat-card {
      background: var(--emol-surface);
      border: 1px solid var(--emol-border);
      border-radius: 14px;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      backdrop-filter: blur(6px);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .emol-stat-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(30,64,175,0.1);
    }
    .emol-stat-card .stat-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(30,64,175,0.6);
    }
    .emol-stat-card .stat-value {
      font-size: 28px;
      font-weight: 800;
      color: #1e3a5f;
      line-height: 1;
    }
    .emol-stat-card .stat-sub {
      font-size: 11px;
      color: rgba(30,64,175,0.45);
    }
    .emol-stat-card .stat-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      align-self: flex-start;
    }

    /* ── Action buttons ──────────────────────────────────── */
    .emol-action-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 12px;
      background: var(--emol-surface);
      border: 1px solid var(--emol-border);
      cursor: pointer;
      transition: all 0.18s ease;
      text-decoration: none;
      backdrop-filter: blur(6px);
    }
    .emol-action-btn:hover {
      background: rgba(245,200,66,0.1);
      border-color: rgba(245,200,66,0.4);
      transform: translateX(3px);
    }
    .emol-action-btn .btn-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .emol-action-btn .btn-label {
      font-size: 13px;
      font-weight: 600;
      color: #1e3a5f;
      line-height: 1.3;
    }
    .emol-action-btn .btn-sub {
      font-size: 11px;
      color: rgba(30,64,175,0.45);
      margin-top: 1px;
    }
    .emol-action-btn .btn-arrow {
      margin-left: auto;
      color: rgba(30,64,175,0.3);
      font-size: 12px;
      flex-shrink: 0;
    }

    /* ── Progress bar ────────────────────────────────────── */
    .progress-track {
      height: 6px;
      background: rgba(30,64,175,0.08);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #f5c842, #1e40af);
      transition: width 0.8s cubic-bezier(0.34,1.56,0.64,1);
    }

    /* ── Bottom nav (mobile) ─────────────────────────────── */
    .emol-bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #f7f5f1;
      border-top: 1px solid rgba(251,191,36,0.2);
      display: flex;
      z-index: 40;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    .emol-bottom-nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 10px 4px 8px;
      font-size: 10px;
      font-weight: 600;
      color: rgba(30,64,175,0.4);
      cursor: pointer;
      border: none;
      background: none;
      transition: color 0.15s;
    }
    .emol-bottom-nav-item.active { color: #1e40af; }
    .emol-bottom-nav-item i { font-size: 20px; }

    @media (min-width: 1024px) {
      .emol-bottom-nav { display: none; }
    }

    /* ── Main content padding for bottom nav on mobile ───── */
    @media (max-width: 1023px) {
      .main-content-wrapper { padding-bottom: 70px !important; }
    }

    /* ── Section visibility ──────────────────────────────── */
    .emol-section { display: none; }
    .emol-section.active { display: block; }
  </style>
</head>

<body class="bg-gradient-to-br from-amber-50 to-blue-100 min-h-dvh antialiased dark overflow-auto">
<div class="max-w-layout mx-auto min-h-dvh flex flex-col">

  <!-- ── HEADER ──────────────────────────────────────────── -->
  <header class="max-w-layout fixed top-0 w-full z-30 bg-transparent flex flex-col border-border bg-background/95 backdrop-blur supports-backdrop-filter:bg-background/60">

    <!-- Ship banner — rendered by JS -->
    <div id="shipBanner" class="ship-banner hidden">
      <span class="ship-dot"></span>
      <span id="shipBannerText">—</span>
      <span id="roleBadge" class="role-badge ml-auto"></span>
    </div>

    <!-- Main header row -->
    <div class="flex items-center justify-between py-2 px-2" id="main-header">
      <div class="flex items-center gap-4">
        <button id="menu-toggle" class="p-2 rounded focus:outline-none" aria-label="Toggle menu">
          <div class="menu flex flex-col gap-1.5" aria-hidden="true">
            <img class="line w-6"   src="photos/line2i199-45p.svg" alt="" />
            <img class="img w-3"   src="photos/line2i199-45p.svg" alt="" />
            <img class="line-2 w-6" src="photos/line4i199-83u6.svg" alt="" />
          </div>
        </button>
        <div class="text-2xl lg:text-3xl font-black text-navy select-none">NAVY</div>

        <div class="relative group">
          <button class="text-2xl font-black text-navy cursor-pointer"
                  onclick="navigateTo('my-form')" aria-label="My Form">
            <i class="fa-solid fa-file-alt mr-2"></i>
          </button>
          <span class="absolute top-full left-1/2 -translate-x-1/2 hidden group-hover:block text-navy font-bold px-2 py-1 rounded shadow text-xs whitespace-nowrap">
            My Form
          </span>
        </div>
      </div>

      <div class="flex items-center gap-3">
        <p id="dynamicGreeting" class="hidden sm:block text-sm font-bold text-navy">
          <span id="greetName"></span>
        </p>
        <img src="photos/logo.png" alt="logo" class="hidden sm:block lg:w-[25px] h-[35px] object-contain" />
      </div>
    </div>
  </header>

  <!-- ── LAYOUT WRAPPER ─────────────────────────────────── -->
  <div class="main-content-wrapper pt-0 lg:pl-[250px] h-dvh overflow-y-auto transition-all duration-300"
       style="padding-top: 80px;">

    <!-- ── SIDEBAR ──────────────────────────────────────── -->
    <aside id="sidebar"
      class="overlap-wrapper lg:fixed lg:top-[5rem] lg:left-[max(0px,calc(50%-720px))] z-20 lg:w-[250px] bg-transparent lg:h-[calc(100vh-1rem)] shadow-lg overflow-y-auto">
      <nav class="px-4">
        <ul class="flex flex-col gap-[1.1rem]" id="sidebarNav">
          <!-- Populated by JS based on role -->
        </ul>
      </nav>
    </aside>

    <!-- ── MAIN ─────────────────────────────────────────── -->
    <main class="overlap relative p-4 lg:px-10" id="emolMain">

      <!-- ── HOME SECTION ─────────────────────────────── -->
      <div id="section-home" class="emol-section active">

        <!-- Greeting -->
        <div class="mt-2 mb-4">
          <p id="homeGreeting" class="text-lg md:text-xl font-bold text-navy"></p>
          <p id="currentTime" class="text-yellow-600 text-sm font-semibold mt-1"></p>
        </div>

        <!-- Stats grid — 3 cards, role-adaptive -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-5" id="statsGrid">
          <div class="emol-stat-card">
            <div class="stat-icon bg-blue-50 text-blue-600" id="stat1Icon">
              <i class="fas fa-file-alt"></i>
            </div>
            <div class="stat-label" id="stat1Label">Loading…</div>
            <div class="stat-value" id="stat1Value">—</div>
            <div class="stat-sub"  id="stat1Sub"></div>
          </div>
          <div class="emol-stat-card">
            <div class="stat-icon bg-amber-50 text-amber-500" id="stat2Icon">
              <i class="fas fa-check-circle"></i>
            </div>
            <div class="stat-label" id="stat2Label">Loading…</div>
            <div class="stat-value" id="stat2Value">—</div>
            <div class="stat-sub"  id="stat2Sub"></div>
          </div>
          <div class="emol-stat-card">
            <div class="stat-icon bg-green-50 text-green-600" id="stat3Icon">
              <i class="fas fa-users"></i>
            </div>
            <div class="stat-label" id="stat3Label">Loading…</div>
            <div class="stat-value" id="stat3Value">—</div>
            <div class="stat-sub"  id="stat3Sub"></div>
          </div>
        </div>

        <!-- Progress bar -->
        <div class="bg-white/15 border border-amber-100 rounded-xl p-4 mb-5">
          <div class="flex items-center justify-between mb-2">
            <span class="text-xs font-bold text-navy uppercase tracking-wide">
              <span id="progressShipLabel">Ship</span> Progress
            </span>
            <span class="text-xs font-bold text-yellow-600" id="progressPct">—%</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" id="progressFill" style="width:0%"></div>
          </div>
          <div class="flex justify-between mt-2 text-xs text-navy/40">
            <span id="progressFilled">— Submitted</span>
            <span id="progressTotal">— Total</span>
          </div>
        </div>

        <!-- Quick Actions -->
        <div class="flex flex-col gap-2" id="quickActions">
          <!-- Populated by JS based on role -->
        </div>
      </div><!-- /section-home -->

      <!-- ── OTHER SECTIONS loaded here by NavigationSystem ── -->
      <div id="section-dynamic" class="emol-section"></div>

    </main>
  </div><!-- /main-content-wrapper -->

  <!-- ── MOBILE BOTTOM NAV ──────────────────────────────── -->
  <nav class="emol-bottom-nav lg:hidden">
    <button class="emol-bottom-nav-item active" id="bnHome" onclick="showSection('home')">
      <i class="fas fa-home"></i>
      <span>Home</span>
    </button>
    <button class="emol-bottom-nav-item" id="bnForms" onclick="navigateTo('pending-forms')">
      <i class="fas fa-file-alt"></i>
      <span id="bnFormsLabel">Forms</span>
    </button>
    <button class="emol-bottom-nav-item" id="bnProgress" onclick="navigateTo('progress-report')">
      <i class="fas fa-chart-bar"></i>
      <span>Progress</span>
    </button>
    <button class="emol-bottom-nav-item" id="bnProfile" onclick="navigateTo('my-profile')">
      <i class="fas fa-user"></i>
      <span>Profile</span>
    </button>
    <button class="emol-bottom-nav-item" onclick="handleLogout()">
      <i class="fas fa-sign-out-alt"></i>
      <span>Logout</span>
    </button>
  </nav>

</div><!-- /max-w-layout -->

<!-- ── SCRIPTS ──────────────────────────────────────────── -->
<script src="script/auth.js"></script>
<script src="script/menu-highlighting.js"></script>

<script>
// ════════════════════════════════════════════════════════════
// EMOLUMENT DASHBOARD — core init
// ════════════════════════════════════════════════════════════

// ── 1. Bootstrap: read token + capabilities ───────────────
function getUser() {
  try {
    const token = localStorage.getItem('token');
    if (!token) return null;
    return JSON.parse(atob(token.split('.')[1]));
  } catch { return null; }
}

function getCapabilities() {
  try {
    return JSON.parse(localStorage.getItem('capabilities') || '{}');
  } catch { return {}; }
}

const user = getUser();
const caps = getCapabilities();

if (!user) {
  window.location.href = 'personnel-user-login.html';
}

// Active ship and role — set by user-dashboard ship picker
const activeShip    = sessionStorage.getItem('active_ship')    || '';
const activeRole    = sessionStorage.getItem('active_emol_role') || // e.g. 'DO','FO','CPO'
                      (caps.emol_roles && caps.emol_roles[0]) || 'PERSONNEL';
const isEmolAdmin   = caps.emol_roles?.includes('EMOL_ADMIN');

// ── 2. Sidebar nav config per role ───────────────────────
const SIDEBAR_CONFIG = {
  DO: [
    { icon: 'fa-home',      label: 'Dashboard',       section: 'home' },
    { icon: 'fa-inbox',     label: 'Pending Review',  section: 'pending-forms' },
    { icon: 'fa-check',     label: 'Reviewed',        section: 'reviewed-forms' },
    { icon: 'fa-chart-bar', label: 'Ship Progress',   section: 'progress-report' },
    { icon: 'fa-user',      label: 'My Profile',      section: 'my-profile' },
  ],
  FO: [
    { icon: 'fa-home',        label: 'Dashboard',       section: 'home' },
    { icon: 'fa-inbox',       label: 'Pending Approval',section: 'pending-forms' },
    { icon: 'fa-check-double',label: 'Bulk Approve',    section: 'bulk-approve' },
    { icon: 'fa-check',       label: 'Approved',        section: 'approved-forms' },
    { icon: 'fa-chart-bar',   label: 'Ship Progress',   section: 'progress-report' },
    { icon: 'fa-user',        label: 'My Profile',      section: 'my-profile' },
  ],
  CPO: [
    { icon: 'fa-home',        label: 'Dashboard',           section: 'home' },
    { icon: 'fa-inbox',       label: 'Pending Confirmation',section: 'pending-forms' },
    { icon: 'fa-check',       label: 'Confirmed',           section: 'confirmed-forms' },
    { icon: 'fa-chart-bar',   label: 'Command Progress',    section: 'progress-report' },
    { icon: 'fa-user',        label: 'My Profile',          section: 'my-profile' },
  ],
  EMOL_ADMIN: [
    { icon: 'fa-home',        label: 'Dashboard',         section: 'home' },
    { icon: 'fa-ship',        label: 'Ships',             section: 'ships-overview' },
    { icon: 'fa-toggle-on',   label: 'Open / Close Forms',section: 'form-cycle' },
    { icon: 'fa-user-shield', label: 'Role Management',   section: 'role-management' },
    { icon: 'fa-chart-pie',   label: 'Progress Report',   section: 'progress-report' },
    { icon: 'fa-upload',      label: 'Bulk Approve',      section: 'admin-bulk-approve' },
    { icon: 'fa-user',        label: 'My Profile',        section: 'my-profile' },
  ],
};

// ── 3. Stat card config per role ─────────────────────────
const STAT_CONFIG = {
  DO: [
    { label: 'Awaiting My Review', icon: 'fa-inbox',      color: 'bg-blue-50 text-blue-600',  key: 'pending' },
    { label: 'Reviewed Today',     icon: 'fa-check',      color: 'bg-amber-50 text-amber-500', key: 'today'   },
    { label: 'Total on Ship',      icon: 'fa-users',      color: 'bg-green-50 text-green-600', key: 'total'   },
  ],
  FO: [
    { label: 'Awaiting Approval',  icon: 'fa-inbox',      color: 'bg-blue-50 text-blue-600',  key: 'pending' },
    { label: 'Approved Today',     icon: 'fa-check-double',color:'bg-amber-50 text-amber-500',key: 'today'   },
    { label: 'Total on Ship',      icon: 'fa-users',      color: 'bg-green-50 text-green-600', key: 'total'   },
  ],
  CPO: [
    { label: 'Pending Confirmation',icon:'fa-inbox',      color: 'bg-blue-50 text-blue-600',  key: 'pending' },
    { label: 'Confirmed Today',    icon: 'fa-check',      color: 'bg-amber-50 text-amber-500', key: 'today'   },
    { label: 'Total in Command',   icon: 'fa-building',   color: 'bg-green-50 text-green-600', key: 'total'   },
  ],
  EMOL_ADMIN: [
    { label: 'Total Personnel',    icon: 'fa-users',      color: 'bg-blue-50 text-blue-600',  key: 'total'   },
    { label: 'Forms Submitted',    icon: 'fa-file-alt',   color: 'bg-amber-50 text-amber-500', key: 'pending' },
    { label: 'Fully Confirmed',    icon: 'fa-check-circle',color:'bg-green-50 text-green-600',key: 'confirmed'},
  ],
};

// ── 4. Quick actions per role ─────────────────────────────
const ACTION_CONFIG = {
  DO: [
    { icon: 'fa-inbox',     color: 'bg-blue-50 text-blue-500',
      label: 'Review Forms', sub: 'Forms awaiting your review',
      section: 'pending-forms' },
    { icon: 'fa-eye',       color: 'bg-amber-50 text-amber-500',
      label: 'View Reviewed', sub: 'Forms you have reviewed',
      section: 'reviewed-forms' },
    { icon: 'fa-chart-bar', color: 'bg-green-50 text-green-500',
      label: 'Ship Progress', sub: 'Submission status',
      section: 'progress-report' },
  ],
  FO: [
    { icon: 'fa-inbox',       color: 'bg-blue-50 text-blue-500',
      label: 'Approve Forms', sub: 'Forms awaiting your approval',
      section: 'pending-forms' },
    { icon: 'fa-check-double',color: 'bg-amber-50 text-amber-500',
      label: 'Bulk Approve',  sub: 'Approve entire ship by class',
      section: 'bulk-approve' },
    { icon: 'fa-chart-bar',   color: 'bg-green-50 text-green-500',
      label: 'Ship Progress', sub: 'Submission status',
      section: 'progress-report' },
  ],
  CPO: [
    { icon: 'fa-inbox',     color: 'bg-blue-50 text-blue-500',
      label: 'Confirm Forms', sub: 'Forms awaiting final confirmation',
      section: 'pending-forms' },
    { icon: 'fa-chart-bar', color: 'bg-amber-50 text-amber-500',
      label: 'Command Overview', sub: 'All ships progress',
      section: 'progress-report' },
    { icon: 'fa-history',   color: 'bg-green-50 text-green-500',
      label: 'Confirmed Forms', sub: 'Completed records',
      section: 'confirmed-forms' },
  ],
  EMOL_ADMIN: [
    { icon: 'fa-toggle-on',   color: 'bg-blue-50 text-blue-500',
      label: 'Open / Close Forms', sub: 'Control the form cycle',
      section: 'form-cycle' },
    { icon: 'fa-user-shield', color: 'bg-amber-50 text-amber-500',
      label: 'Assign Roles',  sub: 'Assign DO, FO, CPO to personnel',
      section: 'role-management' },
    { icon: 'fa-chart-pie',   color: 'bg-green-50 text-green-500',
      label: 'Progress Report', sub: 'All ships at a glance',
      section: 'progress-report' },
    { icon: 'fa-ship',        color: 'bg-purple-50 text-purple-500',
      label: 'Ships Overview', sub: 'Manage per-ship status',
      section: 'ships-overview' },
  ],
};

// ── 5. Render sidebar ─────────────────────────────────────
function renderSidebar(role) {
  const nav    = document.getElementById('sidebarNav');
  const config = SIDEBAR_CONFIG[role] || SIDEBAR_CONFIG.DO;
  nav.innerHTML = config.map(item => `
    <li class="relative">
      <a class="nav-item flex items-center gap-2 text-navy font-medium py-2 rounded px-2 hover:bg-amber-100/25 cursor-pointer"
         href="#" onclick="navigateTo('${item.section}'); return false;">
        <i class="fas ${item.icon} w-5 text-center"></i>
        <span>${item.label}</span>
      </a>
    </li>
  `).join('') + `
    <li class="relative">
      <button onclick="handleLogout()"
        class="w-full logout bg-amber-100/25 text-red-600 font-bold rounded py-2">
        Logout
      </button>
    </li>
  `;
}

// ── 6. Render stat cards ──────────────────────────────────
function renderStatCards(role) {
  const configs = STAT_CONFIG[role] || STAT_CONFIG.DO;
  configs.forEach((cfg, i) => {
    const n = i + 1;
    document.getElementById(`stat${n}Icon`).innerHTML  =
      `<div class="stat-icon ${cfg.color}"><i class="fas ${cfg.icon}"></i></div>`;
    // replace outer div properly
    const iconEl = document.getElementById(`stat${n}Icon`);
    iconEl.className = `stat-icon ${cfg.color}`;
    iconEl.innerHTML = `<i class="fas ${cfg.icon}"></i>`;
    document.getElementById(`stat${n}Label`).textContent = cfg.label;
  });
}

// ── 7. Render quick actions ───────────────────────────────
function renderQuickActions(role) {
  const actions = ACTION_CONFIG[role] || ACTION_CONFIG.DO;
  const el = document.getElementById('quickActions');
  el.innerHTML = actions.map(a => `
    <button class="emol-action-btn" onclick="navigateTo('${a.section}')">
      <div class="btn-icon ${a.color}">
        <i class="fas ${a.icon}"></i>
      </div>
      <div>
        <div class="btn-label">${a.label}</div>
        <div class="btn-sub">${a.sub}</div>
      </div>
      <i class="fas fa-chevron-right btn-arrow"></i>
    </button>
  `).join('');
}

// ── 8. Ship banner ────────────────────────────────────────
function renderShipBanner(ship, role) {
  if (!ship && !isEmolAdmin) return;
  const banner = document.getElementById('shipBanner');
  const text   = document.getElementById('shipBannerText');
  const badge  = document.getElementById('roleBadge');
  banner.classList.remove('hidden');
  text.textContent = isEmolAdmin ? 'All Ships — System Administrator' : ship;
  badge.className  = `role-badge ${role} ml-auto`;
  badge.textContent = role;
  badge.style.display = 'inline-flex';
}

// ── 9. Greeting ───────────────────────────────────────────
function updateGreeting() {
  const hour = new Date().getHours();
  const part = hour < 12 ? 'Morning' : hour < 16 ? 'Afternoon' : 'Evening';
  const name = user?.full_name?.split(' ').slice(0,2).join(' ') || 'Officer';
  const greeting = `Good ${part}, ${name}`;
  const el = document.getElementById('homeGreeting');
  const hn = document.getElementById('greetName');
  if (el) el.textContent = greeting;
  if (hn) hn.textContent = name;
}

function updateTime() {
  const el = document.getElementById('currentTime');
  if (!el) return;
  el.textContent = new Date().toLocaleString('en-US', {
    weekday:'long', year:'numeric', month:'long', day:'numeric',
    hour:'2-digit', minute:'2-digit',
  });
}

// ── 10. Load stats from API ───────────────────────────────
async function loadStats() {
  const token = localStorage.getItem('token');
  try {
    const params = new URLSearchParams();
    if (activeShip)    params.set('ship', activeShip);
    if (activeRole)    params.set('role', activeRole);
    const res  = await fetch(`/api/emolument/dashboard/stats?${params}`, {
      headers: { Authorization: `Bearer ${token}` },
    });
    if (!res.ok) return;
    const data = await res.json();

    // stat values
    document.getElementById('stat1Value').textContent =
      data.pending?.toLocaleString() ?? '—';
    document.getElementById('stat2Value').textContent =
      data.today?.toLocaleString() ?? '—';
    document.getElementById('stat3Value').textContent =
      data.total?.toLocaleString() ?? '—';

    // progress bar
    const filled  = data.submitted || 0;
    const total   = data.total     || 1;
    const pct     = Math.round((filled / total) * 100);
    document.getElementById('progressPct').textContent  = `${pct}%`;
    document.getElementById('progressFill').style.width  = `${pct}%`;
    document.getElementById('progressFilled').textContent = `${filled} Submitted`;
    document.getElementById('progressTotal').textContent  = `${total} Total`;
    document.getElementById('progressShipLabel').textContent =
      isEmolAdmin ? 'System' : (activeShip || 'Ship');

  } catch (err) {
    console.error('Stats load error:', err);
  }
}

// ── 11. Section navigation ────────────────────────────────
function showSection(name) {
  document.querySelectorAll('.emol-section').forEach(s => s.classList.remove('active'));
  const target = document.getElementById(`section-${name}`);
  if (target) {
    target.classList.add('active');
    // Update bottom nav
    document.querySelectorAll('.emol-bottom-nav-item').forEach(b => b.classList.remove('active'));
    const bnMap = { home: 'bnHome', 'pending-forms': 'bnForms', 'progress-report': 'bnProgress', 'my-profile': 'bnProfile' };
    const bn = bnMap[name];
    if (bn) document.getElementById(bn)?.classList.add('active');
  }
}

async function navigateTo(section) {
  // Special: home → show the home section
  if (section === 'home') { showSection('home'); return; }

  // All others: load via fetch into section-dynamic
  const dynSection = document.getElementById('section-dynamic');
  showSection('dynamic');

  // Update bottom nav highlight
  document.querySelectorAll('.emol-bottom-nav-item').forEach(b => b.classList.remove('active'));
  const bnForms = document.getElementById('bnForms');
  if (['pending-forms','reviewed-forms','approved-forms','confirmed-forms','bulk-approve'].includes(section)) {
    bnForms?.classList.add('active');
  }

  // Show loading state
  dynSection.innerHTML = `
    <div class="flex items-center justify-center py-20 gap-3">
      <div class="relative w-10 h-10">
        <div class="absolute left-1 w-[6px] bg-blue-600 rounded animate-grow-up"></div>
        <div class="absolute right-1 w-[6px] bg-blue-600 rounded animate-grow-down"></div>
        <div class="absolute top-1/2 left-1 h-[6px] bg-blue-600 rounded animate-expand -translate-y-1/2"></div>
      </div>
      <span class="text-navy/60 text-sm">Loading…</span>
    </div>`;

  try {
    const res = await fetch(`emolument-sections/${section}.html`);
    if (res.ok) {
      dynSection.innerHTML = `
        <div class="mt-2">
          <div class="bg-white/10 rounded-xl border border-amber-100 shadow-sm">
            ${await res.text()}
          </div>
          <button onclick="showSection('home')"
            class="mt-4 flex items-center gap-2 text-sm font-medium text-navy/60 hover:text-navy transition-colors">
            <i class="fas fa-arrow-left text-xs"></i> Back
          </button>
        </div>`;
      // Re-execute any scripts in loaded HTML
      dynSection.querySelectorAll('script').forEach(s => {
        const ns = document.createElement('script');
        ns.textContent = `(function(){${s.textContent}})();`;
        document.head.appendChild(ns);
      });
    } else {
      dynSection.innerHTML = `
        <div class="text-center py-16 text-navy/40">
          <i class="fas fa-tools text-3xl mb-3"></i>
          <p class="font-semibold">Section under construction</p>
          <button onclick="showSection('home')" class="mt-4 text-sm text-blue-600 underline">Back to Dashboard</button>
        </div>`;
    }
  } catch {
    dynSection.innerHTML = `
      <div class="text-center py-16 text-red-400">
        <i class="fas fa-exclamation-triangle text-3xl mb-3"></i>
        <p class="font-semibold">Failed to load section</p>
        <button onclick="showSection('home')" class="mt-4 text-sm text-blue-600 underline">Back</button>
      </div>`;
  }
}

// ── 12. Sidebar toggle (reuse payroll pattern) ────────────
const btn       = document.getElementById('menu-toggle');
const sidebarEl = document.getElementById('sidebar');
let sidebarOverlay = null;

function createSidebarOverlay() {
  if (sidebarOverlay) return sidebarOverlay;
  sidebarOverlay = document.createElement('div');
  sidebarOverlay.className = 'sidebar-overlay';
  sidebarOverlay.style.zIndex = '30';
  sidebarOverlay.addEventListener('click', closeSidebar);
  return sidebarOverlay;
}
function removeSidebarOverlay() {
  if (sidebarOverlay) { sidebarOverlay.remove(); sidebarOverlay = null; }
}
function closeSidebar() {
  sidebarEl.classList.remove('sidebar-visible');
  removeSidebarOverlay();
  document.body.classList.remove('no-scroll');
}
function openSidebar() {
  sidebarEl.classList.add('sidebar-visible');
  document.body.appendChild(createSidebarOverlay());
  document.body.classList.add('no-scroll');
}
btn?.addEventListener('click', () => {
  sidebarEl.classList.contains('sidebar-visible') ? closeSidebar() : openSidebar();
});

// ── 13. Logout ────────────────────────────────────────────
async function handleLogout() {
  try {
    const token = localStorage.getItem('token');
    if (token) {
      await fetch('/api/auth/logout', {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}` },
      });
    }
  } catch {}
  // Clear emolument session context but preserve pre-login state
  sessionStorage.removeItem('active_ship');
  sessionStorage.removeItem('active_emol_role');
  window.location.href = 'user-dashboard.html';
}

// ── 14. INIT ──────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  // Determine effective role
  const role = isEmolAdmin ? 'EMOL_ADMIN' : activeRole;

  // Render
  renderSidebar(role);
  renderStatCards(role);
  renderQuickActions(role);
  renderShipBanner(activeShip, role);
  updateGreeting();
  updateTime();
  setInterval(updateTime, 60000);

  // Update bottom nav label
  const bnLabel = document.getElementById('bnFormsLabel');
  if (bnLabel) {
    const labels = { DO:'Review', FO:'Approve', CPO:'Confirm', EMOL_ADMIN:'Manage' };
    bnLabel.textContent = labels[role] || 'Forms';
  }

  // Load live stats
  loadStats();

  // Reveal
  requestAnimationFrame(() => {
    document.documentElement.classList.add('ready');
    document.body.classList.add('initialized');
  });
});
</script>
