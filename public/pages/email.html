<script>
  (function () {

    var selectedRecipients = [];    // multi mode:  [{ user_id, full_name, email }]
    var currentMsgId = null;
    var currentReplyTo = null;
    var searchTimerS = null;
    var searchTimerM = null;
    var tickTimer = null;
    const PAGE_LIMIT = 5;
    const TOKEN = localStorage.getItem('token');
    const MAX_ATTACH = 3;
    const MAX_SIZE = 5 * 1024 * 1024;
    const MAX_RCPT = 20;
    var attachments = [];

    function authJSON() { return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + TOKEN }; }
    function authHdr() { return { 'Authorization': 'Bearer ' + TOKEN }; }

    // ── Time helpers ──────────────────────────────────────────
    var _tzOff = 0;
    function applyServerTZ(o) { _tzOff = o; }
    function applyServerOffset(iso) { var d = (new Date(iso).getTime() - Date.now()) / 60000; _tzOff = Math.round(d / 30) * 30; }
    function toUTC(s) {
      if (!s) return null;
      var ms = (s.endsWith('Z') || s.includes('+')) ? new Date(s).getTime() : new Date(s.replace(' ', 'T') + 'Z').getTime() - _tzOff * 60000;
      var d = new Date(ms); return isNaN(d) ? null : d;
    }
    function formatTime(s) {
      var d = toUTC(s); if (!d) return '';
      var diff = Math.floor((Date.now() - d.getTime()) / 1000); if (diff < 0) diff = 0;
      if (diff < 60) return 'Just now';
      if (diff < 3600) return Math.floor(diff / 60) + 'm';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h';
      if (diff < 172800) return 'Yesterday';
      return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
    }
    function formatDate(s) {
      var d = toUTC(s); if (!d) return '—';
      return d.toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit', year: 'numeric' }) + ', ' + d.toLocaleTimeString('en-GB');
    }
    function formatBytes(b) {

      if (m === 'application/pdf') return 'M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z';
      return 'M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z';
    }
    function escHtml(s) { if (!s) return ''; return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

    // ── Badge ─────────────────────────────────────────────────
    function syncBadge(n) {

    // ── Tabs ──────────────────────────────────────────────────
    window.switchTab = function (tab) {

    function loadMessages() {
      var list = document.getElementById('email-list');
      list.innerHTML = '<div class="email-loading"><div class="email-spinner"></div></div>';
      document.getElementById('email-pagination').style.display = 'none';
      var url = currentTab === 'inbox'
        ? '/messages/inbox?page=' + currentPage + '&limit=' + PAGE_LIMIT
        : '/messages/sent?page=' + currentPage + '&limit=' + PAGE_LIMIT;
      fetch(url, { headers: authJSON() })
        .then(function (r) { return r.json(); })
        .then(function (data) {
          var msgs = data.messages || [];
          if (typeof data.server_tz_offset === 'number') applyServerTZ(data.server_tz_offset);
          else if (data.server_time) applyServerOffset(data.server_time);
          if (data.unread !== undefined) syncBadge(data.unread);
          renderMessages(msgs);

          if (currentTab === 'sent') pollSentTicks();

        .catch(function () {

    function emptyHTML(p, t, s) {

    // ── Tick SVG helpers ──────────────────────────────────────
    function tickSvg(status) {
      // For multi-sends: partial states stay as single grey tick — only upgrade when ALL complete
      if (status === 'sent' || status === 'partial_delivered' || status === 'partial_read')
        return '<span class="email-tick" title="Sent"><svg viewBox="0 0 12 12" fill="none" stroke="rgba(180,200,230,0.45)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1,6 4,9 10,3"/></svg></span>';
      if (status === 'delivered')
        return '<span class="email-tick" title="Delivered"><svg viewBox="0 0 16 12" fill="none" stroke="rgba(180,200,230,0.45)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1,6 4,9 10,3"/><polyline points="5,6 8,9 14,3"/></svg></span>';
      return '<span class="email-tick" title="Read"><svg viewBox="0 0 16 12" fill="none" stroke="#f5c842" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1,6 4,9 10,3"/><polyline points="5,6 8,9 14,3"/></svg></span>';
    }

    function tickStatusFromMsg(msg) {
      if (Number(msg.recipient_count) > 1) {
        var total = Number(msg.recipient_count);
        var rc = Number(msg.read_count) || 0;
        var dc = Number(msg.delivered_count) || 0;
        // Only upgrade tick when EVERY recipient has reached that state
        if (rc === total && total > 0) return 'read';
        if (dc === total && total > 0) return 'delivered';
        return 'sent';
      }
      if (msg.read_at) return 'read';
      if (msg.delivered_at) return 'delivered';
      return 'sent';
    }

    // ── Render list ───────────────────────────────────────────
    function renderMessages(msgs) {
      var list = document.getElementById('email-list');
      if (!msgs.length) {
        var t = currentTab === 'inbox' ? 'Your inbox is empty' : 'No sent messages';
        var s = currentTab === 'inbox' ? 'New messages will appear here' : 'Messages you send will show up here';
        list.innerHTML = emptyHTML('M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z', t, s);
        return;
      }
      var html = '<div class="email-rows">';
      msgs.forEach(function (msg) {
        var isUnread = currentTab === 'inbox' && !msg.is_read;
        var rcptCount = Number(msg.recipient_count) || 1;
        var nameRaw = currentTab === 'inbox' ? msg.from_name : (msg.to_name || 'Unknown');
        var dispName = nameRaw;
        if (currentTab === 'sent' && rcptCount > 1) {
          dispName = nameRaw.split(',')[0].trim() + ' +' + (rcptCount - 1) + ' more';
        }
        var preview = msg.body ? msg.body.substring(0, 80) : '';
        var clip = msg.has_attachments
          ? '<div class="email-row-clip"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.586-6.586a4 4 0 00-5.656-5.656L5.757 10.757a6 6 0 008.486 8.486L20 13"/></svg></div>'
          : '<div></div>';
        var metaCol;
        if (currentTab === 'sent') {
          var status = tickStatusFromMsg(msg);
          var rcptBadge = rcptCount > 1
            ? '<span class="email-rcpt-badge" title="' + rcptCount + ' recipients"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a4 4 0 00-5.356-3.779M9 20H4v-2a4 4 0 015.356-3.779M15 7a4 4 0 11-8 0 4 4 0 018 0zm6 3a3 3 0 11-6 0 3 3 0 016 0z"/></svg>' + rcptCount + '</span>'
            : '';
          metaCol = '<div class="email-row-meta"><div class="email-time">' + rcptBadge + formatTime(msg.sent_at) + tickSvg(status) + '</div>'
            + '<button class="email-dots-btn" onclick="event.stopPropagation();showTickPopover(event,' + msg.id + ')" title="Message info">'
            + '<svg fill="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg></button></div>';
        } else {
          metaCol = '<div class="email-row-meta"><div class="email-time">' + formatTime(msg.sent_at) + '</div></div>';
        }
        // For multi-sends: stamp allread/alldelivered at render time from server-supplied counts
        var extraAttrs = '';
        if (currentTab === 'sent' && rcptCount > 1) {
          var rcc = Number(msg.read_count) || 0;
          var dcc = Number(msg.delivered_count) || 0;
          if (rcc > 0 && rcc === rcptCount) extraAttrs += ' data-allread="1"';
          if (dcc > 0 && dcc === rcptCount) extraAttrs += ' data-alldelivered="1"';
          extraAttrs += ' data-readcount="' + rcc + '" data-delivcount="' + dcc + '"';
        }
        html += '<div class="email-row' + (isUnread ? ' unread' : '') + '" '
          + 'data-sent="' + msg.sent_at + '" data-delivered="' + (msg.delivered_at || '') + '" data-read="' + (msg.read_at || '') + '" '
          + 'data-msgid="' + msg.id + '" data-rcptcount="' + rcptCount + '"' + extraAttrs + ' '
          + 'onclick="openMessage(' + msg.id + ', \'' + currentTab + '\')">'

          + '<div class="email-sender">' + escHtml(dispName) + '</div>'
          + '<div class="email-preview"><div class="email-subject">' + escHtml(msg.subject) + '</div>'

    function updatePagination(count) {

      pg.style.display = 'flex';
      document.getElementById('email-prev').disabled = currentPage === 1;
      document.getElementById('email-next').disabled = count < PAGE_LIMIT;

    window.changePage = function (dir) { currentPage = Math.max(1, currentPage + dir); loadMessages(); };

    // ── Open / read message ───────────────────────────────────
    window.openMessage = function (id, tab) {
      currentMsgId = id; currentReplyTo = null;
      document.getElementById('read-email-row').style.display = 'none';
      document.getElementById('read-recipients-row').style.display = 'none';
      document.getElementById('read-attachments').innerHTML = '';
      document.getElementById('read-body').textContent = 'Loading…';
      if (tab === 'sent') {
        document.getElementById('read-reply-btn').style.display = 'none';
        document.getElementById('read-tab-label').textContent = 'Sent Message';
        document.getElementById('read-status-bar').classList.add('visible');

        sv.setAttribute('stroke', 'rgba(180,200,230,0.65)'); sl.textContent = 'Sent'; sl.className = 'email-read-status-label';
        fetch('/messages/sent-item/' + id, { headers: authJSON() })
          .then(function (r) { return r.json(); })
          .then(function (msg) {
            document.getElementById('read-subject').textContent = msg.subject;
            document.getElementById('read-date').textContent = formatDate(msg.sent_at);
            document.getElementById('read-body').textContent = msg.body;
            var rcptCount = Number(msg.recipient_count) || 1;
            if (rcptCount > 1) {
              document.getElementById('read-from').textContent = 'You';
              document.getElementById('read-recipients').textContent = msg.to_name;
              document.getElementById('read-recipients-row').style.display = 'flex';
            } else {
              document.getElementById('read-from').textContent = 'You → ' + msg.to_name;
              if (msg.to_email) { document.getElementById('read-email').textContent = msg.to_email; document.getElementById('read-email-row').style.display = 'flex'; }
            }
            fetchAndRenderAttachments(msg.id);
            // For multi-sends: only show delivered/read status when ALL recipients have reached it
            renderReadStatusBarForSent(msg, rcptCount);
          });
      } else {
        document.getElementById('read-reply-btn').style.display = 'inline-block';
        document.getElementById('read-tab-label').textContent = 'Message';
        document.getElementById('read-status-bar').classList.remove('visible');
        fetch('/messages/' + id, { headers: authJSON() })
          .then(function (r) { return r.json(); })
          .then(function (msg) {
            document.getElementById('read-subject').textContent = msg.subject;
            document.getElementById('read-from').textContent = msg.from_name;
            document.getElementById('read-date').textContent = formatDate(msg.sent_at);
            document.getElementById('read-body').textContent = msg.body;
            if (msg.from_email) { document.getElementById('read-email').textContent = msg.from_email; document.getElementById('read-email-row').style.display = 'flex'; }
            currentReplyTo = { user_id: msg.from_user_id, full_name: msg.from_name, email: msg.from_email || '' };
            fetchAndRenderAttachments(msg.id);
            document.querySelectorAll('.email-row').forEach(function (row) {
              if ((row.getAttribute('onclick') || '').includes('(' + id + ',')) row.classList.remove('unread');
            });
          });
      }
      document.getElementById('readModal').classList.add('open');
    };

    // Status bar for sent: multi-send only shows delivered/read when ALL recipients reached it
    function renderReadStatusBarForSent(msg, rcptCount) {
      var sv = document.getElementById('read-status-svg');
      var sl = document.getElementById('read-status-label');
      // For multi: we need the tick data to know counts
      if (rcptCount > 1) {
        fetch('/messages/tick/' + msg.id, { headers: authHdr() })
          .then(function (r) { return r.json(); })
          .then(function (d) {
            var allRead = d.read_count === d.recipient_count;
            var allDelivered = d.delivered_count === d.recipient_count;
            if (allRead) {
              sv.setAttribute('stroke', '#f5c842'); sl.textContent = 'Read'; sl.className = 'email-read-status-label read';
            } else if (allDelivered) {
              sv.setAttribute('stroke', 'rgba(180,200,230,0.65)'); sl.textContent = 'Delivered'; sl.className = 'email-read-status-label';
            } else {
              sv.setAttribute('stroke', 'rgba(180,200,230,0.65)'); sl.textContent = 'Sent'; sl.className = 'email-read-status-label';
            }
          }).catch(function () { });
        return;
      }
      // Single
      if (msg.read_at) { sv.setAttribute('stroke', '#f5c842'); sl.textContent = 'Read'; sl.className = 'email-read-status-label read'; }
      else if (msg.delivered_at) { sv.setAttribute('stroke', 'rgba(180,200,230,0.65)'); sl.textContent = 'Delivered'; sl.className = 'email-read-status-label'; }
      else { sv.setAttribute('stroke', 'rgba(180,200,230,0.65)'); sl.textContent = 'Sent'; sl.className = 'email-read-status-label'; }
    }

    window.closeReadModal = function () { document.getElementById('readModal').classList.remove('open'); currentMsgId = null; };

    // ── Attachments (read modal) ──────────────────────────────
    function fetchAndRenderAttachments(mailId) {
      fetch('/messages/attachment-status/' + mailId, { headers: authHdr() })
        .then(function (r) { return r.json(); })
        .then(function (d) { renderReadAttachments(d.attachments || [], mailId); })
        .catch(function () { renderReadAttachments([], mailId); });
    }
    function renderReadAttachments(list) {
      var wrap = document.getElementById('read-attachments');
      if (!list.length) { wrap.innerHTML = ''; return; }
      var html = '<div class="email-read-attachments"><div class="email-read-attach-label">📎 Attachments (' + list.length + ')</div><div class="email-read-attach-list">';
      list.forEach(function (a) {
        var prev = isPreviewable(a.mime_type);
        var act = prev ? 'View' : 'Download';
        var dlBadge = '';
        if (a.downloaded_at && !prev) {
          var dlD = new Date(a.downloaded_at.includes('T') ? a.downloaded_at : a.downloaded_at.replace(' ', 'T') + 'Z');
          var dlL = dlD.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
          dlBadge = '<span class="email-read-attach-downloaded" title="Downloaded ' + dlL + '">✓ ' + dlL + '</span>';
          act = 'Open again';
        }
        html += '<button class="email-read-attach-chip' + (a.downloaded_at ? ' already-downloaded' : '') + '" id="attach-chip-' + a.id + '" '
          + 'onclick="openAttachment(' + a.id + ',\'' + escHtml(a.filename) + '\',\'' + escHtml(a.mime_type) + '\',' + (!prev && !!a.downloaded_at) + ')">'
          + '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="' + mimeIcon(a.mime_type) + '"/></svg>'
          + '<span class="email-read-attach-chip-name">' + escHtml(a.filename) + '</span>'
          + '<span class="email-read-attach-chip-size">' + formatBytes(a.file_size) + '</span>'
          + dlBadge + '<span class="email-read-attach-action">' + act + '</span></button>';
      });
      html += '</div></div>';
      wrap.innerHTML = html;
    }
    function isPreviewable(m) { return m && (m.startsWith('image/') || m === 'application/pdf'); }
    window.openAttachment = function (id, filename, mime, already) {
      if (!isPreviewable(mime) && already) {
        DashAlertModal.confirm('📁 You already downloaded "' + filename + '". Download again?', function () { _fetchAndDownload(id, filename, mime); }, null, 'Download', false);
        return;
      }
      _fetchAndDownload(id, filename, mime);
    };
    function _fetchAndDownload(id, filename, mime) {
      var chip = document.getElementById('attach-chip-' + id);
      if (chip) { chip.style.opacity = '0.6'; chip.style.pointerEvents = 'none'; }

      fetch('/messages/attachment/' + id, {
        headers: { 'Authorization': 'Bearer ' + TOKEN }
      })
        .then(function (r) {
          if (!r.ok) throw new Error('Failed (' + r.status + ')');
          return r.blob();
        })
        .then(function (blob) {
          var resolvedMime = blob.type || mime;
          var blobUrl = URL.createObjectURL(blob);

          if (isPreviewable(resolvedMime)) {
            showAttPreview(blobUrl, filename, resolvedMime, id, mime);
          } else {
            triggerDownload(blobUrl, filename);
            setTimeout(function () { URL.revokeObjectURL(blobUrl); }, 10000);

            // Mark chip as downloaded immediately without waiting for page reload
            if (chip) {
              chip.classList.add('already-downloaded');
              var actionEl = chip.querySelector('.email-read-attach-action');
              if (actionEl) actionEl.textContent = 'Open again';
              // Inject downloaded badge
              var sizeEl = chip.querySelector('.email-read-attach-chip-size');
              if (sizeEl && !chip.querySelector('.email-read-attach-downloaded')) {
                var today = new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
                var badge = document.createElement('span');
                badge.className = 'email-read-attach-downloaded';
                badge.title = 'Downloaded ' + today;
                badge.textContent = '✓ ' + today;
                sizeEl.insertAdjacentElement('afterend', badge);
              }
              // Update onclick to pass alreadyDownloaded = true from now on
              chip.setAttribute('onclick',
                'openAttachment(' + id + ',\'' + escHtml(filename) + '\',\'' + escHtml(mime) + '\',true)');
            }
          }
        })
        .catch(function (err) {
          DashAlertModal.show('❌ Could not open file. Please try again.');
          console.error(err);
        })
        .finally(function () {
          if (chip) { chip.style.opacity = ''; chip.style.pointerEvents = ''; }
        });
    }

    function fetchAndRenderAttachments(mailId) {
      fetch('/messages/attachment-status/' + mailId, {
        headers: { 'Authorization': 'Bearer ' + TOKEN }
      })
        .then(function (r) { return r.json(); })
        .then(function (data) {
          renderReadAttachments(data.attachments || [], mailId);
        })
        .catch(function () {
          // Fallback — render without download status
          renderReadAttachments([], mailId);
        });
    }

    // Keep a reference to the current blob URL so we can revoke it on close
    var _previewBlobUrl = null;
    var _isFullscreen = false;

    function showAttPreview(blobUrl, filename, mime, id, origMime) {
      _previewBlobUrl = blobUrl;
      _isFullscreen = false;

      var overlay = document.getElementById('attPreviewOverlay');
      var content = document.getElementById('attPreviewContent');
      var dlBtn = document.getElementById('attPreviewDownloadBtn');
      var expBtn = document.getElementById('attPreviewExpandBtn');
      var hint = document.getElementById('attEscHint');
      var box = overlay.querySelector('.att-preview-box');

      box.classList.remove('fullscreen');
      overlay.classList.remove('fullscreen-mode');
      hint.classList.remove('visible');
      expBtn.innerHTML = expandIcon() + ' Expand';

      document.getElementById('attPreviewName').textContent = filename;
      content.innerHTML = '';

      if (mime.startsWith('image/')) {
        var img = document.createElement('img');
        img.src = blobUrl;
        img.alt = filename;
        content.appendChild(img);

      } else if (mime === 'application/pdf') {
        var wrap = document.createElement('div');
        wrap.style.cssText = [
          'position:relative',
          'width:100%',
          'height:100%',
          'flex:1',
          'min-height:0',
          'display:flex',
          'flex-direction:column'
        ].join(';');

        var iframe = document.createElement('iframe');
        iframe.src = blobUrl + '#toolbar=0&navpanes=0&scrollbar=0';
        iframe.title = filename;
        iframe.style.cssText = 'width:100%;height:100%;border:none;background:#fff;display:block;flex:1;min-height:0;';

        var catcher = document.createElement('div');
        catcher.className = 'pdf-catcher';
        catcher.style.cssText = [
          'position:absolute',
          'inset:0',
          'z-index:2',
          'background:transparent',
          'cursor:default',
          'pointer-events:none'
        ].join(';');

        catcher.addEventListener('mousemove', function (e) {
          document.dispatchEvent(new MouseEvent('mousemove', {
            clientX: e.clientX,
            clientY: e.clientY,
            bubbles: true
          }));
        });

        catcher.addEventListener('click', function (e) {
          document.dispatchEvent(new MouseEvent('click', {
            clientX: e.clientX,
            clientY: e.clientY,
            bubbles: true
          }));
        });

        wrap.appendChild(iframe);
        wrap.appendChild(catcher);
        content.appendChild(wrap);
      }                                        // ← no semicolon here

      // THESE WERE MISSING — modal never opened!
      dlBtn.onclick = function () { triggerDownload(blobUrl, filename); };

      overlay.classList.add('open');
      overlay.onclick = function (e) {
        if (e.target === overlay) closeAttPreview();
      };
    }

    // ── Fullscreen bar visibility controller ──────────────────
    var _fsBarTimer = null;
    var _fsLastMouseX = -1;
    var _fsLastMouseY = -1;
    var _fsMoveHandler = null;
    var _fsClickHandler = null;
    var _fsIgnoreNextClick = false;

    function showFsBar() {
      var bar = document.querySelector('.att-preview-bar');
      var hint = document.getElementById('attEscHint');
      var catcher = document.querySelector('.pdf-catcher');

      if (bar) bar.classList.add('fs-bar-visible');
      if (hint) hint.classList.add('fs-bar-visible');
      if (catcher && _isFullscreen) catcher.style.pointerEvents = 'none';

      // Reset the hide timer
      clearTimeout(_fsBarTimer);
      _fsBarTimer = setTimeout(hideFsBar, 2000);
    }

    function hideFsBar() {
      var bar = document.querySelector('.att-preview-bar');
      var hint = document.getElementById('attEscHint');
      var catcher = document.querySelector('.pdf-catcher');

      if (bar) bar.classList.remove('fs-bar-visible');
      if (hint) hint.classList.remove('fs-bar-visible');
      // Bar hidden = re-enable catcher to detect mouse movement
      // Small delay so any ongoing scroll gesture completes first
      if (catcher && _isFullscreen) {
        setTimeout(function () {
          catcher.style.pointerEvents = 'all';
        }, 300);
      }

      clearTimeout(_fsBarTimer);
    }

    function startFsBarListeners() {
      // Mouse MOVEMENT — only show if mouse actually moved (not scroll events)
      _fsMoveHandler = function (e) {
        if (!_isFullscreen) return;
        var dx = e.clientX - _fsLastMouseX;
        var dy = e.clientY - _fsLastMouseY;
        _fsLastMouseX = e.clientX;
        _fsLastMouseY = e.clientY;
        // Ignore zero-delta events (fired by scroll on some browsers)
        if (dx === 0 && dy === 0) return;
        showFsBar();
      };

      // CLICK anywhere — show bar for 2 seconds
      _fsClickHandler = function (e) {
        if (!_isFullscreen) return;
        if (_fsIgnoreNextClick) {
          _fsIgnoreNextClick = false;   // swallow this one click, then re-enable
          return;
        }
        // Don't hide if clicking buttons on the bar itself
        showFsBar();
      };

      document.addEventListener('mousemove', _fsMoveHandler);
      document.addEventListener('click', _fsClickHandler);
    }

    function stopFsBarListeners() {
      if (_fsMoveHandler) document.removeEventListener('mousemove', _fsMoveHandler);
      if (_fsClickHandler) document.removeEventListener('click', _fsClickHandler);
      _fsMoveHandler = null;
      _fsClickHandler = null;
      clearTimeout(_fsBarTimer);
      _fsBarTimer = null;
      _fsLastMouseX = -1;
      _fsLastMouseY = -1;
    }

      var expBtn = document.getElementById('attPreviewExpandBtn');
      var hint = document.getElementById('attEscHint');
      var catcher = document.querySelector('.pdf-catcher');

      _isFullscreen = !_isFullscreen;

      if (_isFullscreen) {
        box.classList.add('fullscreen');
        overlay.classList.add('fullscreen-mode');
        expBtn.innerHTML = collapseIcon() + ' Exit Fullscreen';
        hint.classList.add('visible');
        _fsLastMouseX = -1;
        _fsLastMouseY = -1;
        _fsIgnoreNextClick = true;
        if (catcher) catcher.style.pointerEvents = 'all';
        startFsBarListeners();
      } else {
        box.classList.remove('fullscreen');
        overlay.classList.remove('fullscreen-mode');
        expBtn.innerHTML = expandIcon() + ' Expand';
        hint.classList.remove('visible');
        if (catcher) catcher.style.pointerEvents = 'none';

    // ── Multi recipient search ────────────────────────────────
    window.focusRcptInput = function () { document.getElementById('recipient-search-multi').focus(); };
    function addRecipient(uid, name, email) {
      if (selectedRecipients.some(function (r) { return r.user_id === uid; })) return;
      if (selectedRecipients.length >= MAX_RCPT) { DashAlertModal.show('Maximum ' + MAX_RCPT + ' recipients allowed.'); return; }
      selectedRecipients.push({ user_id: uid, full_name: name, email: email || '' });
      renderRecipientChips();
      document.getElementById('recipient-search-multi').value = '';
      document.getElementById('recipient-results-multi').classList.remove('open');
    }
    window.addRecipient = addRecipient;
    window.removeRecipient = function (uid) {
      selectedRecipients = selectedRecipients.filter(function (r) { return r.user_id !== uid; });
      renderRecipientChips();
    };
    function renderRecipientChips() {
      var box = document.getElementById('recipient-box');
      var input = document.getElementById('recipient-search-multi');
      var hint = document.getElementById('rcpt-hint');
      var cHint = document.getElementById('rcpt-count-hint');
      Array.from(box.querySelectorAll('.rcpt-chip')).forEach(function (c) { c.remove(); });
      selectedRecipients.forEach(function (r) {
        var chip = document.createElement('div'); chip.className = 'rcpt-chip';
        chip.innerHTML = '<span class="rcpt-chip-name" title="' + escHtml(r.full_name) + ' (' + escHtml(r.email) + ')">' + escHtml(r.full_name) + '</span>'
          + '<button class="rcpt-chip-remove" onclick="removeRecipient(\'' + r.user_id + '\')">×</button>';
        box.insertBefore(chip, input);
      });
      var n = selectedRecipients.length;
      cHint.textContent = n ? n + ' selected' : '';
      if (n >= MAX_RCPT) { hint.textContent = 'Maximum recipients reached'; hint.className = 'rcpt-hint warn'; input.placeholder = ''; input.disabled = true; }
      else { hint.textContent = n ? (MAX_RCPT - n) + ' more allowed' : 'Up to 20 recipients'; hint.className = 'rcpt-hint'; input.placeholder = 'Add more…'; input.disabled = false; }
    }
    window.searchRecipientsMulti = function (q) {
      clearTimeout(searchTimerM);
      var res = document.getElementById('recipient-results-multi');
      if (q.trim().length < 2) { res.classList.remove('open'); return; }
      searchTimerM = setTimeout(function () {
        fetch('/messages/users/search?q=' + encodeURIComponent(q), { headers: authJSON() })
          .then(function (r) { return r.json(); })
          .then(function (data) {
            var ids = selectedRecipients.map(function (r) { return r.user_id; });
            var users = (data.users || []).filter(function (u) { return ids.indexOf(u.user_id) === -1; });
            res.innerHTML = users.length === 0
              ? '<div class="email-recipient-option"><span class="email-recipient-name" style="color:rgba(200,220,255,0.4)">No users found</span></div>'
              : users.map(function (u) {
                return '<div class="email-recipient-option" onclick="addRecipient(\'' + u.user_id + '\',\'' + escHtml(u.full_name) + '\',\'' + escHtml(u.email || '') + '\')">'

              }).join('');

    window.handleRcptKeydown = function (e) {

        removeRecipient(selectedRecipients[selectedRecipients.length - 1].user_id);
      if (e.key === 'Escape') document.getElementById('recipient-results-multi').classList.remove('open');

    // ── Attachments ───────────────────────────────────────────
    window.handleFileSelected = function (input) {
      var file = input.files[0]; input.value = ''; if (!file) return;
      var err = document.getElementById('attach-error'); err.style.display = 'none';
      if (attachments.length >= MAX_ATTACH) { showAttachError('Maximum ' + MAX_ATTACH + ' attachments allowed.'); return; }
      if (file.size > MAX_SIZE) { showAttachError('"' + file.name + '" exceeds the 5 MB limit.'); return; }
      var tid = 'att-' + Date.now();
      attachments.push({ tempId: tid, filename: file.name, file_size: file.size, mime_type: file.type, uploading: true, temp_token: null });
      renderAttachList();
      var xhr = new XMLHttpRequest(); var fd = new FormData(); fd.append('file', file);
      xhr.upload.addEventListener('progress', function (e) { if (!e.lengthComputable) return; var b = document.getElementById('bar-' + tid); if (b) b.style.width = Math.round(e.loaded / e.total * 100) + '%'; });
      xhr.addEventListener('load', function () {
        var att = attachments.find(function (a) { return a.tempId === tid; }); if (!att) return;
        if (xhr.status === 201) { var res = JSON.parse(xhr.responseText); att.temp_token = res.temp_token; att.uploading = false; }
        else { attachments = attachments.filter(function (a) { return a.tempId !== tid; }); try { showAttachError(JSON.parse(xhr.responseText).error || 'Upload failed.'); } catch (e) { showAttachError('Upload failed.'); } }
        renderAttachList();
      });
      xhr.addEventListener('error', function () { attachments = attachments.filter(function (a) { return a.tempId !== tid; }); showAttachError('Upload failed.'); renderAttachList(); });
      xhr.open('POST', '/messages/upload'); xhr.setRequestHeader('Authorization', 'Bearer ' + TOKEN); xhr.send(fd);
    };
    function showAttachError(msg) { var el = document.getElementById('attach-error'); el.textContent = msg; el.style.display = 'block'; setTimeout(function () { el.style.display = 'none'; }, 4000); }
    window.removeAttachment = function (tid) { attachments = attachments.filter(function (a) { return a.tempId !== tid; }); renderAttachList(); };
    function renderAttachList() {
      var list = document.getElementById('attach-list');
      var btn = document.getElementById('attach-btn');
      var lbl = document.getElementById('attach-count-label');
      var n = attachments.length;
      lbl.textContent = '(' + n + ' / ' + MAX_ATTACH + ' · max 5 MB each)';
      btn.classList.toggle('disabled', n >= MAX_ATTACH);
      if (!n) { list.innerHTML = ''; return; }
      list.innerHTML = attachments.map(function (a) {
        var prog = a.uploading ? '<div class="email-attach-progress"><div class="email-attach-progress-bar" id="bar-' + a.tempId + '"></div></div>' : '';
        var rem = !a.uploading ? '<button class="email-attach-item-remove" onclick="removeAttachment(\'' + a.tempId + '\')" title="Remove"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>'
          : '<span style="font-size:11px;color:rgba(200,220,255,0.35);padding-right:4px;">uploading…</span>';
        return '<div class="email-attach-item"><div class="email-attach-item-icon"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="' + mimeIcon(a.mime_type) + '"/></svg></div>'
          + '<div class="email-attach-item-info"><div class="email-attach-item-name">' + escHtml(a.filename) + '</div>'
          + '<div class="email-attach-item-size">' + formatBytes(a.file_size) + '</div>' + prog + '</div>' + rem + '</div>';
      }).join('');

    // ── Send ──────────────────────────────────────────────────
    window.sendMessage = function () {
      var subject = document.getElementById('compose-subject').value.trim();
      var body = document.getElementById('compose-body').value.trim();
      var btn = document.getElementById('send-btn');
      if (!subject) return DashAlertModal.show('Please enter a subject.');
      if (!body) return DashAlertModal.show('Please write a message.');
      if (attachments.some(function (a) { return a.uploading; })) return DashAlertModal.show('Please wait — files are still uploading.');
      var tokens = attachments.map(function (a) { return a.temp_token; }).filter(Boolean);
      var payload;
      if (composeMode === 'single') {
        if (!selectedRecipient) return DashAlertModal.show('Please select a recipient.');
        payload = { to_user_id: selectedRecipient.user_id, to_name: selectedRecipient.full_name, to_email: selectedRecipient.email, subject: subject, body: body, attachment_tokens: tokens };
      } else {
        if (!selectedRecipients.length) return DashAlertModal.show('Please add at least one recipient.');
        payload = { recipients: selectedRecipients.map(function (r) { return { user_id: r.user_id, full_name: r.full_name, email: r.email }; }), subject: subject, body: body, attachment_tokens: tokens };
      }
      btn.disabled = true; btn.textContent = 'Sending…';
      fetch('/messages', { method: 'POST', headers: authJSON(), body: JSON.stringify(payload) })
        .then(function (r) { return r.json(); })
        .then(function (data) {
          btn.disabled = false;
          btn.innerHTML = '<svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg> Send Message';
          closeComposeModal();
          DashAlertModal.show(data.message || '✅ Message sent successfully.');
          if (currentTab === 'sent') loadMessages();
        })
        .catch(function () { btn.disabled = false; btn.textContent = 'Send Message'; DashAlertModal.show('Failed to send. Please try again.'); });
    };

    // ── Tick popover (grouped by status tier for multi) ───────
    var _tickPopover = null;
    window.showTickPopover = function (event, msgId) {
      closeTickPopover();
      var row = event.currentTarget.closest('.email-row');
      var sentAt = row ? row.getAttribute('data-sent') : null;
      var rcptCount = row ? parseInt(row.getAttribute('data-rcptcount') || '1') : 1;
      var pop = document.createElement('div'); pop.className = 'tick-popover';
      // Show loading state while fetching
      pop.innerHTML = '<div class="tick-popover-title">Message Status</div><div style="font-size:12px;color:rgba(200,220,255,0.3);padding:8px 0;">Loading…</div>';
      document.body.appendChild(pop); _tickPopover = pop;
      var rect = event.currentTarget.getBoundingClientRect();
      var popW = 300, popH = rcptCount > 1 ? 240 : 130;
      var left = Math.min(rect.right - popW, window.innerWidth - popW - 12);
      var top = rect.bottom + 8;
      if (top + popH > window.innerHeight) top = rect.top - popH - 8;
      pop.style.left = Math.max(8, left) + 'px'; pop.style.top = top + 'px';
      fetch('/messages/tick/' + msgId, { headers: authHdr() })
        .then(function (r) { return r.json(); })
        .then(function (d) {
          if (!_tickPopover) return;
          if (d.recipients && d.recipients.length > 1) {
            _tickPopover.innerHTML = buildMultiPopover(d);
          } else {
            _tickPopover.innerHTML = buildSinglePopover(d);
          }
          if (row) { row.setAttribute('data-delivered', d.delivered_at || ''); row.setAttribute('data-read', d.read_at || ''); }
          updateRowTick(row, d);
        }).catch(function () { if (_tickPopover) _tickPopover.innerHTML = '<div style="font-size:12px;color:#ff8080;padding:4px 0;">Failed to load</div>'; });
      setTimeout(function () { document.addEventListener('click', closeTickPopover, { once: true }); }, 0);
    };

    // Single recipient popover (original style)
    function buildSinglePopover(d) {
      return '<div class="tick-popover-title">Message Status</div>'
        + singlePopRow('grey1', 'Sent', d.sent_at, true)
        + singlePopRow('grey2', 'Delivered', d.delivered_at, !!d.delivered_at)
        + singlePopRow('yellow2', 'Read', d.read_at, !!d.read_at);
    }
    function singlePopRow(type, label, iso, active) {
      var op = active ? '1' : '0.2';
      var icon = type === 'grey1'
        ? '<svg width="22" height="12" viewBox="0 0 12 12" fill="none" stroke="rgba(180,200,230,0.7)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1,6 4,9 10,3"/></svg>'
        : type === 'grey2'
          ? '<svg width="22" height="12" viewBox="0 0 16 12" fill="none" stroke="rgba(180,200,230,0.7)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1,6 4,9 10,3"/><polyline points="5,6 8,9 14,3"/></svg>'
          : '<svg width="22" height="12" viewBox="0 0 16 12" fill="none" stroke="#f5c842" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1,6 4,9 10,3"/><polyline points="5,6 8,9 14,3"/></svg>';
      var val = iso ? formatDate(iso) : '<span style="color:rgba(200,220,255,0.18)">—</span>';
      return '<div class="tick-popover-row" style="opacity:' + op + '"><div class="tick-popover-icon">' + icon + '</div><div class="tick-popover-label">' + label + '</div><div class="tick-popover-val">' + val + '</div></div>';
    }

    // Multi recipient popover: group recipients into 3 tiers by their individual status
    // Tier 1 (single grey tick):  not yet delivered
    // Tier 2 (double grey ticks): delivered but not read
    // Tier 3 (double yellow):     read
    function buildMultiPopover(d) {
      var rcpts = d.recipients || [];
      var sent = [], delivered = [], read = [];
      rcpts.forEach(function (r) {
        if (r.read_at) read.push(r);
        else if (r.delivered_at) delivered.push(r);
        else sent.push(r);
      });
      var html = '<div class="tick-popover-title">Recipients (' + rcpts.length + ')</div>';
      if (read.length) html += buildTier('yellow2', read.length + ' read', read);
      if (delivered.length) html += buildTier('grey2', delivered.length + ' delivered', delivered);
      if (sent.length) html += buildTier('grey1', sent.length + ' sent', sent);
      if (!html.includes('tick-tier')) html += '<div style="font-size:12px;color:rgba(200,220,255,0.3);padding:4px 0;">No data</div>';
      return html;
    }

    var _personTooltip = null;
    function showPersonTooltip(el) {
      hidePersonTooltip();
      // Read per-recipient data stored as JSON in data-person-data attribute
      var raw = el.getAttribute('data-person-data');
      if (!raw) return;
      var r;
      try { r = JSON.parse(raw); } catch (e) { return; }
      var tt = document.createElement('div');
      tt.className = 'tick-popover';
      tt.style.minWidth = '220px';
      tt.style.zIndex = '9999';
      // Build single-style rows for this individual
      var nameHtml = '<div style="font-size:12px;font-weight:700;color:#e8f0fe;margin-bottom:10px;">'
        + escHtml(r.name)
        + (r.email ? '<span style="font-size:10px;color:rgba(200,220,255,0.4);font-weight:400;margin-left:6px;">' + escHtml(r.email) + '</span>' : '')
        + '</div>';
      tt.innerHTML = '<div class="tick-popover-title">Message Info</div>'
        + nameHtml
        + singlePopRow('grey1', 'Sent', r.sent_at, true)
        + singlePopRow('grey2', 'Delivered', r.delivered_at, !!r.delivered_at)
        + singlePopRow('yellow2', 'Read', r.read_at, !!r.read_at);
      document.body.appendChild(tt);
      _personTooltip = tt;
      var rect = el.getBoundingClientRect();
      tt.style.visibility = 'hidden';
      var th = tt.offsetHeight;
      var tw = tt.offsetWidth;
      var top = rect.top - th - 8;
      var left = rect.left;
      if (top < 8) top = rect.bottom + 8;
      if (left + tw > window.innerWidth - 8) left = window.innerWidth - tw - 8;
      tt.style.left = Math.max(8, left) + 'px';
      tt.style.top = top + 'px';
      tt.style.visibility = 'visible';
    }
    function hidePersonTooltip() {
      if (_personTooltip) { _personTooltip.remove(); _personTooltip = null; }
    }

    function buildTier(iconType, label, people) {
      var tickIcon = iconType === 'grey1'
        ? '<svg width="20" height="11" viewBox="0 0 12 12" fill="none" stroke="rgba(180,200,230,0.7)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1,6 4,9 10,3"/></svg>'
        : iconType === 'grey2'
          ? '<svg width="20" height="11" viewBox="0 0 16 12" fill="none" stroke="rgba(180,200,230,0.7)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1,6 4,9 10,3"/><polyline points="5,6 8,9 14,3"/></svg>'
          : '<svg width="20" height="11" viewBox="0 0 16 12" fill="none" stroke="#f5c842" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1,6 4,9 10,3"/><polyline points="5,6 8,9 14,3"/></svg>';
      var html = '<div class="tick-tier">'
        + '<div class="tick-tier-header">' + tickIcon + '<span class="tick-tier-label">' + label + '</span></div>'
        + '<div class="tick-tier-names">';
      people.forEach(function (r) {
        // Store full recipient data as JSON for the hover popover
        var personData = JSON.stringify({
          name: r.name, email: r.email || '',
          sent_at: r.sent_at || null, delivered_at: r.delivered_at || null, read_at: r.read_at || null
        });
        html += '<div class="tick-tier-person" data-person-data="' + escHtml(personData) + '">'
          + escHtml(r.name)
          + (r.email ? ' <span style="color:rgba(200,220,255,0.3);font-size:10px;">(' + escHtml(r.email) + ')</span>' : '')
          + '</div>';
      });
      html += '</div></div>';
      return html;
    }

    // Attach mouseover delegation — closest() handles hovering child spans inside .tick-tier-person
    document.body.addEventListener('mouseover', function (e) {
      if (!e.target || !e.target.closest) return;
      var el = e.target.closest('[data-person-data]');
      if (!el) { hidePersonTooltip(); return; }
      showPersonTooltip(el);
    });
    document.body.addEventListener('mouseout', function (e) {
      if (!e.target || !e.target.closest) return;
      var from = e.target.closest('[data-person-data]');
      var to = e.relatedTarget && e.relatedTarget.closest ? e.relatedTarget.closest('[data-person-data]') : null;
      if (from && from !== to) hidePersonTooltip();
    });

    function updateRowTick(row, d) {
      if (!row) return;
      var timeEl = row.querySelector('.email-time'); if (!timeEl) return;
      var sentAt = row.getAttribute('data-sent');
      var rcptCount = parseInt(row.getAttribute('data-rcptcount') || '1');
      var readCount = d.read_count || 0;
      var delivCount = d.delivered_count || 0;
      var status;
      if (rcptCount > 1) {
        // Only upgrade tick when ALL recipients have fully reached that state
        if (readCount === rcptCount && rcptCount > 0) status = 'read';
        else if (delivCount === rcptCount && rcptCount > 0) status = 'delivered';
        else status = 'sent';
      } else {
        status = d.read_at ? 'read' : d.delivered_at ? 'delivered' : 'sent';
      }
      var rcptBadge = rcptCount > 1 ? '<span class="email-rcpt-badge"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a4 4 0 00-5.356-3.779M9 20H4v-2a4 4 0 015.356-3.779M15 7a4 4 0 11-8 0 4 4 0 018 0zm6 3a3 3 0 11-6 0 3 3 0 016 0z"/></svg>' + rcptCount + '</span>' : '';
      timeEl.innerHTML = rcptBadge + formatTime(sentAt) + tickSvg(status);
    }
    function closeTickPopover() { if (_tickPopover) { _tickPopover.remove(); _tickPopover = null; } }

    // ── Tick polling ──────────────────────────────────────────
    function tickTimestamps() {
      document.querySelectorAll('.email-row[data-sent]').forEach(function (row) {
        var te = row.querySelector('.email-time'); if (!te) return;
        var sa = row.getAttribute('data-sent');
        var rc = parseInt(row.getAttribute('data-rcptcount') || '1');
        if (currentTab === 'sent') {
          var st;
          if (rc > 1) {
            // Use stored count attributes — never infer from timestamps alone for multi-sends
            var allRead = !!row.getAttribute('data-allread');
            var allDelivered = !!row.getAttribute('data-alldelivered');
            st = allRead ? 'read' : allDelivered ? 'delivered' : 'sent';
          } else {
            var ra = row.getAttribute('data-read'); var da = row.getAttribute('data-delivered');
            st = ra ? 'read' : da ? 'delivered' : 'sent';
          }
          var rb = rc > 1 ? '<span class="email-rcpt-badge"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a4 4 0 00-5.356-3.779M9 20H4v-2a4 4 0 015.356-3.779M15 7a4 4 0 11-8 0 4 4 0 018 0zm6 3a3 3 0 11-6 0 3 3 0 016 0z"/></svg>' + rc + '</span>' : '';
          te.innerHTML = rb + formatTime(sa) + tickSvg(st);
        } else { te.textContent = formatTime(sa); }
      });
    }
    var _pollTimer = null;
    function pollSentTicks() {
      if (currentTab !== 'sent') return;
      // For single: stop polling once read. For multi: stop only when ALL have read (data-allread set)
      var rows = Array.from(document.querySelectorAll('.email-row[data-msgid]')).filter(function (r) {
        var rc = parseInt(r.getAttribute('data-rcptcount') || '1');
        if (rc > 1) return !r.getAttribute('data-allread');  // multi: keep polling until everyone read
        return !r.getAttribute('data-read');               // single: stop once read
      });
      if (!rows.length) return;
      rows.forEach(function (row) {
        var id = row.getAttribute('data-msgid');
        fetch('/messages/tick/' + id, { headers: authHdr() })
          .then(function (r) { return r.json(); })
          .then(function (d) {
            if (!d.sent_at) return;
            var rc = parseInt(row.getAttribute('data-rcptcount') || '1');
            // Always store timestamps for reference
            if (d.delivered_at) row.setAttribute('data-delivered', d.delivered_at);
            if (d.read_at) row.setAttribute('data-read', d.read_at);
            // For multi: store counts so tickTimestamps() can compute correctly
            if (rc > 1) {
              row.setAttribute('data-readcount', d.read_count || 0);
              row.setAttribute('data-delivcount', d.delivered_count || 0);
              if (d.read_count > 0 && d.read_count === rc) row.setAttribute('data-allread', '1');
              if (d.delivered_count > 0 && d.delivered_count === rc) row.setAttribute('data-alldelivered', '1');
            }
            updateRowTick(row, d);
          })
          .catch(function () { });
      });
    }
    function startTickPolling() { if (_pollTimer) clearInterval(_pollTimer); _pollTimer = setInterval(pollSentTicks, 15000); }

    var _origSwitch = window.switchTab;
    window.switchTab = function (tab) {
      _origSwitch(tab);
      if (tab === 'sent') { pollSentTicks(); startTickPolling(); }
      else { if (_pollTimer) { clearInterval(_pollTimer); _pollTimer = null; } }
    };

    loadMessages();
    if (tickTimer) clearInterval(tickTimer);
    tickTimer = setInterval(tickTimestamps, 30000);
    if (currentTab === 'sent') startTickPolling();
  })();
</script>
