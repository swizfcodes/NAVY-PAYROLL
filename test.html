
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navy Dashboard</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">


  <style>
    @keyframes grow-up {
      0% {
        height: 0;
        bottom: 0;
      }

      100% {
        height: 100%;
        bottom: 0;
      }
    }

    @keyframes grow-down {
      0% {
        height: 0;
        top: 0;
      }

      100% {
        height: 100%;
        top: 0;
      }
    }

    @keyframes expand {
      0% {
        width: 0;
        left: 50%;
        transform: translate(-50%, -50%);
      }

      100% {
        width: 100%;
        left: 0;
        transform: translateY(-50%);
      }
    }

    .animate-grow-up {
      animation: grow-up 0.6s ease-in-out infinite alternate;
      position: absolute;
      bottom: 0;
    }

    .animate-grow-down {
      animation: grow-down 0.6s ease-in-out infinite alternate;
      position: absolute;
      top: 0;
    }

    .animate-expand {
      animation: expand 0.6s ease-in-out infinite alternate;
    }
  </style>
</head>


<div class="flex justify-center mb-4">
  <div class="absolute left-1 w-[6px] bg-blue-600 rounded animate-grow-up"></div>
  <div class="absolute right-1 w-[6px] bg-blue-600 rounded animate-grow-down [animation-delay:0.3s]"></div>
  <div
    class="absolute top-1/2 left-1 h-[6px] bg-blue-600 rounded animate-expand [animation-delay:0.6s] -translate-y-1/2">
  </div>
</div>
